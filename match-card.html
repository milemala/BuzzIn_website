<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Zup! 匹配邀约</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        :root {
            --primary: #FFD93D;
            --primary-dim: rgba(255, 217, 61, 0.12);
            --primary-glow: rgba(255, 217, 61, 0.25);
            --bg: #0a0a0f;
            --card: #16161f;
            --surface: #1c1c28;
            --text: #ffffff;
            --text-sec: rgba(255,255,255,0.6);
            --text-hint: rgba(255,255,255,0.35);
            --border: rgba(255,255,255,0.08);
            --danger: #ff6b6b;
            --success: #51cf66;
            --rose: #f783ac;
            --radius: 16px;
            --radius-sm: 10px;
            --safe-bottom: env(safe-area-inset-bottom, 0px);
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            line-height: 1.5;
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
        }

        /* ============ Hero Section ============ */
        .hero {
            position: relative;
            padding: 48px 20px 24px;
            overflow: hidden;
        }
        .hero-bg {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: linear-gradient(160deg, #2d1f3d 0%, #1a1025 40%, var(--bg) 100%);
            z-index: 0;
        }
        .hero-bg::after {
            content: '';
            position: absolute;
            top: -50%;
            right: -30%;
            width: 300px;
            height: 300px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(255, 217, 61, 0.08) 0%, transparent 70%);
        }

        .hero-content {
            position: relative;
            z-index: 1;
        }

        .match-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 6px 14px;
            border-radius: 20px;
            background: linear-gradient(135deg, rgba(255, 217, 61, 0.15), rgba(247, 131, 172, 0.15));
            border: 1px solid rgba(255, 217, 61, 0.2);
            font-size: 13px;
            color: var(--primary);
            font-weight: 500;
            margin-bottom: 20px;
        }
        .match-badge .sparkle { font-size: 14px; }

        /* ============ Profile Card ============ */
        .profile-card {
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.06);
            border-radius: var(--radius);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            overflow: hidden;
        }

        .photos-gallery {
            position: relative;
            width: 100%;
            aspect-ratio: 3 / 4;
            overflow: hidden;
            background: var(--card);
        }
        .photos-gallery img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
            position: absolute;
            top: 0; left: 0;
            opacity: 0;
            transition: opacity 0.4s;
        }
        .photos-gallery img.active { opacity: 1; }

        .photo-indicators {
            position: absolute;
            top: 12px;
            left: 12px;
            right: 12px;
            display: flex;
            gap: 4px;
            z-index: 2;
        }
        .photo-indicators .dot {
            flex: 1;
            height: 3px;
            border-radius: 2px;
            background: rgba(255,255,255,0.3);
            transition: background 0.3s;
        }
        .photo-indicators .dot.active { background: rgba(255,255,255,0.9); }

        .photo-tap-zones {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            display: flex;
            z-index: 3;
        }
        .photo-tap-zones .zone { flex: 1; }

        .profile-info {
            padding: 20px;
        }
        .profile-header {
            display: flex;
            align-items: baseline;
            gap: 10px;
            margin-bottom: 6px;
        }
        .profile-name {
            font-size: 22px;
            font-weight: 700;
        }
        .profile-age {
            font-size: 16px;
            color: var(--text-sec);
            font-weight: 500;
        }

        .profile-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 14px;
        }
        .profile-tag {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            padding: 4px 10px;
            border-radius: 6px;
            font-size: 12px;
            background: rgba(255,255,255,0.06);
            color: var(--text-sec);
        }

        .profile-desc {
            font-size: 14px;
            color: var(--text-sec);
            line-height: 1.7;
            padding: 12px 14px;
            background: rgba(255,255,255,0.03);
            border-radius: var(--radius-sm);
            border-left: 3px solid rgba(255, 217, 61, 0.3);
        }

        /* ============ AI Insight Section ============ */
        .section {
            padding: 0 20px;
            margin-top: 28px;
        }
        .section-header {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 16px;
        }
        .section-icon {
            width: 32px;
            height: 32px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            flex-shrink: 0;
        }
        .section-header h2 {
            font-size: 17px;
            font-weight: 600;
        }

        .insight-card {
            background: var(--card);
            border-radius: var(--radius);
            padding: 20px;
            border: 1px solid var(--border);
        }

        .compat-bars {
            display: flex;
            gap: 12px;
            margin-bottom: 18px;
        }
        .compat-item {
            flex: 1;
            text-align: center;
        }
        .compat-ring {
            width: 56px;
            height: 56px;
            margin: 0 auto 8px;
            position: relative;
        }
        .compat-ring svg {
            width: 56px;
            height: 56px;
            transform: rotate(-90deg);
        }
        .compat-ring .bg-circle {
            fill: none;
            stroke: rgba(255,255,255,0.06);
            stroke-width: 4;
        }
        .compat-ring .fg-circle {
            fill: none;
            stroke-width: 4;
            stroke-linecap: round;
            transition: stroke-dashoffset 1s ease-out;
        }
        .compat-ring .score-text {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 14px;
            font-weight: 700;
            color: var(--primary);
        }
        .compat-label {
            font-size: 11px;
            color: var(--text-hint);
        }

        .insight-divider {
            height: 1px;
            background: var(--border);
            margin: 16px 0;
        }
        .insight-text {
            font-size: 14px;
            color: var(--text-sec);
            line-height: 1.8;
        }
        .insight-text::before {
            content: '"';
            font-size: 28px;
            color: var(--primary);
            font-weight: 700;
            line-height: 1;
            display: block;
            margin-bottom: 4px;
            opacity: 0.6;
        }

        /* ============ Date Options Section ============ */
        .date-options {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .date-card {
            background: var(--card);
            border-radius: var(--radius);
            padding: 18px;
            border: 1.5px solid var(--border);
            cursor: pointer;
            transition: all 0.25s;
            position: relative;
            -webkit-user-select: none;
            user-select: none;
        }
        .date-card:active { transform: scale(0.98); }
        .date-card.selected {
            border-color: var(--primary);
            background: linear-gradient(135deg, rgba(255, 217, 61, 0.06), rgba(255, 217, 61, 0.02));
        }

        .date-card-check {
            position: absolute;
            top: 16px;
            right: 16px;
            width: 24px;
            height: 24px;
            border-radius: 50%;
            border: 2px solid var(--text-hint);
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.25s;
            flex-shrink: 0;
        }
        .date-card-check svg {
            width: 14px;
            height: 14px;
            stroke: var(--bg);
            fill: none;
            stroke-width: 3;
            stroke-linecap: round;
            stroke-linejoin: round;
            opacity: 0;
            transform: scale(0);
            transition: all 0.25s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        .date-card.selected .date-card-check {
            border-color: var(--primary);
            background: var(--primary);
        }
        .date-card.selected .date-card-check svg {
            opacity: 1;
            transform: scale(1);
        }

        .date-type-icon {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 36px;
            height: 36px;
            border-radius: 10px;
            font-size: 18px;
            margin-bottom: 12px;
        }
        .date-type-icon.cafe { background: rgba(139, 94, 60, 0.2); }
        .date-type-icon.art { background: rgba(168, 85, 247, 0.15); }
        .date-type-icon.outdoor { background: rgba(52, 211, 153, 0.15); }
        .date-type-icon.food { background: rgba(251, 146, 60, 0.15); }
        .date-type-icon.fun { background: rgba(96, 165, 250, 0.15); }
        .date-type-icon.drink { background: rgba(244, 114, 182, 0.15); }

        .date-card-title {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 4px;
            padding-right: 36px;
        }
        .date-card-address {
            font-size: 12px;
            color: var(--text-hint);
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 4px;
        }
        .date-card-address svg {
            width: 12px;
            height: 12px;
            stroke: var(--text-hint);
            fill: none;
            flex-shrink: 0;
        }
        .date-card-time {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            font-size: 13px;
            color: var(--primary);
            font-weight: 500;
            margin-bottom: 10px;
            padding: 4px 10px;
            background: var(--primary-dim);
            border-radius: 6px;
        }
        .date-card-time svg {
            width: 13px;
            height: 13px;
            stroke: var(--primary);
            fill: none;
        }
        .date-card-reason {
            font-size: 13px;
            color: var(--text-sec);
            line-height: 1.6;
            padding-top: 10px;
            border-top: 1px solid var(--border);
        }
        .date-card-reason .ai-tag {
            font-size: 11px;
            color: var(--primary);
            font-weight: 500;
            margin-bottom: 4px;
            display: flex;
            align-items: center;
            gap: 3px;
        }

        /* ============ Actions ============ */
        .actions-section {
            padding: 28px 20px calc(20px + var(--safe-bottom));
        }
        .btn-confirm {
            width: 100%;
            height: 52px;
            border-radius: 26px;
            border: none;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            font-family: inherit;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            background: var(--primary);
            color: var(--bg);
            box-shadow: 0 4px 20px var(--primary-glow);
        }
        .btn-confirm:active { transform: scale(0.97); filter: brightness(0.9); }
        .btn-confirm:disabled {
            opacity: 0.35;
            pointer-events: none;
            box-shadow: none;
        }

        .secondary-actions {
            display: flex;
            gap: 12px;
            margin-top: 12px;
        }
        .btn-alt {
            flex: 1;
            height: 46px;
            border-radius: 23px;
            border: 1px solid var(--border);
            background: transparent;
            color: var(--text-sec);
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            font-family: inherit;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 5px;
        }
        .btn-alt:active { background: rgba(255,255,255,0.04); }
        .btn-alt.reject { color: var(--danger); border-color: rgba(255, 107, 107, 0.2); }
        .btn-alt.reject:active { background: rgba(255, 107, 107, 0.06); }

        /* ============ Loading Overlay ============ */
        .loading-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(10, 10, 15, 0.85);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 16px;
            z-index: 100;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s;
        }
        .loading-overlay.show { opacity: 1; pointer-events: auto; }
        .loading-spinner {
            width: 40px;
            height: 40px;
            border: 3px solid var(--border);
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .loading-text {
            font-size: 14px;
            color: var(--text-sec);
        }

        /* ============ Bottom Sheet ============ */
        .sheet-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.5);
            z-index: 100;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s;
        }
        .sheet-overlay.show { opacity: 1; pointer-events: auto; }
        .sheet {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: var(--surface);
            border-radius: 20px 20px 0 0;
            padding: 24px 20px calc(24px + var(--safe-bottom));
            z-index: 101;
            transform: translateY(100%);
            transition: transform 0.35s cubic-bezier(0.32, 0.72, 0, 1);
        }
        .sheet-overlay.show .sheet { transform: translateY(0); }
        .sheet-handle {
            width: 36px;
            height: 4px;
            border-radius: 2px;
            background: rgba(255,255,255,0.15);
            margin: 0 auto 20px;
        }
        .sheet h3 {
            font-size: 18px;
            font-weight: 600;
            text-align: center;
            margin-bottom: 8px;
        }
        .sheet p {
            font-size: 14px;
            color: var(--text-sec);
            text-align: center;
            margin-bottom: 24px;
            line-height: 1.6;
        }
        .sheet-btn {
            width: 100%;
            height: 48px;
            border-radius: 24px;
            border: none;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            font-family: inherit;
            margin-bottom: 10px;
            transition: all 0.2s;
        }
        .sheet-btn:active { transform: scale(0.98); }
        .sheet-btn.danger {
            background: var(--danger);
            color: #fff;
        }
        .sheet-btn.cancel {
            background: rgba(255,255,255,0.06);
            color: var(--text-sec);
        }

        /* ============ Result States ============ */
        .result-state {
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 60px 24px;
        }
        .result-state.show { display: flex; }
        .result-icon {
            width: 72px;
            height: 72px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 32px;
            margin-bottom: 20px;
            animation: popIn 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        @keyframes popIn {
            from { transform: scale(0); }
            to { transform: scale(1); }
        }
        .result-state h2 {
            font-size: 20px;
            font-weight: 700;
            margin-bottom: 8px;
        }
        .result-state p {
            font-size: 14px;
            color: var(--text-sec);
            line-height: 1.7;
            max-width: 280px;
        }

        /* ============ Toast ============ */
        .toast {
            position: fixed;
            top: 60px;
            left: 50%;
            transform: translateX(-50%) translateY(-20px);
            background: var(--card);
            border: 1px solid var(--border);
            color: var(--text);
            padding: 10px 20px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 500;
            opacity: 0;
            transition: all 0.3s;
            z-index: 200;
            white-space: nowrap;
            pointer-events: none;
        }
        .toast.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }

        /* ============ Responsive ============ */
        @media (min-width: 500px) {
            .hero, .section, .actions-section { max-width: 460px; margin-left: auto; margin-right: auto; }
        }
    </style>
</head>
<body>

<div id="mainContent">

    <!-- ======== Hero ======== -->
    <div class="hero">
        <div class="hero-bg"></div>
        <div class="hero-content">
            <div class="match-badge"><span class="sparkle">✨</span> AI 为你推荐</div>
            <div class="profile-card">
                <div class="photos-gallery" id="photosGallery"></div>
                <div class="profile-info">
                    <div class="profile-header">
                        <span class="profile-name" id="profileName"></span>
                        <span class="profile-age" id="profileAge"></span>
                    </div>
                    <div class="profile-tags" id="profileTags"></div>
                    <div class="profile-desc" id="profileDesc"></div>
                </div>
            </div>
        </div>
    </div>

    <!-- ======== AI Insight ======== -->
    <div class="section">
        <div class="section-header">
            <div class="section-icon" style="background:var(--primary-dim);">✨</div>
            <h2>匹配洞察</h2>
        </div>
        <div class="insight-card">
            <div class="compat-bars" id="compatBars"></div>
            <div class="insight-divider"></div>
            <div class="insight-text" id="insightText"></div>
        </div>
    </div>

    <!-- ======== Date Options ======== -->
    <div class="section" style="margin-bottom:8px;">
        <div class="section-header">
            <div class="section-icon" style="background:rgba(52,211,153,0.12);">📅</div>
            <h2>AI 推荐约会方案</h2>
        </div>
        <div class="date-options" id="dateOptions"></div>
    </div>

    <!-- ======== Actions ======== -->
    <div class="actions-section">
        <button class="btn-confirm" id="btnConfirm" disabled onclick="confirmSelection()">确认选择</button>
        <div class="secondary-actions">
            <button class="btn-alt" onclick="requestNewPlans()">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M1 4v6h6"/><path d="M23 20v-6h-6"/><path d="M20.49 9A9 9 0 005.64 5.64L1 10m22 4l-4.64 4.36A9 9 0 013.51 15"/></svg>
                换一批方案
            </button>
            <button class="btn-alt reject" onclick="showRejectSheet()">不太合适</button>
        </div>
    </div>

</div>

<!-- ======== Result: Waiting ======== -->
<div class="result-state" id="stateWaiting">
    <div class="result-icon" style="background:var(--primary-dim);">⏳</div>
    <h2>已提交，等待对方确认</h2>
    <p>你选择的约会方案已发送给对方，如果 TA 也选择了相同的方案，约会就成立啦！</p>
</div>

<!-- ======== Result: Rejected ======== -->
<div class="result-state" id="stateRejected">
    <div class="result-icon" style="background:rgba(255,107,107,0.12);">👋</div>
    <h2>已跳过此次匹配</h2>
    <p>没关系，我们会继续为你寻找更合适的人选</p>
</div>

<!-- ======== Loading Overlay ======== -->
<div class="loading-overlay" id="loadingOverlay">
    <div class="loading-spinner"></div>
    <div class="loading-text">AI 正在为你生成新方案...</div>
</div>

<!-- ======== Reject Sheet ======== -->
<div class="sheet-overlay" id="rejectSheet" onclick="hideRejectSheet(event)">
    <div class="sheet" onclick="event.stopPropagation()">
        <div class="sheet-handle"></div>
        <h3>确认跳过？</h3>
        <p>跳过后这位用户将不再向你推荐，你可以等待下一次 AI 匹配</p>
        <button class="sheet-btn danger" onclick="confirmReject()">确认跳过</button>
        <button class="sheet-btn cancel" onclick="hideRejectSheet()">再看看</button>
    </div>
</div>

<!-- ======== Toast ======== -->
<div class="toast" id="toast"></div>

<script>
/* ============ Mock Data ============ */
var MATCH_DATA = {
    partner: {
        nickname: '温柔的猫',
        age: 25,
        gender: '女',
        city: '杭州',
        district: '西湖区',
        occupation: '设计师',
        education: '本科',
        height: 165,
        photos: [],
        selfDesc: '朝九晚五设计师，周末爱逛美术馆和小众咖啡馆，养了一只橘猫，慢热但真诚'
    },
    insight: {
        dimensions: [
            { label: '兴趣爱好', score: 95, color: '#FFD93D' },
            { label: '生活方式', score: 88, color: '#51cf66' },
            { label: '性格匹配', score: 92, color: '#f783ac' }
        ],
        reason: '你们都是文艺型生活方式的爱好者，对小众咖啡馆和艺术展有共同热爱。她的慢热内敛和你的温和主动形成很好的互补，线下见面的节奏会很舒服。你们对「各自有空间也有陪伴」的恋爱节奏有一致的期待。'
    },
    datePlans: [
        [
            { id: 'a1', type: 'cafe', icon: '☕', location: 'Manner Coffee · 文三路店', address: '西湖区文三路 168 号 1 层', time: '本周六 15:00', reason: '你们都爱喝咖啡，这家店安静有氛围，很适合初次见面慢慢聊' },
            { id: 'a2', type: 'art', icon: '🎨', location: '浙江美术馆', address: '西湖区南山路 138 号', time: '本周日 14:00', reason: '你们对艺术和逛展都有兴趣，边看展边聊天话题自然不会冷场' },
            { id: 'a3', type: 'outdoor', icon: '🚶', location: '太子湾公园 City Walk', address: '西湖区南山路 5-1 号', time: '下周六 16:00', reason: '她喜欢户外散步和 City Walk，傍晚沿西湖南线漫步节奏很舒服' }
        ],
        [
            { id: 'b1', type: 'food', icon: '🍽️', location: '外婆家 · 湖滨银泰店', address: '上城区东坡路 2 号', time: '本周六 18:00', reason: '轻松的晚餐环境，适合边吃边聊，不会太正式也不会太随意' },
            { id: 'b2', type: 'fun', icon: '🎮', location: '谜途桌游馆', address: '西湖区文三路 90 号', time: '本周日 15:00', reason: '你们都对桌游感兴趣，一起玩游戏可以快速破冰，气氛轻松' },
            { id: 'b3', type: 'drink', icon: '🍷', location: '跳海酒馆', address: '上城区中山中路 77 号', time: '下周五 19:30', reason: '她标注了偶尔饮酒，清吧氛围放松，适合周末晚上的轻松社交' }
        ]
    ]
};

var currentPlanSet = 0;
var selectedDateIds = {};
var currentPhotoIdx = 0;

/* ============ Init ============ */
(function init() {
    renderProfile();
    renderInsight();
    renderDatePlans(0);
})();

/* ============ Render Profile ============ */
function renderProfile() {
    var p = MATCH_DATA.partner;
    document.getElementById('profileName').textContent = p.nickname;
    document.getElementById('profileAge').textContent = p.age + '岁';

    var tags = [
        { icon: '📍', text: p.city + ' · ' + p.district },
        { icon: '💼', text: p.occupation },
        { icon: '🎓', text: p.education },
        { icon: '📏', text: p.height + 'cm' }
    ];
    var tagsHtml = '';
    for (var i = 0; i < tags.length; i++) {
        tagsHtml += '<span class="profile-tag">' + tags[i].icon + ' ' + tags[i].text + '</span>';
    }
    document.getElementById('profileTags').innerHTML = tagsHtml;
    document.getElementById('profileDesc').textContent = '「' + p.selfDesc + '」';

    renderPhotos(p);
}

function renderPhotos(p) {
    var gallery = document.getElementById('photosGallery');
    var photos = p.photos && p.photos.length > 0 ? p.photos : [];

    if (photos.length === 0) {
        var colors = ['linear-gradient(135deg,#667eea,#764ba2)','linear-gradient(135deg,#f093fb,#f5576c)','linear-gradient(135deg,#4facfe,#00f2fe)'];
        photos = [colors[0]];
    }

    var imgHtml = '';
    var dotsHtml = '';
    for (var i = 0; i < photos.length; i++) {
        var isGradient = photos[i].indexOf('gradient') > -1;
        if (isGradient) {
            imgHtml += '<div style="width:100%;height:100%;position:absolute;top:0;left:0;background:' + photos[i] + ';display:flex;align-items:center;justify-content:center;opacity:' + (i === 0 ? 1 : 0) + ';transition:opacity 0.4s;" class="photo-item' + (i === 0 ? ' active' : '') + '">' +
                '<span style="font-size:64px;opacity:0.6;">🙂</span></div>';
        } else {
            imgHtml += '<img src="' + photos[i] + '" class="' + (i === 0 ? 'active' : '') + '" alt="">';
        }
        dotsHtml += '<div class="dot' + (i === 0 ? ' active' : '') + '"></div>';
    }

    var tapZones = photos.length > 1 ? '<div class="photo-tap-zones"><div class="zone" onclick="switchPhoto(-1)"></div><div class="zone" onclick="switchPhoto(1)"></div></div>' : '';

    gallery.innerHTML = (photos.length > 1 ? '<div class="photo-indicators">' + dotsHtml + '</div>' : '') + imgHtml + tapZones;
}

function switchPhoto(dir) {
    var items = document.querySelectorAll('#photosGallery .photo-item, #photosGallery img');
    if (items.length <= 1) return;
    items[currentPhotoIdx].classList.remove('active');
    if (items[currentPhotoIdx].style) items[currentPhotoIdx].style.opacity = '0';
    currentPhotoIdx = (currentPhotoIdx + dir + items.length) % items.length;
    items[currentPhotoIdx].classList.add('active');
    if (items[currentPhotoIdx].style) items[currentPhotoIdx].style.opacity = '1';

    var dots = document.querySelectorAll('.photo-indicators .dot');
    dots.forEach(function(d) { d.classList.remove('active'); });
    if (dots[currentPhotoIdx]) dots[currentPhotoIdx].classList.add('active');
}

/* ============ Render Insight ============ */
function renderInsight() {
    var dims = MATCH_DATA.insight.dimensions;
    var html = '';
    var circumference = 2 * Math.PI * 23;
    for (var i = 0; i < dims.length; i++) {
        var offset = circumference - (dims[i].score / 100) * circumference;
        html += '<div class="compat-item">' +
            '<div class="compat-ring">' +
            '<svg viewBox="0 0 56 56"><circle class="bg-circle" cx="28" cy="28" r="23"/>' +
            '<circle class="fg-circle" cx="28" cy="28" r="23" stroke="' + dims[i].color + '" stroke-dasharray="' + circumference + '" stroke-dashoffset="' + offset + '"/></svg>' +
            '<span class="score-text" style="color:' + dims[i].color + '">' + dims[i].score + '</span>' +
            '</div>' +
            '<div class="compat-label">' + dims[i].label + '</div></div>';
    }
    document.getElementById('compatBars').innerHTML = html;
    document.getElementById('insightText').innerHTML += MATCH_DATA.insight.reason;
}

/* ============ Render Date Plans ============ */
function renderDatePlans(setIdx) {
    var plans = MATCH_DATA.datePlans[setIdx] || [];
    var container = document.getElementById('dateOptions');
    var html = '';
    selectedDateIds = {};

    for (var i = 0; i < plans.length; i++) {
        var d = plans[i];
        html += '<div class="date-card" data-id="' + d.id + '" onclick="toggleDateCard(this)">' +
            '<div class="date-card-check"><svg viewBox="0 0 24 24"><path d="M20 6L9 17l-5-5"/></svg></div>' +
            '<div class="date-type-icon ' + d.type + '">' + d.icon + '</div>' +
            '<div class="date-card-time"><svg viewBox="0 0 24 24" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/></svg>' + d.time + '</div>' +
            '<div class="date-card-title">' + d.location + '</div>' +
            '<div class="date-card-address"><svg viewBox="0 0 24 24" stroke-width="2"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0118 0z"/><circle cx="12" cy="10" r="3"/></svg>' + d.address + '</div>' +
            '<div class="date-card-reason"><div class="ai-tag">🤖 AI 推荐理由</div>' + d.reason + '</div>' +
            '</div>';
    }
    container.innerHTML = html;
    updateConfirmBtn();
}

function toggleDateCard(card) {
    var id = card.getAttribute('data-id');
    if (card.classList.contains('selected')) {
        card.classList.remove('selected');
        delete selectedDateIds[id];
    } else {
        card.classList.add('selected');
        selectedDateIds[id] = true;
    }
    updateConfirmBtn();
}

function updateConfirmBtn() {
    var count = Object.keys(selectedDateIds).length;
    var btn = document.getElementById('btnConfirm');
    btn.disabled = count === 0;
    btn.textContent = count > 0 ? '确认选择（' + count + '个方案）' : '确认选择';
}

/* ============ Actions ============ */
function confirmSelection() {
    var ids = Object.keys(selectedDateIds);
    if (ids.length === 0) return;
    console.log('已选择的约会方案:', ids);
    document.getElementById('mainContent').style.display = 'none';
    document.getElementById('stateWaiting').classList.add('show');
    showToast('已提交！');
}

function requestNewPlans() {
    var overlay = document.getElementById('loadingOverlay');
    overlay.classList.add('show');
    setTimeout(function() {
        currentPlanSet = (currentPlanSet + 1) % MATCH_DATA.datePlans.length;
        renderDatePlans(currentPlanSet);
        overlay.classList.remove('show');
        var section = document.getElementById('dateOptions');
        section.scrollIntoView({ behavior: 'smooth', block: 'start' });
        showToast('已生成新方案');
    }, 1500);
}

function showRejectSheet() {
    document.getElementById('rejectSheet').classList.add('show');
}
function hideRejectSheet(e) {
    if (e && e.target !== document.getElementById('rejectSheet')) return;
    document.getElementById('rejectSheet').classList.remove('show');
}
function confirmReject() {
    document.getElementById('rejectSheet').classList.remove('show');
    document.getElementById('mainContent').style.display = 'none';
    document.getElementById('stateRejected').classList.add('show');
}

function showToast(msg) {
    var t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(function() { t.classList.remove('show'); }, 2200);
}
</script>
</body>
</html>
