<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Zup 抓取商户审核台</title>
  <link rel="stylesheet" href="/workspace-nav.css">
  <style>
    :root{
      --bg:#f3f6f4;
      --panel:#fcfffd;
      --text:#142018;
      --muted:#5f6d64;
      --line:#d8e3dc;
      --yellow:#ffd84d;
      --green:#2a9d68;
      --red:#d95040;
      --ink:#101814;
    }
    *{box-sizing:border-box}
    body{margin:0;background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif}
    button,input{font:inherit}
    .top{position:sticky;top:0;z-index:20;background:rgba(243,246,244,.92);backdrop-filter:blur(14px);border-bottom:1px solid var(--line)}
    .top-inner{max-width:1180px;margin:0 auto;padding:18px 20px;display:flex;gap:16px;align-items:center;justify-content:space-between}
    h1{margin:0;font-size:22px;font-weight:800}
    .meta{margin-top:5px;color:var(--muted);font-size:13px}
    .save-state{display:inline-flex;align-items:center;height:24px;border-radius:999px;margin-top:8px;padding:0 9px;background:#e8efe9;color:#476054;font-size:12px;font-weight:700}
    .save-state.ok{background:#e7f5ec;color:#197549}
    .save-state.warn{background:#fff3c4;color:#806200}
    .save-state.error{background:#fde8e4;color:#ad382c}
    .btn{height:36px;border:1px solid var(--line);background:#fff;border-radius:8px;padding:0 12px;cursor:pointer;color:var(--ink)}
    .btn.primary{border-color:#111;background:#111;color:#fff}
    .wrap{max-width:1180px;margin:0 auto;padding:18px 20px 44px}
    .stats{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:10px;margin-bottom:14px}
    .stat{background:var(--panel);border:1px solid var(--line);border-radius:8px;padding:12px}
    .stat b{display:block;font-size:22px;line-height:1.1}
    .stat span{display:block;margin-top:5px;color:var(--muted);font-size:12px}
    .filters{display:grid;gap:14px;margin-bottom:18px}
    .filter-row{display:grid;grid-template-columns:52px minmax(0,1fr);gap:10px 12px;align-items:start}
    .filter-label{padding-top:9px;font-size:12px;font-weight:700;color:var(--muted);letter-spacing:.02em}
    .filter-tools{display:flex;flex-wrap:wrap;gap:10px;align-items:center}
    .city-filter{display:flex;flex-wrap:wrap;gap:8px}
    .city-chip{
      display:inline-flex;flex-direction:column;align-items:flex-start;gap:5px;
      min-width:78px;padding:9px 12px;border:1px solid var(--line);border-radius:10px;
      background:#fff;cursor:pointer;color:var(--text);text-align:left;transition:border-color .15s,box-shadow .15s
    }
    .city-chip:hover{border-color:#b8c9be;box-shadow:0 2px 8px rgba(20,32,24,.05)}
    .city-chip.active{background:#111;border-color:#111;color:#fff;box-shadow:none}
    .city-chip.has-pending:not(.active){border-color:#e6cf66;background:#fffdf4}
    .city-chip-name{font-size:14px;font-weight:800;line-height:1.1}
    .city-chip-counts{display:flex;flex-wrap:wrap;gap:6px;font-size:11px;line-height:1.2;color:var(--muted)}
    .city-chip.active .city-chip-counts{color:rgba(255,255,255,.78)}
    .city-chip-count{font-weight:600}
    .city-chip-pending{font-weight:800;color:#9a7200}
    .city-chip.active .city-chip-pending{color:#ffd84d}
    .city-chip-pending.is-zero{opacity:.55;font-weight:600}
    .city-chip.active .city-chip-pending.is-zero{opacity:.45}
    .seg{display:inline-flex;flex-wrap:wrap;border:1px solid var(--line);border-radius:8px;overflow:hidden;background:#fff}
    .seg button{height:34px;border:0;border-right:1px solid var(--line);background:transparent;padding:0 12px;cursor:pointer;color:var(--muted)}
    .seg button:last-child{border-right:0}
    .seg button.active{background:#111;color:#fff}
    .search{height:36px;border:1px solid var(--line);border-radius:8px;background:#fff;padding:0 12px;min-width:220px;flex:1 1 220px}
    .grid{display:grid;gap:12px}
    .card{background:var(--panel);border:1px solid var(--line);border-radius:8px;display:grid;grid-template-columns:auto minmax(0,1fr);overflow:hidden}
    .cover-wrap{align-self:start;background:#e6eee8;border-right:1px solid var(--line);padding:8px}
    .cover{display:block;width:auto;max-width:220px;height:auto;object-fit:contain;object-position:top left;background:#e6eee8}
    .body{padding:13px 14px}
    .title{margin:0;font-size:17px;font-weight:800}
    .chips{display:flex;gap:6px;flex-wrap:wrap;margin:10px 0}
    .chip{font-size:12px;padding:4px 8px;border-radius:999px;background:#edf3ef;color:#4d6256}
    .chip.warn{background:#fff3c4;color:#806200}
    .info{display:grid;gap:5px;font-size:13px;color:#314036}
    .source-url{display:grid;gap:3px;font-size:12px;color:var(--muted);word-break:break-all}
    .source-url a{color:#2f6d4d}
    .source-url .label{font-weight:700;color:#4d6256}
    .card-actions{display:flex;gap:8px;margin-top:12px;flex-wrap:wrap}
    .mini{height:31px;border:1px solid var(--line);border-radius:8px;background:#fff;padding:0 10px;cursor:pointer}
    .mini.approve.active{background:var(--green);border-color:var(--green);color:#fff}
    .mini.reject.active{background:var(--red);border-color:var(--red);color:#fff}
    .mini.pending.active{background:var(--yellow);border-color:var(--yellow);color:#211b10}
    .link{margin-left:auto;color:#2f6d4d;text-decoration:none;font-size:13px}
    .empty{padding:44px;text-align:center;color:var(--muted);background:var(--panel);border:1px solid var(--line);border-radius:8px}
    @media (max-width:820px){
      .stats{grid-template-columns:repeat(2,minmax(0,1fr))}
      .filter-row{grid-template-columns:1fr}
      .filter-label{padding-top:0}
      .cover{max-width:min(160px,36vw)}
      .search{width:100%;min-width:0;flex-basis:100%}
    }
  </style>
</head>
<body>
  <header class="top">
    <div class="top-inner">
      <div>
        <nav class="workspace-nav" aria-label="工作区">
          <a href="/">活动审核</a>
          <a href="/merchants.html" class="active">商户审核</a>
        </nav>
        <h1>Zup 抓取商户审核台</h1>
        <div class="meta" id="sourceMeta">读取本地商户数据中...</div>
        <div class="save-state warn" id="saveState">正在连接本地数据库</div>
      </div>
      <div>
        <button class="btn primary" id="exportBtn">导出通过列表</button>
      </div>
    </div>
  </header>

  <main class="wrap">
    <section class="stats" id="stats"></section>
    <section class="filters">
      <div class="filter-row">
        <div class="filter-label">城市</div>
        <div class="city-filter" id="cityFilter"></div>
      </div>
      <div class="filter-row">
        <div class="filter-label">筛选</div>
        <div class="filter-tools">
          <div class="seg" id="statusFilter">
            <button data-status="all" class="active">全部</button>
            <button data-status="approved">已通过</button>
            <button data-status="rejected">已拒绝</button>
            <button data-status="pending">待定</button>
          </div>
          <input class="search" id="searchInput" placeholder="搜索店名、商圈、关键词">
        </div>
      </div>
    </section>
    <section class="grid" id="merchantGrid"></section>
  </main>

  <script>
    const state = {
      merchants: [],
      decisions: {},
      filters: { city: "all", status: "all", search: "" },
    };

    const els = {
      sourceMeta: document.getElementById("sourceMeta"),
      saveState: document.getElementById("saveState"),
      stats: document.getElementById("stats"),
      grid: document.getElementById("merchantGrid"),
      cityFilter: document.getElementById("cityFilter"),
      statusFilter: document.getElementById("statusFilter"),
      searchInput: document.getElementById("searchInput"),
      exportBtn: document.getElementById("exportBtn"),
    };

    function setSaveState(text, kind = "warn") {
      els.saveState.textContent = text;
      els.saveState.className = `save-state ${kind}`;
    }

    function escapeHtml(value) {
      return String(value || "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;");
    }

    function merchantDetailUrl(item) {
      return item.originalLink || item.original_link || "";
    }

    function proxyImage(src) {
      return src ? `/api/image?src=${encodeURIComponent(src)}&referer=${encodeURIComponent("https://www.dianping.com/")}` : "";
    }

    function reviewStatus(uid) {
      return state.decisions[uid] || "pending";
    }

    async function loadReviewState() {
      const response = await fetch("/api/merchant-review-state", { cache: "no-store" });
      const payload = await response.json();
      state.decisions = payload.decisions || {};
    }

    async function loadMerchants() {
      const response = await fetch("/api/merchants", { cache: "no-store" });
      const payload = await response.json();
      state.merchants = payload.merchants || [];
      render();
      setSaveState("已连接本地数据库", "ok");
    }

    async function saveReviewState() {
      setSaveState("保存中...", "warn");
      const response = await fetch("/api/merchant-review-state", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ decisions: state.decisions }),
      });
      if (!response.ok) {
        setSaveState("保存失败", "error");
        return;
      }
      setSaveState("已保存", "ok");
      render();
    }

    function setDecision(uid, status) {
      state.decisions[uid] = status;
      saveReviewState();
    }

    function getCityKey(item) {
      return item.city || "未知城市";
    }

    function merchantsInCity() {
      return state.merchants.filter((item) => {
        if (state.filters.city !== "all" && getCityKey(item) !== state.filters.city) return false;
        return true;
      });
    }

    function cityStats(cityKey) {
      const list = cityKey === "all"
        ? state.merchants
        : state.merchants.filter((item) => getCityKey(item) === cityKey);
      const total = list.length;
      const pending = list.filter((item) => reviewStatus(item.merchant_uid) === "pending").length;
      return { total, pending };
    }

    function renderCityChip(cityKey, label) {
      const { total, pending } = cityStats(cityKey);
      const active = state.filters.city === cityKey;
      const pendingClass = pending > 0 ? "" : " is-zero";
      return `
        <button
          type="button"
          data-city="${escapeHtml(cityKey)}"
          class="city-chip ${active ? "active" : ""} ${pending > 0 ? "has-pending" : ""}"
        >
          <span class="city-chip-name">${escapeHtml(label)}</span>
          <span class="city-chip-counts">
            <span class="city-chip-count">共 ${total}</span>
            <span class="city-chip-pending${pendingClass}">待定 ${pending}</span>
          </span>
        </button>
      `;
    }

    function filteredMerchants() {
      const q = state.filters.search.trim().toLowerCase();
      return merchantsInCity().filter((item) => {
        const status = reviewStatus(item.merchant_uid);
        if (state.filters.status !== "all" && status !== state.filters.status) return false;
        if (!q) return true;
        const haystack = `${item.name} ${item.address} ${item.district} ${item.category} ${item.search_keyword}`.toLowerCase();
        return haystack.includes(q);
      });
    }

    function renderStats() {
      const scoped = merchantsInCity();
      const total = scoped.length;
      const approved = scoped.filter((item) => reviewStatus(item.merchant_uid) === "approved").length;
      const pending = scoped.filter((item) => reviewStatus(item.merchant_uid) === "pending").length;
      const rejected = scoped.filter((item) => reviewStatus(item.merchant_uid) === "rejected").length;
      const cityLabel = state.filters.city === "all" ? "全部城市" : state.filters.city;

      els.stats.innerHTML = [
        ["商户总数", total],
        ["已通过", approved],
        ["待定", pending],
        ["已拒绝", rejected],
      ].map(([label, value]) => `<div class="stat"><b>${value}</b><span>${label}</span></div>`).join("");

      const cityNames = [...new Set(state.merchants.map((item) => getCityKey(item)))].sort((a, b) => a.localeCompare(b, "zh-CN"));
      els.sourceMeta.textContent = cityLabel === "全部城市"
        ? `共 ${cityNames.length} 个城市 · ${state.merchants.length} 家商户`
        : `${cityLabel} · ${total} 家商户`;
    }

    function renderCityFilter() {
      const cities = [...new Set(state.merchants.map((item) => getCityKey(item)))].sort((a, b) => {
        const pendingDiff = cityStats(b).pending - cityStats(a).pending;
        if (pendingDiff !== 0) return pendingDiff;
        return a.localeCompare(b, "zh-CN");
      });
      els.cityFilter.innerHTML = renderCityChip("all", "全部城市")
        + cities.map((city) => renderCityChip(city, city)).join("");
    }

    function renderCards(list) {
      if (!list.length) {
        els.grid.innerHTML = `<div class="empty">没有符合条件的商户。请先用 scrape-dianping-merchants 导入，或调整筛选。</div>`;
        return;
      }
      els.grid.innerHTML = list.map((item) => {
        const status = reviewStatus(item.merchant_uid);
        const addressLine = item.address || `商圈：${item.district || item.list_region_text || "未知"}`;
        const detailUrl = merchantDetailUrl(item);
        const chips = [
          item.city ? `<span class="chip">${escapeHtml(item.city)}</span>` : "",
          item.category ? `<span class="chip">${escapeHtml(item.category)}</span>` : "",
          item.search_keyword ? `<span class="chip">关键词 ${escapeHtml(item.search_keyword)}</span>` : "",
        ].join("");
        return `
          <article class="card" data-uid="${item.merchant_uid}">
            <div class="cover-wrap">
              <img class="cover" src="${proxyImage(item.image)}" alt="${escapeHtml(item.name)}" loading="lazy">
            </div>
            <div class="body">
              <h2 class="title">${escapeHtml(item.name)}</h2>
              <div class="chips">${chips}</div>
              <div class="info">
                <div>${escapeHtml(addressLine)}</div>
                <div>${escapeHtml(item.avg_price || "")} ${item.review_count ? `${item.review_count} 条评价` : ""}</div>
                ${detailUrl ? `
                <div class="source-url">
                  <span class="label">大众点评详情页</span>
                  <a href="${escapeHtml(detailUrl)}" target="_blank" rel="noopener">${escapeHtml(detailUrl)}</a>
                </div>` : ""}
              </div>
              <div class="card-actions">
                <button class="mini approve ${status === "approved" ? "active" : ""}" data-action="approved">通过</button>
                <button class="mini pending ${status === "pending" ? "active" : ""}" data-action="pending">待定</button>
                <button class="mini reject ${status === "rejected" ? "active" : ""}" data-action="rejected">拒绝</button>
                ${detailUrl ? `<a class="link" href="${escapeHtml(detailUrl)}" target="_blank" rel="noopener">打开详情页</a>` : ""}
              </div>
            </div>
          </article>
        `;
      }).join("");
    }

    function render() {
      const list = filteredMerchants();
      renderStats();
      renderCityFilter();
      renderCards(list);
    }

    els.cityFilter.addEventListener("click", (event) => {
      const button = event.target.closest("button[data-city]");
      if (!button) return;
      state.filters.city = button.dataset.city;
      render();
    });

    els.statusFilter.addEventListener("click", (event) => {
      const button = event.target.closest("button[data-status]");
      if (!button) return;
      state.filters.status = button.dataset.status;
      [...els.statusFilter.querySelectorAll("button")].forEach((node) => node.classList.toggle("active", node === button));
      render();
    });

    els.searchInput.addEventListener("input", (event) => {
      state.filters.search = event.target.value;
      render();
    });

    els.grid.addEventListener("click", (event) => {
      const button = event.target.closest("button[data-action]");
      if (!button) return;
      const card = button.closest("[data-uid]");
      if (!card) return;
      setDecision(card.dataset.uid, button.dataset.action);
    });

    els.exportBtn.addEventListener("click", async () => {
      const response = await fetch("/api/approved-merchants", { cache: "no-store" });
      const payload = await response.json();
      const blob = new Blob([JSON.stringify(payload, null, 2)], { type: "application/json" });
      const url = URL.createObjectURL(blob);
      const anchor = document.createElement("a");
      anchor.href = url;
      anchor.download = "approved-merchants.json";
      anchor.click();
      URL.revokeObjectURL(url);
    });

    async function boot() {
      try {
        await loadReviewState();
        await loadMerchants();
      } catch (error) {
        setSaveState(`连接失败: ${error.message}`, "error");
      }
    }

    boot();
  </script>
</body>
</html>
