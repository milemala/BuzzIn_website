<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Zup 抓取商户审核台</title>
  <link rel="stylesheet" href="/workspace-nav.css">
  <link rel="stylesheet" href="/buzz-env-ui.css">
  <style>
    :root{
      --bg:#f3f6f4;
      --panel:#fcfffd;
      --text:#142018;
      --muted:#5f6d64;
      --line:#d8e3dc;
      --yellow:#ffd84d;
      --green:#2a9d68;
      --red:#d95040;
      --ink:#101814;
    }
    *{box-sizing:border-box}
    body{margin:0;background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif}
    button,input{font:inherit}
    .top{background:rgba(243,246,244,.92);border-bottom:1px solid var(--line)}
    .top-inner{max-width:1180px;margin:0 auto;padding:18px 20px;display:flex;gap:16px;align-items:center;justify-content:space-between}
    h1{margin:0;font-size:22px;font-weight:800}
    .meta{margin-top:5px;color:var(--muted);font-size:13px}
    .save-state{display:inline-flex;align-items:center;height:24px;border-radius:999px;margin-top:8px;padding:0 9px;background:#e8efe9;color:#476054;font-size:12px;font-weight:700}
    .save-state.ok{background:#e7f5ec;color:#197549}
    .save-state.warn{background:#fff3c4;color:#806200}
    .save-state.error{background:#fde8e4;color:#ad382c}
    .btn{height:36px;border:1px solid var(--line);background:#fff;border-radius:8px;padding:0 12px;cursor:pointer;color:var(--ink)}
    .btn.primary{border-color:#111;background:#111;color:#fff}
    .wrap{max-width:1180px;margin:0 auto;padding:18px 20px 44px}
    .stats{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:10px;margin-bottom:14px}
    .stat{background:var(--panel);border:1px solid var(--line);border-radius:8px;padding:12px}
    .stat b{display:block;font-size:22px;line-height:1.1}
    .stat span{display:block;margin-top:5px;color:var(--muted);font-size:12px}
    .filters{display:grid;gap:14px;margin-bottom:18px}
    .filter-row{display:grid;grid-template-columns:52px minmax(0,1fr);gap:10px 12px;align-items:start}
    .filter-label{padding-top:9px;font-size:12px;font-weight:700;color:var(--muted);letter-spacing:.02em}
    .filter-tools{display:flex;flex-wrap:wrap;gap:10px;align-items:center}
    .city-filter{display:flex;flex-wrap:wrap;gap:8px}
    .city-chip{
      display:inline-flex;flex-direction:column;align-items:flex-start;gap:5px;
      min-width:78px;padding:9px 12px;border:1px solid var(--line);border-radius:10px;
      background:#fff;cursor:pointer;color:var(--text);text-align:left;transition:border-color .15s,box-shadow .15s
    }
    .city-chip:hover{border-color:#b8c9be;box-shadow:0 2px 8px rgba(20,32,24,.05)}
    .city-chip.active{background:#111;border-color:#111;color:#fff;box-shadow:none}
    .city-chip.has-pending:not(.active){border-color:#e6cf66;background:#fffdf4}
    .city-chip-name{font-size:14px;font-weight:800;line-height:1.1}
    .city-chip-counts{display:flex;flex-wrap:wrap;gap:6px;font-size:11px;line-height:1.2;color:var(--muted)}
    .city-chip.active .city-chip-counts{color:rgba(255,255,255,.78)}
    .city-chip-count{font-weight:600}
    .city-chip-imported{font-weight:800;color:#2f6d4d}
    .city-chip.active .city-chip-imported{color:#9dffc8}
    .city-chip-imported.is-zero{opacity:.55;font-weight:600}
    .city-chip.active .city-chip-imported.is-zero{opacity:.45}
    .city-chip-pending{font-weight:800;color:#9a7200}
    .city-chip.active .city-chip-pending{color:#ffd84d}
    .city-chip-pending.is-zero{opacity:.55;font-weight:600}
    .city-chip.active .city-chip-pending.is-zero{opacity:.45}
    .city-chip-pending-import{font-weight:800;color:#197549}
    .city-chip.active .city-chip-pending-import{color:#9dffc8}
    .city-chip-pending-import.is-zero{opacity:.55;font-weight:600}
    .city-chip.active .city-chip-pending-import.is-zero{opacity:.45}
    .seg{display:inline-flex;flex-wrap:wrap;border:1px solid var(--line);border-radius:8px;overflow:hidden;background:#fff}
    .seg button{
      min-height:44px;border:0;border-right:1px solid var(--line);background:transparent;padding:5px 10px;cursor:pointer;color:var(--muted);
      display:inline-flex;flex-direction:column;align-items:center;justify-content:center;gap:1px;line-height:1.15
    }
    .seg button:last-child{border-right:0}
    .seg button.active{background:#111;color:#fff}
    .seg-btn-label{font-size:13px}
    .seg-btn-count{font-size:11px;font-weight:700;opacity:.72}
    .seg button.active .seg-btn-count{opacity:.88}
    .search{height:36px;border:1px solid var(--line);border-radius:8px;background:#fff;padding:0 12px;min-width:220px;flex:1 1 220px}
    .grid{display:grid;gap:12px}
    .card{background:var(--panel);border:1px solid var(--line);border-radius:8px;display:grid;grid-template-columns:auto minmax(0,1fr);overflow:hidden}
    .cover-wrap{align-self:start;background:#e6eee8;border-right:1px solid var(--line);padding:8px}
    .cover{display:block;width:auto;max-width:220px;height:auto;object-fit:contain;object-position:top left;background:#e6eee8}
    .body{padding:13px 14px}
    .title{margin:0;font-size:17px;font-weight:800}
    .merchant-name-field{margin-bottom:4px}
    .merchant-name-field input{width:100%;margin:0;font-size:17px;font-weight:800;border:1px solid var(--line);border-radius:8px;padding:6px 8px;background:#fff}
    .merchant-name-field input:focus{border-color:#7aa88e;outline:none;box-shadow:0 0 0 2px rgba(42,157,104,.12)}
    .chips{display:flex;gap:6px;flex-wrap:wrap;margin:10px 0}
    .chip{font-size:12px;padding:4px 8px;border-radius:999px;background:#edf3ef;color:#4d6256}
    .chip.warn{background:#fff3c4;color:#806200}
    .info{display:grid;gap:5px;font-size:13px;color:#314036}
    .source-url{display:grid;gap:3px;font-size:12px;color:var(--muted);word-break:break-all}
    .source-url a{color:#2f6d4d}
    .source-url .label{font-weight:700;color:#4d6256}
    .card-actions{display:flex;gap:8px;margin-top:12px;flex-wrap:wrap}
    .mini{height:31px;border:1px solid var(--line);border-radius:8px;background:#fff;padding:0 10px;cursor:pointer}
    .mini.approve.active{background:var(--green);border-color:var(--green);color:#fff}
    .mini.reject.active{background:var(--red);border-color:var(--red);color:#fff}
    .mini.pending.active{background:var(--yellow);border-color:var(--yellow);color:#211b10}
    .mini.pending.incomplete,.mini.pending.incomplete.active{background:#ece8e0;border-color:#d8d2c6;color:#8a8278}
    .batch-review-bar{display:none;align-items:center;gap:10px;flex-wrap:wrap;margin:0 0 14px;padding:10px 12px;background:#fffdf6;border:1px solid var(--line);border-radius:8px}
    .batch-review-bar.visible{display:flex}
    .batch-review-hint{color:var(--muted);font-size:13px}
    .link{margin-left:auto;color:#2f6d4d;text-decoration:none;font-size:13px}
    .top-actions{display:flex;gap:8px;flex-wrap:wrap;justify-content:flex-end}
    .import-block{margin-top:12px;padding:12px;border:1px solid var(--line);border-radius:8px;background:#f7faf8}
    .import-block h3{margin:0 0 8px;font-size:13px;font-weight:800;color:#314036}
    .import-row{display:grid;gap:8px;font-size:13px}
    .import-meta{color:var(--muted);font-size:12px;line-height:1.45;word-break:break-all}
    .entity-id{font-size:11px;color:var(--muted);line-height:1.45;word-break:break-all;margin-top:4px}
    .entity-id strong{color:#314036;font-weight:700;font-family:ui-monospace,Menlo,Consolas,monospace}
    .addr-label{font-size:11px;font-weight:700;color:var(--muted);margin-right:4px}
    .import-field{display:grid;gap:4px}
    .import-field label{font-size:11px;font-weight:700;color:var(--muted)}
    .import-field select,.import-field input{height:32px;border:1px solid var(--line);border-radius:6px;padding:0 8px;background:#fff}
    .chip.ready{background:#e7f5ec;color:#197549}
    .chip.miss{background:#fde8e4;color:#ad382c}
    .chip.poi-doubt{background:#fff3c4;color:#806200}
    .poi-warn{margin-top:8px;padding:8px 10px;border-radius:8px;background:#fff8e6;border:1px solid #f0d98a;color:#7a5b00;font-size:12px;line-height:1.45}
    .poi-warn b{display:block;margin-bottom:4px}
    .poi-hint{margin:6px 0 0;font-size:11px;line-height:1.45;color:var(--muted)}
    .poi-search-row{display:flex;gap:8px;flex-wrap:wrap;margin-top:8px}
    .poi-search-row input{flex:1 1 180px;height:32px;border:1px solid var(--line);border-radius:6px;padding:0 8px;background:#fff}
    .poi-cands-label{margin-top:10px;font-size:11px;font-weight:700;color:var(--muted)}
    .poi-cands{display:grid;gap:6px;margin-top:6px}
    .poi-cand{display:flex;gap:8px;align-items:flex-start;padding:8px;border:1px solid var(--line);border-radius:8px;background:#fff;cursor:pointer;text-align:left}
    .poi-cand:hover{border-color:#9ab5a4}
    .poi-cand.active{border-color:#2a9d68;background:#f2fbf6}
    .poi-cand b{display:block;font-size:13px}
    .poi-cand span{display:block;font-size:11px;color:var(--muted);margin-top:2px}
    .empty{padding:44px;text-align:center;color:var(--muted);background:var(--panel);border:1px solid var(--line);border-radius:8px}
    .pager{display:flex;flex-wrap:wrap;gap:10px;align-items:center;justify-content:space-between;margin-top:16px;padding:12px 14px;background:var(--panel);border:1px solid var(--line);border-radius:8px}
    .pager-info{font-size:13px;color:var(--muted)}
    .pager-actions{display:flex;flex-wrap:wrap;gap:8px;align-items:center}
    .pager-actions .mini{min-width:36px}
    .pager-actions .mini.active{background:#111;border-color:#111;color:#fff}
    .pager-actions .mini:disabled{opacity:.45;cursor:not-allowed}
    .back-top{
      position:fixed;right:20px;bottom:20px;z-index:30;
      width:44px;height:44px;border:1px solid var(--line);border-radius:999px;
      background:#fff;color:var(--ink);cursor:pointer;box-shadow:0 4px 16px rgba(20,32,24,.12);
      opacity:0;visibility:hidden;transform:translateY(8px);transition:opacity .2s,transform .2s,visibility .2s
    }
    .back-top.visible{opacity:1;visibility:visible;transform:translateY(0)}
    .back-top:hover{border-color:#9ab5a4}
    .import-status{margin-top:8px;font-size:12px;line-height:1.45}
    .import-status.imported{color:#197549;font-weight:800}
    .import-status.failed{color:#ad382c}
    .import-status.pending{color:var(--muted)}
    .mini.import-merchant{border-color:#111}
    .mini.import-merchant:disabled{opacity:.45;cursor:not-allowed}
    .mini.import-merchant.done{background:#e7f5ec;border-color:#2a9d68;color:#197549}
    .mini.delete-buzz,.mini.delete-local{border-color:#d95040;color:#ad382c}
    .mini.delete-buzz:hover,.mini.delete-local:hover{background:#fde8e4}
    .import-modal{position:fixed;inset:0;z-index:100;display:grid;place-items:center;padding:20px}
    .import-modal[hidden]{display:none}
    .import-modal-backdrop{position:absolute;inset:0;background:rgba(16,24,20,.45)}
    .import-modal-panel{
      position:relative;width:min(440px,100%);background:#fff;border:1px solid var(--line);border-radius:12px;
      padding:20px 20px 16px;box-shadow:0 16px 48px rgba(20,32,24,.18)
    }
    .import-modal-panel h2{margin:0 0 6px;font-size:18px;font-weight:800}
    .import-modal-scope{margin:0 0 14px;color:var(--muted);font-size:13px}
    .import-progress-track{height:10px;border-radius:999px;background:#e8efe9;overflow:hidden;margin-bottom:12px}
    .import-progress-bar{height:100%;width:0;background:linear-gradient(90deg,#2a9d68,#3fbf7f);border-radius:999px;transition:width .35s ease}
    .import-progress-stats{display:grid;gap:6px;font-size:13px;color:#314036;line-height:1.45}
    .import-progress-stats b{font-weight:800}
    .import-progress-latest{margin-top:12px;padding:10px 12px;border-radius:8px;background:#f7faf8;border:1px solid var(--line);font-size:12px;color:var(--muted);line-height:1.45;min-height:44px}
    .import-progress-latest strong{display:block;color:#314036;font-size:13px;margin-bottom:2px}
    .import-modal-actions{display:flex;justify-content:flex-end;gap:8px;margin-top:16px}
    .import-modal-actions .btn{min-width:88px}
    .import-modal-actions .btn:disabled{opacity:.45;cursor:not-allowed}
    .import-modal-actions .btn.abort{border-color:#d95040;color:#ad382c}
    @media (max-width:820px){
      .stats{grid-template-columns:repeat(2,minmax(0,1fr))}
      .filter-row{grid-template-columns:1fr}
      .filter-label{padding-top:0}
      .cover{max-width:min(160px,36vw)}
      .search{width:100%;min-width:0;flex-basis:100%}
    }
  </style>
</head>
<body>
  <header class="top">
    <div class="top-inner">
      <div>
        <nav class="workspace-nav" aria-label="工作区">
          <a href="/">活动审核</a>
          <a href="/merchants.html" class="active">商户审核</a>
          <a href="/merchant-bubbles.html">商户气泡</a>
        </nav>
        <div class="buzz-env-bar" id="buzzEnvBar"></div>
        <h1>Zup 抓取商户审核台</h1>
        <div class="meta" id="sourceMeta">读取本地商户数据中...</div>
        <div class="save-state warn" id="saveState">正在连接本地数据库</div>
      </div>
      <div class="top-actions">
        <div class="seg" id="poiModeToggle" title="只影响「POI 存疑」标记和批量自动选点规则，不会重搜已绑定的 POI">
          <button type="button" data-mode="normal"><span class="seg-btn-label">标准存疑</span></button>
          <button type="button" data-mode="strict"><span class="seg-btn-label">严格存疑</span></button>
        </div>
        <button class="btn" id="batchPoiBtn" type="button">批量补全 POI</button>
        <button class="btn primary" id="batchImportBtn" type="button">批量推送 Zup</button>
        <button class="btn" id="exportImportBtn" type="button">导出推送 Zup JSON</button>
        <button class="btn" id="syncFromBuzzBtn" type="button">从当前环境补全商户</button>
      </div>
    </div>
  </header>

  <main class="wrap">
    <section class="stats" id="stats"></section>
    <section class="filters">
      <div class="filter-row">
        <div class="filter-label">城市</div>
        <div class="city-filter" id="cityFilter"></div>
      </div>
      <div class="filter-row">
        <div class="filter-label">来源</div>
        <div class="filter-tools">
          <div class="seg" id="sourceFilter"></div>
        </div>
      </div>
      <div class="filter-row">
        <div class="filter-label">类型</div>
        <div class="filter-tools">
          <div class="seg" id="bizKindFilter"></div>
        </div>
      </div>
      <div class="filter-row">
        <div class="filter-label">筛选</div>
        <div class="filter-tools">
          <div class="seg" id="statusFilter"></div>
          <input class="search" id="searchInput" placeholder="搜索店名、商圈、关键词">
        </div>
      </div>
    </section>
    <section class="batch-review-bar" id="batchReviewBar">
      <button class="btn primary" id="batchApproveBtn" type="button">批量通过</button>
      <button class="btn" id="batchRejectBtn" type="button">批量拒绝</button>
      <span class="batch-review-hint" id="batchReviewHint"></span>
    </section>
    <section class="grid" id="merchantGrid"></section>
    <nav class="pager" id="pager" hidden aria-label="分页"></nav>
  </main>

  <button class="back-top" id="backTopBtn" type="button" title="回到顶部" aria-label="回到顶部">↑</button>

  <div class="import-modal" id="importModal" hidden>
    <div class="import-modal-backdrop"></div>
    <div class="import-modal-panel" role="dialog" aria-modal="true" aria-labelledby="importModalTitle">
      <h2 id="importModalTitle">批量推送 Zup 中</h2>
      <p class="import-modal-scope" id="importModalScope"></p>
      <div class="import-progress-track" aria-hidden="true">
        <div class="import-progress-bar" id="importProgressBar"></div>
      </div>
      <div class="import-progress-stats" id="importProgressStats"></div>
      <div class="import-progress-latest" id="importProgressLatest">准备开始…</div>
      <div class="import-modal-actions">
        <button class="btn abort" id="importModalAbort" type="button">中止</button>
        <button class="btn primary" id="importModalClose" type="button" disabled>关闭</button>
      </div>
    </div>
  </div>

  <script src="/buzz-env-ui.js"></script>
  <script>
    const PAGE_SIZE = 20;

    const state = {
      merchants: [],
      decisions: {},
      merchantTypes: [],
      filters: { city: "all", merchantType: "all", source: "all", status: "all", search: "" },
      page: 1,
      poiBusy: false,
      poiMatchMode: "normal",
      poiModeBusy: false,
      reviewBusy: false,
      importBusy: false,
      importAbortController: null,
      importAbortRequested: false,
      importPollTimer: null,
      poiKeywords: {},
      poiPreviews: {},
    };

    const BATCH_REVIEW_STATUS_FILTERS = new Set(["pending", "needs_poi", "poi_doubtful"]);
    const BATCH_REVIEW_FILTER_LABELS = {
      pending: "待定",
      needs_poi: "缺 POI",
      poi_doubtful: "POI 存疑",
    };

    const els = {
      sourceMeta: document.getElementById("sourceMeta"),
      saveState: document.getElementById("saveState"),
      stats: document.getElementById("stats"),
      grid: document.getElementById("merchantGrid"),
      pager: document.getElementById("pager"),
      cityFilter: document.getElementById("cityFilter"),
      bizKindFilter: document.getElementById("bizKindFilter"),
      sourceFilter: document.getElementById("sourceFilter"),
      statusFilter: document.getElementById("statusFilter"),
      searchInput: document.getElementById("searchInput"),
      poiModeToggle: document.getElementById("poiModeToggle"),
      batchReviewBar: document.getElementById("batchReviewBar"),
      batchReviewHint: document.getElementById("batchReviewHint"),
      batchApproveBtn: document.getElementById("batchApproveBtn"),
      batchRejectBtn: document.getElementById("batchRejectBtn"),
      batchPoiBtn: document.getElementById("batchPoiBtn"),
      batchImportBtn: document.getElementById("batchImportBtn"),
      exportImportBtn: document.getElementById("exportImportBtn"),
      syncFromBuzzBtn: document.getElementById("syncFromBuzzBtn"),
      backTopBtn: document.getElementById("backTopBtn"),
      importModal: document.getElementById("importModal"),
      importModalTitle: document.getElementById("importModalTitle"),
      importModalScope: document.getElementById("importModalScope"),
      importProgressBar: document.getElementById("importProgressBar"),
      importProgressStats: document.getElementById("importProgressStats"),
      importProgressLatest: document.getElementById("importProgressLatest"),
      importModalClose: document.getElementById("importModalClose"),
      importModalAbort: document.getElementById("importModalAbort"),
    };

    function merchantTypeFilters() {
      const types = Array.isArray(state.merchantTypes) ? state.merchantTypes : [];
      return [
        { key: "all", label: "全部" },
        ...types.map((t) => ({ key: String(t.id), label: t.name })),
      ];
    }

    function merchantTypeLabel(key) {
      if (key === "all") return "全部类型";
      return merchantTypeFilters().find((item) => item.key === String(key))?.label || key;
    }

    function normalizeMerchantTypeFilter() {
      if (state.filters.merchantType === "all") return;
      const valid = merchantTypeFilters().some((item) => item.key === String(state.filters.merchantType));
      if (!valid) state.filters.merchantType = "all";
    }

    const SOURCE_FILTERS = [
      { key: "all", label: "全部" },
      { key: "dianping", label: "大众点评" },
      { key: "buzz", label: "Zup 同步" },
    ];

    const STATUS_FILTERS = [
      { key: "all", label: "全部" },
      { key: "imported", label: "已推送" },
      { key: "approved", label: "已通过" },
      { key: "rejected", label: "已拒绝" },
      { key: "pending", label: "待定" },
      { key: "import_ready", label: "待推送" },
      { key: "needs_poi", label: "缺 POI" },
      { key: "poi_doubtful", label: "POI 存疑" },
    ];

    function suggestMerchantTypeName(category, name, importBatchId = "") {
      const text = `${category || ""} ${name || ""}`;
      const batch = String(importBatchId || "");
      if (batch.includes("公园") || /^(公园|植物园|风景名胜|湿地公园|森林公园)/.test(String(category || ""))) {
        return "公园";
      }
      if (/书店|图书|阅读|茑屋|PAGEONE|单向空间|BOOKSTORE/i.test(text)) {
        return "书店";
      }
      if (/公园|植物园|风景名胜|湿地|森林公园/i.test(text) && !/酒吧|精酿|餐吧|咖啡|书店/i.test(category || "")) {
        return "公园";
      }
      if (/啤酒|精酿|啤酒屋|啤酒吧/i.test(text)) return "啤酒吧";
      if (/酒馆|酒吧|清吧|Taproom|COMMUNE|跳海|京A|餐吧/i.test(text)) return "酒馆";
      if (/咖啡/i.test(text)) return "咖啡厅";
      if (/茶(?!馆)|茶饮/i.test(text)) return "茶馆";
      if (/餐|饭|食/i.test(text)) return "餐厅";
      return "酒馆";
    }

    function merchantTypeIdByName(typeName) {
      const name = String(typeName || "").trim();
      if (!name) return 0;
      const types = state.merchantTypes.length ? state.merchantTypes : [];
      const hit = types.find((t) => t.name === name);
      if (hit) return Number(hit.id);
      if (name === "书店" || name === "公园") {
        const other = types.find((t) => t.name === "其他");
        if (other) return Number(other.id);
      }
      return 0;
    }

    function suggestMerchantType(category, name, importBatchId = "") {
      return merchantTypeIdByName(suggestMerchantTypeName(category, name, importBatchId)) || 2;
    }

    function matchesMerchantTypeFilter(item, filter) {
      if (filter === "all") return true;
      return String(effectiveMerchantType(item) || "") === String(filter);
    }

    function effectiveMerchantType(item) {
      const suggestedName = suggestMerchantTypeName(item.category, item.name, item.import_batch_id);
      if (suggestedName === "书店" || suggestedName === "公园") {
        const byName = merchantTypeIdByName(suggestedName);
        if (byName) return byName;
      }
      if (item.merchant_type) return item.merchant_type;
      return suggestMerchantType(item.category, item.name, item.import_batch_id);
    }

    function hasNoPoi(item) {
      return !String(item.address_poi_id || "").trim();
    }

    function isImportReady(item) {
      if (!item.name || !String(item.name).trim()) return false;
      if (!item.poi_title || !String(item.poi_title).trim()) return false;
      if (!effectiveMerchantType(item)) return false;
      if (hasNoPoi(item)) return false;
      if (!item.longitude || !item.latitude) return false;
      return true;
    }

    /** 审核台「待定」：字段齐全、非缺 POI、非 POI 存疑 */
    function isReviewPendingReady(item) {
      if (reviewStatus(item.merchant_uid) !== "pending") return false;
      if (!isImportReady(item)) return false;
      if (item.poi_doubtful) return false;
      return true;
    }

    function reviewPendingButtonTitle(item) {
      if (isReviewPendingReady(item)) return "字段齐全，计入待定";
      if (reviewStatus(item.merchant_uid) !== "pending") return "非待定状态";
      if (hasNoPoi(item)) return "缺 POI，不计入待定";
      if (!isImportReady(item)) return "推送字段未齐，不计入待定";
      if (item.poi_doubtful) return "POI 存疑，不计入待定";
      return "不计入待定";
    }

    function renderPendingButtonClass(item, status) {
      const counted = isReviewPendingReady(item);
      if (status === "pending") return counted ? "active" : "active incomplete";
      return counted ? "" : "incomplete";
    }

    function isImportedMerchant(item) {
      return item.import_status === "imported" && Boolean(String(item.buzz_merchant_id || "").trim());
    }

    /** 待推送：已通过 + 字段齐全 + 尚未写入 Buzz */
    function isPendingImport(item) {
      if (reviewStatus(item.merchant_uid) !== "approved") return false;
      return isImportReady(item) && !isImportedMerchant(item);
    }

    function canImportMerchant(item) {
      return isPendingImport(item);
    }

    function importEnvLabel() {
      return BuzzEnvUi.envLabel();
    }

    function updateBatchImportButtonLabel() {
      if (els.batchImportBtn) {
        els.batchImportBtn.textContent = `批量推送 Zup（${importEnvLabel()}）`;
      }
    }

    function importButtonLabel(item) {
      const env = importEnvLabel();
      if (item.import_status === "imported" && item.buzz_merchant_id) return `已推送（${env}）`;
      if (item.import_status === "failed") return `重试推送（${env}）`;
      return `推送 Zup（${env}）`;
    }

    function renderImportStatus(item) {
      const env = importEnvLabel();
      if (item.import_status === "imported" && item.buzz_merchant_id) {
        return `<div class="import-status imported">已推送 · ${escapeHtml(env)} · merchant_id <strong>${escapeHtml(item.buzz_merchant_id)}</strong></div>`;
      }
      if (item.import_status === "failed") {
        return `<div class="import-status failed">推送失败：${escapeHtml(item.import_error || "未知错误")}</div>`;
      }
      return `<div class="import-status pending">尚未推送</div>`;
    }

    async function importSingleMerchant(uid) {
      if (state.importBusy) return;
      if (!(await BuzzEnvUi.confirmProdAction("将把商户推送到正式环境"))) return;
      const merchant = state.merchants.find((item) => item.merchant_uid === uid);
      const name = merchant?.name || "商户";
      state.importBusy = true;
      resetImportAbortState();
      const startedAt = Date.now();
      openImportProgressModal({ label: name, batchTotal: 1 });
      els.importModalTitle.textContent = "商户推送 Zup 中";
      els.importModalScope.textContent = name;

      const timer = setInterval(() => {
        if (isImportAborted()) return;
        updateImportProgressModal({
          batchTotal: 1,
          processed: 0,
          elapsed: formatDuration(Date.now() - startedAt),
          latestText: `<strong>上传中</strong>${escapeHtml(name)}`,
          phase: "running",
        });
      }, 500);

      try {
        const response = await fetch(`/api/merchants/${encodeURIComponent(uid)}/import`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(BuzzEnvUi.importBody({})),
          signal: state.importAbortController.signal,
        });
        const data = await response.json();
        clearInterval(timer);
        const elapsed = formatDuration(Date.now() - startedAt);
        if (data.merchant) upsertMerchant(data.merchant);
        if (isImportAborted()) {
          updateImportProgressModal({
            batchTotal: 1,
            processed: 0,
            elapsed,
            aborted: true,
            latestText: "<strong>已中止</strong>",
            done: true,
            phase: "done",
          });
          setSaveState("推送已中止", "warn");
          return;
        }
        if (!response.ok || !data.ok) {
          updateImportProgressModal({
            batchTotal: 1,
            processed: 1,
            fail: 1,
            elapsed,
            latestText: `<strong>推送失败</strong>${escapeHtml(data.error || "未知错误")}`,
            done: true,
            phase: "done",
          });
          setSaveState(data.error || "推送失败", "error");
          render();
          return;
        }
        const suffix = data.skipped ? "（后台已存在）" : "";
        updateImportProgressModal({
          batchTotal: 1,
          processed: 1,
          ok: data.skipped ? 0 : 1,
          skipped: data.skipped ? 1 : 0,
          elapsed,
          latestText: `<strong>推送成功</strong>merchant_id ${escapeHtml(String(data.merchant_id || ""))}${escapeHtml(suffix)}`,
          done: true,
          phase: "done",
        });
        setSaveState(`推送成功 merchant_id=${data.merchant_id}${suffix}`, "ok");
        render();
      } catch (error) {
        clearInterval(timer);
        const elapsed = formatDuration(Date.now() - startedAt);
        if (error.name === "AbortError" || isImportAborted()) {
          updateImportProgressModal({
            batchTotal: 1,
            processed: 0,
            elapsed,
            aborted: true,
            latestText: "<strong>已中止</strong>",
            done: true,
            phase: "done",
          });
          setSaveState("推送已中止", "warn");
        } else {
          updateImportProgressModal({
            batchTotal: 1,
            processed: 1,
            fail: 1,
            elapsed,
            error: error.message || "推送失败",
            done: true,
            phase: "done",
          });
          setSaveState(error.message || "推送失败", "error");
        }
      } finally {
        state.importBusy = false;
      }
    }

    async function deleteLocalMerchant(uid, name, imported) {
      let message = `确定从审核台删除「${name}」？\n\n本地记录将永久删除，无法恢复。`;
      if (imported) {
        message += "\n\n注意：该商户已推送 Zup，删审核台记录不会删除后台商户；如需删后台请点「删后台」。";
      }
      if (!window.confirm(message)) return;
      setSaveState("正在删除商户...", "warn");
      try {
        const response = await fetch(`/api/merchants/${encodeURIComponent(uid)}`, {
          method: "DELETE",
        });
        const data = await response.json();
        if (!response.ok || !data.ok) {
          setSaveState(data.error || "删除失败", "error");
          return;
        }
        removeMerchant(uid);
        setSaveState(`已删除「${data.name || name}」`, "ok");
        render();
      } catch (error) {
        setSaveState(error.message || "删除失败", "error");
      }
    }

    async function deleteBuzzMerchant(uid, merchantId) {
      const message = `确定从 Buzz 后台删除此商户？\n\nmerchant_id: ${merchantId}\n\n审核台里的抓取记录会保留，仅清除推送状态。`;
      if (!window.confirm(message)) return;
      setSaveState("正在删除后台商户...", "warn");
      try {
        const response = await fetch(BuzzEnvUi.withBuzzEnv(`/api/merchants/${encodeURIComponent(uid)}/buzz-merchant`), {
          method: "DELETE",
        });
        const data = await response.json();
        if (data.merchant) upsertMerchant(data.merchant);
        if (!response.ok || !data.ok) {
          setSaveState(data.error || "删除失败", "error");
          render();
          return;
        }
        setSaveState(`已删除后台商户 ${data.merchant_id}`, "ok");
        render();
      } catch (error) {
        setSaveState(error.message || "删除失败", "error");
      }
    }

    function formatDuration(ms) {
      const sec = Math.max(1, Math.round(ms / 1000));
      if (sec < 60) return `${sec} 秒`;
      const min = Math.floor(sec / 60);
      const remSec = sec % 60;
      if (min < 60) return remSec ? `${min} 分 ${remSec} 秒` : `${min} 分钟`;
      const hr = Math.floor(min / 60);
      const remMin = min % 60;
      return remMin ? `${hr} 小时 ${remMin} 分` : `${hr} 小时`;
    }

    function stopImportProgressPoll() {
      if (state.importPollTimer) {
        clearInterval(state.importPollTimer);
        state.importPollTimer = null;
      }
    }

    function resetImportAbortState() {
      state.importAbortRequested = false;
      state.importAbortController = new AbortController();
    }

    function isImportAborted() {
      return state.importAbortRequested || state.importAbortController?.signal.aborted;
    }

    function requestImportAbort() {
      if (!state.importBusy) return;
      state.importAbortRequested = true;
      state.importAbortController?.abort();
      els.importModalAbort.disabled = true;
      els.importProgressLatest.innerHTML = "<strong>正在中止…</strong>当前这条处理完后停止，不会开始下一条";
    }

    function setImportModalControls({ running }) {
      els.importModalAbort.disabled = !running;
      els.importModalAbort.hidden = !running;
      els.importModalClose.disabled = running;
    }

    function openImportProgressModal({ label, batchTotal }) {
      resetImportAbortState();
      els.importModalTitle.textContent = "批量推送 Zup 中";
      els.importModalScope.textContent = `范围：${label} · 本批 ${batchTotal} 家`;
      els.importProgressBar.style.width = "0%";
      els.importProgressStats.innerHTML = [
        "<div>本批进度：<b>0 / " + batchTotal + "</b></div>",
        "<div>成功推送：<b>0</b> · 跳过：<b>0</b> · 失败：<b>0</b></div>",
        "<div>已用时间：<b>0 秒</b></div>",
      ].join("");
      els.importProgressLatest.innerHTML = "<strong>准备开始…</strong>正在连接后台";
      setImportModalControls({ running: true });
      els.importModal.hidden = false;
    }

    function updateImportProgressModal({
      batchTotal,
      processed,
      ok,
      skipped,
      fail,
      elapsed,
      latestText,
      done,
      aborted = false,
      error,
      phase = "running",
    }) {
      const pct = batchTotal > 0 ? Math.min(100, Math.round((processed / batchTotal) * 100)) : 0;
      els.importProgressBar.style.width = `${pct}%`;
      const detailLine = phase === "done"
        ? `<div>成功推送：<b>${ok ?? 0}</b> · 跳过：<b>${skipped ?? 0}</b> · 失败：<b>${fail ?? 0}</b></div>`
        : `<div>已写入：<b>${processed}</b> · 失败：<b>${fail ?? 0}</b></div>`;
      els.importProgressStats.innerHTML = [
        `<div>本批进度：<b>${processed} / ${batchTotal}</b></div>`,
        detailLine,
        `<div>已用时间：<b>${elapsed}</b></div>`,
      ].join("");
      if (latestText) {
        els.importProgressLatest.innerHTML = latestText;
      }
      if (error) {
        els.importModalTitle.textContent = "批量推送失败";
        els.importProgressLatest.innerHTML = `<strong>出错了</strong>${escapeHtml(error)}`;
        setImportModalControls({ running: false });
        return;
      }
      if (done) {
        if (aborted) {
          els.importModalTitle.textContent = "已中止";
        } else {
          els.importModalTitle.textContent = fail > 0 ? "批量推送完成（有失败）" : "批量推送完成";
        }
        setImportModalControls({ running: false });
      }
    }

    function closeImportProgressModal() {
      if (state.importBusy) return;
      stopImportProgressPoll();
      els.importModal.hidden = true;
    }

    async function fetchImportProgress(city) {
      const parts = [BuzzEnvUi.envQuery()];
      if (city) parts.push(`city=${encodeURIComponent(city)}`);
      const query = `?${parts.join("&")}`;
      const response = await fetch(`/api/merchants/import-progress${query}`);
      const data = await response.json();
      if (!response.ok || !data.ok) throw new Error(data.error || "读取推送进度失败");
      return data;
    }

    function renderImportLatestLine(progress, baselineFailed) {
      const imported = progress.latest_imported;
      const failed = progress.latest_failed;
      const importedAt = imported?.imported_at ? Date.parse(imported.imported_at) : 0;
      const failedAt = failed?.updated_at ? Date.parse(failed.updated_at) : 0;
      if (failed && failedAt >= importedAt && progress.failed > baselineFailed) {
        return `<strong>最近失败</strong>${escapeHtml(failed.name)}（${escapeHtml(failed.city)}）<br>${escapeHtml(failed.import_error || "未知错误")}`;
      }
      if (imported) {
        return `<strong>最近推送</strong>${escapeHtml(imported.name)}（${escapeHtml(imported.city)}）`;
      }
      return "<strong>处理中…</strong>等待第一条结果";
    }

    function currentMerchantFilterSummary() {
      const cityLabel = state.filters.city === "all" ? "全部城市" : state.filters.city;
      const statusLabel = BATCH_REVIEW_FILTER_LABELS[state.filters.status] || state.filters.status;
      const typeLabel = state.filters.merchantType === "all" ? "全部类型" : merchantTypeLabel(state.filters.merchantType);
      const sourceLabel = SOURCE_FILTERS.find((item) => item.key === state.filters.source)?.label || state.filters.source;
      const searchLabel = state.filters.search.trim() ? `搜索「${state.filters.search.trim()}」` : "";
      return [cityLabel, statusLabel, typeLabel, sourceLabel === "全部" ? "" : sourceLabel, searchLabel].filter(Boolean).join(" · ");
    }

    async function runBatchImport() {
      if (state.importBusy) return;
      const eligible = filteredMerchants().filter(canImportMerchant);
      const label = currentMerchantFilterSummary();
      if (!eligible.length) {
        window.alert("当前筛选下没有可推送的商户（需已通过、字段齐全且尚未推送）。");
        return;
      }
      const batchTotal = eligible.length;
      if (!window.confirm(`将当前筛选下的 ${batchTotal} 家可推送商户写入 Buzz【${importEnvLabel()}】后台？\n（${label}）`)) return;
      if (!(await BuzzEnvUi.confirmProdAction(`将批量推送 ${batchTotal} 家商户到正式环境`))) return;

      const city = state.filters.city === "all" ? "" : state.filters.city;
      state.importBusy = true;
      els.batchImportBtn.disabled = true;
      setSaveState(`批量推送 Zup 中（${batchTotal} 家）...`, "warn");
      const startedAt = Date.now();

      let baselineImported = 0;
      let baselineFailed = 0;
      try {
        const baseline = await fetchImportProgress(city);
        baselineImported = baseline.imported || 0;
        baselineFailed = baseline.failed || 0;
      } catch (error) {
        setSaveState(error.message || "读取进度失败", "error");
        state.importBusy = false;
        els.batchImportBtn.disabled = false;
        return;
      }

      openImportProgressModal({ label, batchTotal });

      const refreshProgress = async () => {
        try {
          const progress = await fetchImportProgress(city);
          const importedDelta = Math.max(0, (progress.imported || 0) - baselineImported);
          const failedDelta = Math.max(0, (progress.failed || 0) - baselineFailed);
          const processed = Math.min(batchTotal, importedDelta + failedDelta);
          updateImportProgressModal({
            batchTotal,
            processed,
            fail: failedDelta,
            elapsed: formatDuration(Date.now() - startedAt),
            latestText: renderImportLatestLine(progress, baselineFailed),
            phase: "running",
          });
        } catch (error) {
          // 轮询失败不打断主流程
        }
      };

      state.importPollTimer = setInterval(refreshProgress, 1000);
      refreshProgress();

      try {
        const merchant_uids = eligible.map((item) => item.merchant_uid);
        const response = await fetch("/api/merchants/import-batch", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(BuzzEnvUi.importBody({ city, merchant_uids })),
          signal: state.importAbortController.signal,
        });
        const data = await response.json();
        if (!response.ok || (!data.ok && !data.aborted)) throw new Error(data.error || "批量推送失败");
        stopImportProgressPoll();
        await loadMerchants();
        const elapsed = formatDuration(Date.now() - startedAt);
        const aborted = isImportAborted() || data.aborted;
        const processed = (data.ok ?? 0) + (data.skipped ?? 0) + (data.fail ?? 0);
        updateImportProgressModal({
          batchTotal: data.total ?? batchTotal,
          processed,
          ok: data.ok ?? 0,
          skipped: data.skipped ?? 0,
          fail: data.fail ?? 0,
          elapsed,
          aborted,
          latestText: aborted
            ? `<strong>已中止</strong>已完成 ${processed} 家 · 成功 ${data.ok ?? 0} · 跳过 ${data.skipped ?? 0} · 失败 ${data.fail ?? 0}`
            : (data.fail
              ? `<strong>本批结束</strong>成功 ${data.ok ?? 0} · 跳过 ${data.skipped ?? 0} · 失败 ${data.fail ?? 0}`
              : `<strong>本批结束</strong>全部处理完成，可关闭窗口继续下一批`),
          done: true,
          phase: "done",
        });
        setSaveState(
          aborted
            ? `批量推送已中止：成功 ${data.ok ?? 0} · 跳过 ${data.skipped ?? 0} · 失败 ${data.fail ?? 0} · ${elapsed}`
            : `批量推送完成：成功 ${data.ok} · 跳过 ${data.skipped} · 失败 ${data.fail} · ${elapsed}`,
          (aborted || data.fail) ? "warn" : "ok",
        );
        render();
      } catch (error) {
        stopImportProgressPoll();
        const elapsed = formatDuration(Date.now() - startedAt);
        if (error.name === "AbortError" || isImportAborted()) {
          updateImportProgressModal({
            batchTotal,
            processed: 0,
            elapsed,
            aborted: true,
            latestText: "<strong>已中止</strong>请求已取消，服务端会在当前这条完成后停止",
            done: true,
            phase: "done",
          });
          setSaveState("批量推送已中止", "warn");
        } else {
          updateImportProgressModal({
            batchTotal,
            processed: 0,
            ok: 0,
            skipped: 0,
            fail: 0,
            elapsed,
            error: error.message || "批量推送失败",
            done: true,
            phase: "done",
          });
          setSaveState(error.message || "批量推送失败", "error");
        }
      } finally {
        state.importBusy = false;
        els.batchImportBtn.disabled = false;
      }
    }

    function setSaveState(text, kind = "warn") {
      els.saveState.textContent = text;
      els.saveState.className = `save-state ${kind}`;
    }

    function escapeHtml(value) {
      return String(value || "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;");
    }

    function merchantDetailUrl(item) {
      return item.originalLink || item.original_link || "";
    }

    function proxyImage(src) {
      const url = String(src || "").trim();
      if (!url || url === "-") return "";
      if (/nowmap\.cn/i.test(url)) return url;
      return `/api/image?src=${encodeURIComponent(url)}&referer=${encodeURIComponent("https://www.dianping.com/")}&v=full`;
    }

    function reviewStatus(uid) {
      return state.decisions[uid] || "pending";
    }

    async function loadReviewState() {
      const response = await fetch("/api/merchant-review-state", { cache: "no-store" });
      const payload = await response.json();
      state.decisions = payload.decisions || {};
    }

    async function loadMerchantTypes() {
      const response = await fetch(BuzzEnvUi.withBuzzEnv("/api/merchant-types?refresh=1"), { cache: "no-store" });
      const payload = await response.json();
      state.merchantTypes = payload.types || [];
      normalizeMerchantTypeFilter();
      if (state.merchants.length) render();
    }

    async function loadMerchants() {
      const response = await fetch(BuzzEnvUi.withBuzzEnv("/api/merchants?include_poi_candidates=0"), { cache: "no-store" });
      const payload = await response.json();
      state.merchants = payload.merchants || [];
      state.poiMatchMode = payload.poi_match_mode || "normal";
      renderPoiModeToggle();
      render();
      setSaveState("已连接本地数据库", "ok");
      void hydrateVisiblePoiCandidates();
    }

    async function hydrateVisiblePoiCandidates() {
      const { list } = paginatedMerchants(filteredMerchants());
      const uids = list
        .filter((item) => Number(item.poi_candidate_count) > 0 && !(item.poi_candidates?.length))
        .map((item) => item.merchant_uid);
      if (!uids.length) return;
      try {
        const response = await fetch("/api/merchants/poi-candidates-batch", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ merchant_uids: uids }),
        });
        const payload = await response.json();
        if (!response.ok || !payload.ok) return;
        for (const [uid, candidates] of Object.entries(payload.candidates || {})) {
          const item = state.merchants.find((m) => m.merchant_uid === uid);
          if (item) item.poi_candidates = candidates;
        }
        renderCards(paginatedMerchants(filteredMerchants()).list);
      } catch {
        // 候选 POI 可稍后手动重新查询
      }
    }

    function renderPoiModeToggle() {
      if (!els.poiModeToggle) return;
      for (const button of els.poiModeToggle.querySelectorAll("button[data-mode]")) {
        button.classList.toggle("active", button.dataset.mode === state.poiMatchMode);
        button.disabled = state.poiModeBusy || state.poiBusy;
      }
    }

    async function switchPoiMatchMode(mode) {
      if (state.poiModeBusy || state.poiBusy || mode === state.poiMatchMode) return;
      const label = mode === "strict" ? "严格存疑" : "标准存疑";

      state.poiModeBusy = true;
      renderPoiModeToggle();
      setSaveState(`切换为${label}...`, "warn");
      try {
        const response = await fetch("/api/merchants/poi-match-mode", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ mode }),
        });
        const payload = await response.json();
        if (!response.ok || !payload.ok) {
          throw new Error(payload.error || "切换失败");
        }
        state.poiMatchMode = payload.poi_match_mode || mode;
        await loadMerchants();
        const doubtful = state.merchants.filter((m) => m.poi_doubtful && m.address_poi_id).length;
        setSaveState(`已切换为${label}（当前 ${doubtful} 家标为 POI 存疑）`, "ok");
      } catch (error) {
        setSaveState(`切换失败: ${error.message}`, "error");
      } finally {
        state.poiModeBusy = false;
        renderPoiModeToggle();
      }
    }

    function upsertMerchant(updated) {
      const idx = state.merchants.findIndex((m) => m.merchant_uid === updated.merchant_uid);
      if (idx >= 0) state.merchants[idx] = updated;
    }

    function removeMerchant(uid) {
      state.merchants = state.merchants.filter((m) => m.merchant_uid !== uid);
      delete state.decisions[uid];
      delete state.poiPreviews[uid];
      delete state.poiKeywords[uid];
    }

    async function saveImportPrep(uid, patch) {
      setSaveState("保存推送字段...", "warn");
      const response = await fetch(`/api/merchants/${encodeURIComponent(uid)}/import-prep`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(BuzzEnvUi.importBody(patch)),
      });
      const payload = await response.json();
      if (!response.ok || !payload.ok) {
        setSaveState(payload.error || "保存失败", "error");
        return null;
      }
      upsertMerchant(payload.merchant);
      setSaveState("已保存", "ok");
      render();
      return payload.merchant;
    }

    function stripBranchSuffix(name) {
      return String(name || "").replace(/[（(][^）)]*[）)]\s*$/u, "").trim();
    }

    function suggestPoiKeyword(item) {
      if (item.suggested_poi_keyword) return item.suggested_poi_keyword;
      const name = stripBranchSuffix(item.name).trim();
      const city = String(item.city || "").trim();
      if (!name) return city;
      if (!city || city === "全国") return name;
      if (name.includes(city)) return name;
      return `${city} ${name}`;
    }

    function poiKeywordValue(item) {
      const saved = state.poiKeywords[item.merchant_uid];
      return saved !== undefined ? saved : suggestPoiKeyword(item);
    }

    async function applyPoi(uid, body) {
      const isRefresh = Boolean(body.refresh || body.candidates_only);
      setSaveState(isRefresh ? "刷新候选 POI..." : "查询 POI...", "warn");
      const response = await fetch(`/api/merchants/${encodeURIComponent(uid)}/poi`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(BuzzEnvUi.importBody(body)),
      });
      const payload = await response.json();
      if (!response.ok || !payload.ok) {
        setSaveState(payload.error || "POI 失败", "error");
        return null;
      }
      upsertMerchant(payload.merchant);
      if (isRefresh) {
        delete state.poiPreviews[uid];
        setSaveState(`已刷新 ${(payload.candidates || []).length} 条候选`, "ok");
      } else {
        delete state.poiPreviews[uid];
        setSaveState("POI 已更新", "ok");
      }
      render();
      return payload.merchant;
    }

    async function searchPoiCustom(uid, card) {
      const input = card.querySelector("[data-poi-keyword]");
      const keyword = String(input?.value || "").trim();
      const merchant = state.merchants.find((m) => m.merchant_uid === uid);
      if (!keyword) {
        setSaveState("请输入搜索关键词", "warn");
        return;
      }
      state.poiKeywords[uid] = keyword;
      setSaveState("自由搜索 POI...", "warn");
      const response = await fetch("/api/merchants/poi-search", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ keyword, city: merchant?.city || "全国" }),
      });
      const payload = await response.json();
      if (!response.ok || !payload.ok) {
        setSaveState(payload.error || "搜索失败", "error");
        return;
      }
      state.poiPreviews[uid] = payload.items || [];
      setSaveState(`找到 ${state.poiPreviews[uid].length} 条，点选后保存`, "ok");
      render();
    }

    async function runBatchPoi() {
      if (state.poiBusy) return;
      const city = state.filters.city === "all" ? "" : state.filters.city;
      const label = city || "全部城市";
      if (!window.confirm(`对「${label}」下尚未匹配 POI 的待定商户，智能匹配 POI？\n（会调用腾讯地图，略慢）`)) return;

      state.poiBusy = true;
      els.batchPoiBtn.disabled = true;
      setSaveState("批量补全 POI 中...", "warn");
      try {
        const response = await fetch("/api/merchants/poi-auto-batch", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            city,
            only_pending: true,
            limit: 100,
            poi_match_mode: state.poiMatchMode,
          }),
        });
        const payload = await response.json();
        await loadMerchants();
        setSaveState(`POI 批量完成：成功 ${payload.ok}，失败 ${payload.fail}`, payload.fail ? "warn" : "ok");
      } catch (error) {
        setSaveState(`批量失败: ${error.message}`, "error");
      } finally {
        state.poiBusy = false;
        els.batchPoiBtn.disabled = false;
      }
    }

    async function saveReviewState(options = {}) {
      const quiet = options.quiet === true;
      if (!quiet) setSaveState("保存中...", "warn");
      const response = await fetch("/api/merchant-review-state", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ decisions: state.decisions }),
      });
      if (!response.ok) {
        if (!quiet) setSaveState("保存失败", "error");
        return false;
      }
      if (!quiet) setSaveState("已保存", "ok");
      render();
      return true;
    }

    function setDecision(uid, status) {
      state.decisions[uid] = status;
      saveReviewState();
    }

    async function batchSetReviewStatus(nextStatus) {
      if (state.reviewBusy || !BATCH_REVIEW_STATUS_FILTERS.has(state.filters.status)) return;
      const merchants = filteredMerchants();
      if (!merchants.length) {
        setSaveState("当前筛选下没有可操作的商户", "warn");
        return;
      }
      const actionLabel = nextStatus === "approved" ? "通过" : "拒绝";
      const filterLabel = BATCH_REVIEW_FILTER_LABELS[state.filters.status] || state.filters.status;
      const cityLabel = state.filters.city === "all" ? "全部城市" : state.filters.city;
      if (!window.confirm(`将「${cityLabel}」·「${filterLabel}」筛选下的 ${merchants.length} 家商户全部标为${actionLabel}？`)) {
        return;
      }

      state.reviewBusy = true;
      if (els.batchApproveBtn) els.batchApproveBtn.disabled = true;
      if (els.batchRejectBtn) els.batchRejectBtn.disabled = true;
      for (const item of merchants) {
        state.decisions[item.merchant_uid] = nextStatus;
      }
      try {
        const saved = await saveReviewState({ quiet: true });
        if (saved) setSaveState(`已批量${actionLabel} ${merchants.length} 家商户`, "ok");
        else setSaveState("批量保存失败", "error");
      } finally {
        state.reviewBusy = false;
        if (els.batchApproveBtn) els.batchApproveBtn.disabled = false;
        if (els.batchRejectBtn) els.batchRejectBtn.disabled = false;
      }
    }

    function getCityKey(item) {
      return item.city || "未知城市";
    }

    function merchantsInCity() {
      return state.merchants.filter((item) => {
        if (state.filters.city !== "all" && getCityKey(item) !== state.filters.city) return false;
        return true;
      });
    }

    function cityStats(cityKey) {
      const list = cityKey === "all"
        ? state.merchants
        : state.merchants.filter((item) => getCityKey(item) === cityKey);
      const pending = list.filter((item) => isReviewPendingReady(item)).length;
      const imported = list.filter((item) => isImportedMerchant(item)).length;
      const pendingImport = list.filter((item) => isPendingImport(item)).length;
      return { pending, imported, pendingImport };
    }

    function renderCityChip(cityKey, label) {
      const { pending, imported, pendingImport } = cityStats(cityKey);
      const active = state.filters.city === cityKey;
      const pendingClass = pending > 0 ? "" : " is-zero";
      const importedClass = imported > 0 ? "" : " is-zero";
      const pendingImportClass = pendingImport > 0 ? "" : " is-zero";
      return `
        <button
          type="button"
          data-city="${escapeHtml(cityKey)}"
          class="city-chip ${active ? "active" : ""} ${pending > 0 ? "has-pending" : ""}"
        >
          <span class="city-chip-name">${escapeHtml(label)}</span>
          <span class="city-chip-counts">
            <span class="city-chip-pending${pendingClass}">待定 ${pending}</span>
            <span class="city-chip-imported${importedClass}">已推送 ${imported}</span>
            <span class="city-chip-pending-import${pendingImportClass}">待推送 ${pendingImport}</span>
          </span>
        </button>
      `;
    }

    function resetPage() {
      state.page = 1;
    }

    function clampPage(totalItems) {
      const totalPages = Math.max(1, Math.ceil(totalItems / PAGE_SIZE));
      if (state.page > totalPages) state.page = totalPages;
      if (state.page < 1) state.page = 1;
      return totalPages;
    }

    function paginatedMerchants(list) {
      const totalPages = clampPage(list.length);
      const start = (state.page - 1) * PAGE_SIZE;
      return {
        list: list.slice(start, start + PAGE_SIZE),
        total: list.length,
        totalPages,
      };
    }

    function matchesSourceFilter(item, filter) {
      if (filter === "all") return true;
      const source = String(item.source || "dianping").trim();
      if (filter === "buzz") return source === "buzz";
      if (filter === "dianping") return source !== "buzz";
      return true;
    }

    function matchesStatusFilter(item, filter) {
      const status = reviewStatus(item.merchant_uid);
      if (filter === "all") return true;
      if (filter === "imported") return isImportedMerchant(item);
      if (filter === "import_ready") return isPendingImport(item);
      if (filter === "needs_poi") {
        if (status === "rejected") return false;
        return hasNoPoi(item);
      }
      if (filter === "poi_doubtful") {
        return status === "pending" && item.poi_doubtful;
      }
      if (filter === "pending") return isReviewPendingReady(item);
      if (["approved", "rejected"].includes(filter)) {
        return status === filter;
      }
      return true;
    }

    function filteredMerchants() {
      const q = state.filters.search.trim().toLowerCase();
      return merchantsInCity().filter((item) => {
        if (!matchesSourceFilter(item, state.filters.source)) return false;
        if (!matchesMerchantTypeFilter(item, state.filters.merchantType)) return false;
        if (!matchesStatusFilter(item, state.filters.status)) return false;
        if (!q) return true;
        const haystack = `${item.name} ${item.source_address} ${item.address} ${item.poi_title} ${item.poi_address} ${item.district} ${item.category} ${item.search_keyword} ${item.address_poi_id}`.toLowerCase();
        return haystack.includes(q);
      });
    }

    function buildFilterCountSnapshot() {
      const inCity = merchantsInCity();
      const sourceScoped = state.filters.source === "all"
        ? inCity
        : inCity.filter((item) => matchesSourceFilter(item, state.filters.source));
      const typeScoped = state.filters.merchantType === "all"
        ? sourceScoped
        : sourceScoped.filter((item) => matchesMerchantTypeFilter(item, state.filters.merchantType));

      const sourceCounts = {};
      for (const { key } of SOURCE_FILTERS) {
        sourceCounts[key] = key === "all"
          ? inCity.length
          : inCity.filter((item) => matchesSourceFilter(item, key)).length;
      }

      const merchantTypeCounts = {};
      for (const { key } of merchantTypeFilters()) {
        merchantTypeCounts[key] = key === "all"
          ? sourceScoped.length
          : sourceScoped.filter((item) => matchesMerchantTypeFilter(item, key)).length;
      }

      const statusCounts = {};
      for (const { key } of STATUS_FILTERS) {
        statusCounts[key] = key === "all"
          ? typeScoped.length
          : typeScoped.filter((item) => matchesStatusFilter(item, key)).length;
      }

      return { sourceCounts, merchantTypeCounts, statusCounts };
    }

    function renderBizKindFilter() {
      const { merchantTypeCounts } = buildFilterCountSnapshot();
      const filters = merchantTypeFilters();
      els.bizKindFilter.innerHTML = filters.length > 1
        ? filters.map(({ key, label }) => {
          const count = merchantTypeCounts[key] || 0;
          const active = state.filters.merchantType === key;
          return `
          <button type="button" data-merchant-type="${key}" class="${active ? "active" : ""}">
            <span class="seg-btn-label">${escapeHtml(label)}</span>
            <span class="seg-btn-count">${count}</span>
          </button>
        `;
        }).join("")
        : `<button type="button" data-merchant-type="all" class="active"><span class="seg-btn-label">全部</span><span class="seg-btn-count">${merchantsInCity().length}</span></button>`;
    }

    function renderSourceFilter() {
      const { sourceCounts } = buildFilterCountSnapshot();
      els.sourceFilter.innerHTML = SOURCE_FILTERS.map(({ key, label }) => {
        const count = sourceCounts[key] || 0;
        const active = state.filters.source === key;
        return `
          <button type="button" data-source="${key}" class="${active ? "active" : ""}">
            <span class="seg-btn-label">${label}</span>
            <span class="seg-btn-count">${count}</span>
          </button>
        `;
      }).join("");
    }

    function renderStatusFilter() {
      const { statusCounts } = buildFilterCountSnapshot();
      els.statusFilter.innerHTML = STATUS_FILTERS.map(({ key, label }) => {
        const count = statusCounts[key] || 0;
        const active = state.filters.status === key;
        return `
          <button type="button" data-status="${key}" class="${active ? "active" : ""}">
            <span class="seg-btn-label">${label}</span>
            <span class="seg-btn-count">${count}</span>
          </button>
        `;
      }).join("");
    }

    function renderStats() {
      const scoped = merchantsInCity();
      const total = scoped.length;
      const approved = scoped.filter((item) => reviewStatus(item.merchant_uid) === "approved").length;
      const pending = scoped.filter((item) => isReviewPendingReady(item)).length;
      const rejected = scoped.filter((item) => reviewStatus(item.merchant_uid) === "rejected").length;
      const pendingImport = scoped.filter((item) => isPendingImport(item)).length;
      const cityLabel = state.filters.city === "all" ? "全部城市" : state.filters.city;

      els.stats.innerHTML = [
        ["商户总数", total],
        ["已通过", approved],
        ["待推送", pendingImport],
        ["待定", pending],
      ].map(([label, value]) => `<div class="stat"><b>${value}</b><span>${label}</span></div>`).join("");

      const cityNames = [...new Set(state.merchants.map((item) => getCityKey(item)))].sort((a, b) => a.localeCompare(b, "zh-CN"));
      els.sourceMeta.textContent = cityLabel === "全部城市"
        ? `共 ${cityNames.length} 个城市 · ${state.merchants.length} 家商户`
        : `${cityLabel} · ${total} 家商户`;
    }

    function renderCityFilter() {
      const cities = [...new Set(state.merchants.map((item) => getCityKey(item)))].sort((a, b) => {
        const pendingDiff = cityStats(b).pending - cityStats(a).pending;
        if (pendingDiff !== 0) return pendingDiff;
        return a.localeCompare(b, "zh-CN");
      });
      els.cityFilter.innerHTML = renderCityChip("all", "全部城市")
        + cities.map((city) => renderCityChip(city, city)).join("");
    }

    function renderTypeOptions(item) {
      const current = effectiveMerchantType(item);
      const types = state.merchantTypes.length
        ? state.merchantTypes
        : [{ id: 1, name: "啤酒吧" }, { id: 2, name: "酒馆" }, { id: 16, name: "咖啡厅" }, { id: 13, name: "其他" }];
      return types.map((t) => `<option value="${t.id}" ${Number(current) === Number(t.id) ? "selected" : ""}>${escapeHtml(t.name)} (${t.id})</option>`).join("");
    }

    function renderPoiCandButtons(list, item, indexAttr) {
      if (!list.length) return "";
      return list.map((p, idx) => `
        <button type="button" class="poi-cand ${item.address_poi_id === p.poi_id ? "active" : ""}" ${indexAttr}="${idx}">
          <div>
            <b>${escapeHtml(p.title)}</b>
            <span>${escapeHtml(p.address)}</span>
            <span>POI ${escapeHtml(p.poi_id)}</span>
          </div>
        </button>
      `).join("");
    }

    function dianpingAddressLine(item) {
      const raw = item.source_address || item.address || "";
      if (raw) return raw;
      const district = item.district || item.list_region_text || "";
      return district ? `商圈：${district}` : "（点评未抓到地址）";
    }

    function renderPoiDoubt(item) {
      if (!item.address_poi_id || !item.poi_doubtful) return "";
      const reasons = Array.isArray(item.poi_doubt_reasons) ? item.poi_doubt_reasons : [];
      const detail = reasons.length
        ? reasons.map((reason) => `<div>· ${escapeHtml(reason)}</div>`).join("")
        : "<div>· 请人工核对 POI 是否对应正确门店</div>";
      return `<div class="poi-warn"><b>POI 存疑${item.poi_match_score ? `（得分 ${item.poi_match_score}）` : ""}</b>${detail}</div>`;
    }

    function renderPoiCandidates(item) {
      const preview = state.poiPreviews[item.merchant_uid] || [];
      const saved = item.poi_candidates || [];
      if (!preview.length && !saved.length) return "";
      let html = "";
      if (preview.length) {
        html += `<div class="poi-cands-label">自定义搜索结果（点选后保存）</div>
          <div class="poi-cands">${renderPoiCandButtons(preview, item, "data-poi-preview-index")}</div>`;
      }
      if (saved.length) {
        html += `<div class="poi-cands-label">${preview.length ? "已保存候选" : "候选 POI"}</div>
          <div class="poi-cands">${renderPoiCandButtons(saved, item, "data-poi-index")}</div>`;
      }
      return html;
    }

    function renderPager(meta) {
      if (!meta.total) {
        els.pager.hidden = true;
        els.pager.innerHTML = "";
        return;
      }

      const { total, totalPages, page } = meta;
      const from = (page - 1) * PAGE_SIZE + 1;
      const to = Math.min(page * PAGE_SIZE, total);

      let pageButtons = "";
      const windowSize = 5;
      let startPage = Math.max(1, page - Math.floor(windowSize / 2));
      let endPage = Math.min(totalPages, startPage + windowSize - 1);
      startPage = Math.max(1, endPage - windowSize + 1);
      for (let p = startPage; p <= endPage; p += 1) {
        pageButtons += `<button type="button" class="mini ${p === page ? "active" : ""}" data-page="${p}">${p}</button>`;
      }

      els.pager.hidden = false;
      els.pager.innerHTML = `
        <div class="pager-info">第 ${from}–${to} 条，共 ${total} 条 · 第 ${page} / ${totalPages} 页</div>
        <div class="pager-actions">
          <button type="button" class="mini" data-page="prev" ${page <= 1 ? "disabled" : ""}>上一页</button>
          ${pageButtons}
          <button type="button" class="mini" data-page="next" ${page >= totalPages ? "disabled" : ""}>下一页</button>
        </div>
      `;
    }

    function scrollToListTop() {
      els.grid.scrollIntoView({ behavior: "smooth", block: "start" });
    }

    function renderCards(list) {
      if (!list.length) {
        els.grid.innerHTML = `<div class="empty">没有符合条件的商户。请先用 scrape-dianping-merchants 导入，或调整筛选。</div>`;
        return;
      }
      els.grid.innerHTML = list.map((item) => {
        const status = reviewStatus(item.merchant_uid);
        const ready = isImportReady(item);
        const importable = canImportMerchant(item);
        const imported = item.import_status === "imported" && item.buzz_merchant_id;
        const addressLine = dianpingAddressLine(item);
        const detailUrl = merchantDetailUrl(item);
        const chips = [
          item.source === "buzz" ? `<span class="chip">Zup 同步</span>` : "",
          item.city ? `<span class="chip">${escapeHtml(item.city)}</span>` : "",
          item.category ? `<span class="chip">${escapeHtml(item.category)}</span>` : "",
          item.search_keyword ? `<span class="chip">关键词 ${escapeHtml(item.search_keyword)}</span>` : "",
          ready ? `<span class="chip ready">可推送</span>` : `<span class="chip miss">待补全</span>`,
          item.poi_doubtful ? `<span class="chip poi-doubt">POI 存疑</span>` : "",
        ].join("");
        return `
          <article class="card" data-uid="${item.merchant_uid}">
            <div class="cover-wrap">
              <img class="cover" src="${proxyImage(item.image)}" alt="${escapeHtml(item.name)}" loading="lazy">
            </div>
            <div class="body">
              <div class="import-field merchant-name-field">
                <label>商户名（推送字段 name_new，可改）</label>
                <input type="text" data-field="merchant_name" value="${escapeHtml(item.name)}" maxlength="255" spellcheck="false">
              </div>
              <div class="entity-id">商户 ID：<strong>${escapeHtml(item.merchant_uid)}</strong>${imported ? ` · 后台 merchant_id <strong>${escapeHtml(item.buzz_merchant_id)}</strong>` : ""}</div>
              <div class="chips">${chips}</div>
              <div class="info">
                <div><span class="addr-label">点评地址</span>${escapeHtml(addressLine)}</div>
                <div>${escapeHtml(item.avg_price || "")} ${item.review_count ? `${item.review_count} 条评价` : ""}</div>
                ${detailUrl ? `
                <div class="source-url">
                  <span class="label">大众点评详情页</span>
                  <a href="${escapeHtml(detailUrl)}" target="_blank" rel="noopener">${escapeHtml(detailUrl)}</a>
                </div>` : ""}
              </div>
              <div class="import-block">
                <h3>推送 Zup 准备（腾讯 POI）</h3>
                <div class="import-row">
                  <div class="import-field">
                    <label>商户类型</label>
                    <select data-field="merchant_type">${renderTypeOptions(item)}</select>
                  </div>
                  <div class="import-meta">
                    ${item.address_poi_id
    ? `POI：<strong>${escapeHtml(item.poi_title || item.name)}</strong><br>地址：${escapeHtml(item.poi_address || "—")}<br>ID：${escapeHtml(item.address_poi_id)}<br>坐标：${item.longitude}, ${item.latitude}`
    : "尚未匹配 POI，可点「智能匹配」或从候选里改选"}
                    ${renderPoiDoubt(item)}
                  </div>
                  <div class="card-actions" style="margin-top:0">
                    <button class="mini" type="button" data-poi-action="auto">智能匹配</button>
                    <button class="mini" type="button" data-poi-action="refresh">重新查询</button>
                  </div>
                  <p class="poi-hint">智能匹配：在搜索结果里按店名相似度自动选最佳 POI。重新查询：只刷新候选列表，不改动当前已选。</p>
                  <div class="poi-search-row">
                    <input type="text" data-poi-keyword value="${escapeHtml(poiKeywordValue(item))}" placeholder="自定义关键词，如 长沙 黑犬酒吧">
                    <button class="mini" type="button" data-poi-action="custom-search">自由搜索</button>
                  </div>
                  ${renderPoiCandidates(item)}
                  ${renderImportStatus(item)}
                </div>
              </div>
              <div class="card-actions">
                <button class="mini approve ${status === "approved" ? "active" : ""}" data-action="approved">通过</button>
                <button class="mini pending ${renderPendingButtonClass(item, status)}" data-action="pending" title="${escapeHtml(reviewPendingButtonTitle(item))}">待定</button>
                <button class="mini reject ${status === "rejected" ? "active" : ""}" data-action="rejected">拒绝</button>
                <button class="mini import-merchant ${imported ? "done" : ""}" type="button" data-import-uid="${escapeHtml(item.merchant_uid)}" ${importable ? "" : "disabled"}>${escapeHtml(importButtonLabel(item))}</button>
                ${imported ? `<button class="mini delete-buzz" type="button" data-delete-buzz-uid="${escapeHtml(item.merchant_uid)}" data-delete-buzz-merchant-id="${escapeHtml(item.buzz_merchant_id)}">删后台</button>` : ""}
                <button class="mini delete-local" type="button" data-delete-local-uid="${escapeHtml(item.merchant_uid)}" data-delete-local-name="${escapeHtml(item.name)}" data-delete-local-imported="${imported ? "1" : "0"}">删除</button>
                ${detailUrl ? `<a class="link" href="${escapeHtml(detailUrl)}" target="_blank" rel="noopener">打开详情页</a>` : ""}
              </div>
            </div>
          </article>
        `;
      }).join("");
    }

    function renderBatchReviewBar() {
      if (!els.batchReviewBar || !els.batchReviewHint) return;
      const show = BATCH_REVIEW_STATUS_FILTERS.has(state.filters.status);
      els.batchReviewBar.classList.toggle("visible", show);
      if (!show) return;

      const count = filteredMerchants().length;
      const filterLabel = BATCH_REVIEW_FILTER_LABELS[state.filters.status] || state.filters.status;
      els.batchReviewHint.textContent = count
        ? `当前「${filterLabel}」共 ${count} 家（含来源/类型/搜索筛选）`
        : `当前「${filterLabel}」筛选下没有商户`;
      if (els.batchApproveBtn) els.batchApproveBtn.disabled = state.reviewBusy || count === 0;
      if (els.batchRejectBtn) els.batchRejectBtn.disabled = state.reviewBusy || count === 0;
    }

    function render() {
      const filtered = filteredMerchants();
      const { list, total, totalPages } = paginatedMerchants(filtered);
      renderStats();
      renderCityFilter();
      renderSourceFilter();
      renderBizKindFilter();
      renderStatusFilter();
      renderBatchReviewBar();
      renderCards(list);
      renderPager({ total, totalPages, page: state.page });
    }

    function goToPage(nextPage, scroll = true) {
      state.page = nextPage;
      render();
      void hydrateVisiblePoiCandidates();
      if (scroll) scrollToListTop();
    }

    els.cityFilter.addEventListener("click", (event) => {
      const button = event.target.closest("button[data-city]");
      if (!button) return;
      state.filters.city = button.dataset.city;
      resetPage();
      render();
    });

    els.bizKindFilter.addEventListener("click", (event) => {
      const button = event.target.closest("button[data-merchant-type]");
      if (!button) return;
      state.filters.merchantType = button.dataset.merchantType;
      [...els.bizKindFilter.querySelectorAll("button")].forEach((node) => node.classList.toggle("active", node === button));
      resetPage();
      render();
    });

    els.sourceFilter.addEventListener("click", (event) => {
      const button = event.target.closest("button[data-source]");
      if (!button) return;
      state.filters.source = button.dataset.source;
      [...els.sourceFilter.querySelectorAll("button")].forEach((node) => node.classList.toggle("active", node === button));
      resetPage();
      render();
    });

    els.statusFilter.addEventListener("click", (event) => {
      const button = event.target.closest("button[data-status]");
      if (!button) return;
      state.filters.status = button.dataset.status;
      [...els.statusFilter.querySelectorAll("button")].forEach((node) => node.classList.toggle("active", node === button));
      resetPage();
      render();
    });

    els.searchInput.addEventListener("input", (event) => {
      state.filters.search = event.target.value;
      resetPage();
      render();
    });

    els.pager.addEventListener("click", (event) => {
      const button = event.target.closest("button[data-page]");
      if (!button || button.disabled) return;
      const filtered = filteredMerchants();
      const { totalPages } = paginatedMerchants(filtered);
      const raw = button.dataset.page;
      if (raw === "prev") {
        goToPage(state.page - 1);
        return;
      }
      if (raw === "next") {
        goToPage(state.page + 1);
        return;
      }
      const page = Number(raw);
      if (!Number.isFinite(page) || page < 1 || page > totalPages) return;
      goToPage(page);
    });

    els.backTopBtn.addEventListener("click", () => {
      window.scrollTo({ top: 0, behavior: "smooth" });
    });

    window.addEventListener("scroll", () => {
      els.backTopBtn.classList.toggle("visible", window.scrollY > 320);
    }, { passive: true });

    els.grid.addEventListener("click", (event) => {
      const card = event.target.closest("[data-uid]");
      if (!card) return;
      const uid = card.dataset.uid;

      const reviewBtn = event.target.closest("button[data-action]");
      if (reviewBtn) {
        setDecision(uid, reviewBtn.dataset.action);
        return;
      }

      const poiBtn = event.target.closest("button[data-poi-action]");
      if (poiBtn) {
        const merchant = state.merchants.find((m) => m.merchant_uid === uid);
        const type = Number(card.querySelector('[data-field="merchant_type"]')?.value) || effectiveMerchantType(merchant);
        if (poiBtn.dataset.poiAction === "auto") {
          applyPoi(uid, { merchant_type: type });
        } else if (poiBtn.dataset.poiAction === "refresh") {
          applyPoi(uid, { merchant_type: type, refresh: true });
        } else if (poiBtn.dataset.poiAction === "custom-search") {
          searchPoiCustom(uid, card);
        }
        return;
      }

      const previewBtn = event.target.closest("button[data-poi-preview-index]");
      if (previewBtn) {
        const merchant = state.merchants.find((m) => m.merchant_uid === uid);
        const type = Number(card.querySelector('[data-field="merchant_type"]')?.value) || effectiveMerchantType(merchant);
        const list = state.poiPreviews[uid] || [];
        const poi = list[Number(previewBtn.dataset.poiPreviewIndex)];
        if (!poi) return;
        applyPoi(uid, {
          merchant_type: type,
          poi_id: poi.poi_id,
          title: poi.title,
          address: poi.address,
          latitude: poi.latitude,
          longitude: poi.longitude,
          candidates: list,
        });
        return;
      }

      const candBtn = event.target.closest("button[data-poi-index]");
      if (candBtn) {
        const merchant = state.merchants.find((m) => m.merchant_uid === uid);
        const type = Number(card.querySelector('[data-field="merchant_type"]')?.value) || effectiveMerchantType(merchant);
        applyPoi(uid, {
          merchant_type: type,
          candidate_index: Number(candBtn.dataset.poiIndex),
        });
        return;
      }

      const importBtn = event.target.closest("button[data-import-uid]");
      if (importBtn && !importBtn.disabled) {
        importSingleMerchant(importBtn.dataset.importUid);
        return;
      }

      const deleteBuzzBtn = event.target.closest("button[data-delete-buzz-uid]");
      if (deleteBuzzBtn) {
        deleteBuzzMerchant(deleteBuzzBtn.dataset.deleteBuzzUid, deleteBuzzBtn.dataset.deleteBuzzMerchantId);
        return;
      }

      const deleteLocalBtn = event.target.closest("button[data-delete-local-uid]");
      if (deleteLocalBtn) {
        deleteLocalMerchant(
          deleteLocalBtn.dataset.deleteLocalUid,
          deleteLocalBtn.dataset.deleteLocalName,
          deleteLocalBtn.dataset.deleteLocalImported === "1",
        );
      }
    });

    els.grid.addEventListener("input", (event) => {
      const input = event.target.closest("[data-poi-keyword]");
      if (!input) return;
      const card = input.closest("[data-uid]");
      if (!card) return;
      state.poiKeywords[card.dataset.uid] = input.value;
    });

    els.grid.addEventListener("change", (event) => {
      const select = event.target.closest('select[data-field="merchant_type"]');
      if (select) {
        const card = select.closest("[data-uid]");
        if (!card) return;
        saveImportPrep(card.dataset.uid, { merchant_type: Number(select.value) });
        return;
      }

      const nameInput = event.target.closest('input[data-field="merchant_name"]');
      if (!nameInput) return;
      const card = nameInput.closest("[data-uid]");
      if (!card) return;
      const merchant = state.merchants.find((m) => m.merchant_uid === card.dataset.uid);
      const nextName = nameInput.value.trim();
      if (!nextName) {
        nameInput.value = merchant?.name || "";
        setSaveState("商户名不能为空", "error");
        return;
      }
      if (merchant && nextName === merchant.name) return;
      saveImportPrep(card.dataset.uid, { name: nextName });
    });

    els.grid.addEventListener("keydown", (event) => {
      if (event.key !== "Enter") return;
      const nameInput = event.target.closest('input[data-field="merchant_name"]');
      if (!nameInput) return;
      event.preventDefault();
      nameInput.blur();
    });

    if (els.poiModeToggle) {
      els.poiModeToggle.addEventListener("click", (event) => {
        const button = event.target.closest("button[data-mode]");
        if (!button) return;
        switchPoiMatchMode(button.dataset.mode);
      });
    }
    if (els.batchApproveBtn) {
      els.batchApproveBtn.addEventListener("click", () => {
        void batchSetReviewStatus("approved");
      });
    }
    if (els.batchRejectBtn) {
      els.batchRejectBtn.addEventListener("click", () => {
        void batchSetReviewStatus("rejected");
      });
    }
    els.batchPoiBtn.addEventListener("click", runBatchPoi);
    els.batchImportBtn.addEventListener("click", runBatchImport);
    els.importModalAbort.addEventListener("click", requestImportAbort);
    els.importModalClose.addEventListener("click", closeImportProgressModal);
    els.importModal.querySelector(".import-modal-backdrop").addEventListener("click", () => {
      if (!els.importModalClose.disabled) closeImportProgressModal();
    });

    els.exportImportBtn.addEventListener("click", async () => {
      const response = await fetch("/api/export-import-merchants?approved_only=1&ready_only=1", { cache: "no-store" });
      const payload = await response.json();
      if (!payload.count) {
        setSaveState("没有「已通过且可推送」的商户", "warn");
        return;
      }
      const blob = new Blob([JSON.stringify(payload.merchants, null, 2)], { type: "application/json" });
      const url = URL.createObjectURL(blob);
      const anchor = document.createElement("a");
      anchor.href = url;
      anchor.download = "merchants-import.json";
      anchor.click();
      URL.revokeObjectURL(url);
      setSaveState(`已导出 ${payload.count} 条推送 JSON`, "ok");
    });

    els.syncFromBuzzBtn.addEventListener("click", async () => {
      const envLabel = BuzzEnvUi.envLabel();
      if (!window.confirm(
        `从 ${envLabel} 拉取商户到审核台？\n\n仅补全后台已有、本地缺失的商户。\n同 POI 但 merchant_id 不同的本地记录将被删除（不删 Buzz 后台）。`,
      )) return;
      setSaveState(`补全商户中（${envLabel}）...`, "warn");
      try {
        const response = await fetch("/api/merchants/sync-from-buzz", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(BuzzEnvUi.importBody({})),
        });
        const data = await response.json();
        if (!response.ok || !data.ok) throw new Error(data.error || "补全失败");
        await loadMerchants();
        setSaveState(
          `补全完成：新增 ${data.created}，跳过 ${data.skipped}，删除 ${data.deleted}`,
          data.errors?.length ? "warn" : "ok",
        );
      } catch (error) {
        setSaveState(error.message || "补全失败", "error");
      }
    });

    async function boot() {
      try {
        await BuzzEnvUi.initBuzzEnvUi("#buzzEnvBar");
        updateBatchImportButtonLabel();
        window.onBuzzEnvChanged = async () => {
          updateBatchImportButtonLabel();
          setSaveState("切换环境中...", "warn");
          state.filters.merchantType = "all";
          await Promise.all([loadMerchantTypes(), loadMerchants()]);
        };
        setSaveState("加载商户数据...", "warn");
        await Promise.all([
          loadReviewState(),
          loadMerchantTypes(),
          loadMerchants(),
        ]);
      } catch (error) {
        setSaveState(`连接失败: ${error.message}`, "error");
      }
    }

    boot();
  </script>
</body>
</html>
