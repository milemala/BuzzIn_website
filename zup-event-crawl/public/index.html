<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Zup 抓取活动审核台</title>
  <link rel="stylesheet" href="/workspace-nav.css">
  <link rel="stylesheet" href="/buzz-env-ui.css">
  <style>
    :root{
      --bg:#f7f4ed;
      --panel:#fffdf8;
      --text:#1f1b16;
      --muted:#82786a;
      --line:#e6ded0;
      --yellow:#ffd84d;
      --green:#2a9d68;
      --red:#d95040;
      --ink:#14110d;
    }
    *{box-sizing:border-box}
    body{margin:0;background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif}
    button,input,select,textarea{font:inherit}
    .top{background:rgba(247,244,237,.92);border-bottom:1px solid var(--line)}
    .top-inner{max-width:1180px;margin:0 auto;padding:18px 20px;display:flex;gap:16px;align-items:center;justify-content:space-between}
    .brand{min-width:0}
    h1{margin:0;font-size:22px;line-height:1.25;letter-spacing:0;font-weight:800}
    .meta{margin-top:5px;color:var(--muted);font-size:13px}
    .save-state{display:inline-flex;align-items:center;height:24px;border-radius:999px;margin-top:8px;padding:0 9px;background:#efe8da;color:#65594b;font-size:12px;font-weight:700}
    .save-state.ok{background:#e7f5ec;color:#197549}
    .save-state.warn{background:#fff3c4;color:#806200}
    .save-state.error{background:#fde8e4;color:#ad382c}
    .actions{display:flex;gap:10px;align-items:center;flex-wrap:wrap;justify-content:flex-end}
    .btn{height:36px;border:1px solid var(--line);background:#fff;border-radius:8px;padding:0 12px;cursor:pointer;color:var(--ink)}
    .btn.primary{border-color:#111;background:#111;color:#fff}
    .btn:hover{transform:translateY(-1px)}
    .wrap{max-width:1180px;margin:0 auto;padding:18px 20px 44px}
    .filters{display:flex;gap:10px;align-items:center;flex-wrap:wrap;margin-bottom:16px}
    .source-filters{margin-bottom:10px}
    .source-filters .filter-label{flex:0 0 100%;font-size:12px;font-weight:700;color:var(--muted);margin:0 0 -4px}
    #cityFilter{display:flex;flex-wrap:wrap;gap:8px;border:0;background:transparent;overflow:visible}
    #cityFilter button{
      height:auto;min-width:88px;padding:9px 12px;border:1px solid var(--line);border-radius:10px;
      background:#fff;color:var(--text);display:flex;flex-direction:column;align-items:flex-start;gap:4px;text-align:left
    }
    #cityFilter button.active{background:#111;border-color:#111;color:#fff}
    #cityFilter button.has-pending:not(.active){border-color:#e6cf66;background:#fffdf4}
    .city-main{font-size:14px;font-weight:800;line-height:1.1}
    .city-sub{display:flex;flex-wrap:wrap;gap:6px;font-size:11px;line-height:1.2;opacity:.78}
    #cityFilter button.active .city-sub{opacity:.85}
    .city-pending{font-weight:800;color:#9a7200}
    #cityFilter button.active .city-pending{color:#ffd84d}
    .city-pending.is-zero{opacity:.55;font-weight:600}
    #cityFilter button.active .city-pending.is-zero{opacity:.45}
    .city-imported{font-weight:800;color:#2f6d4d}
    #cityFilter button.active .city-imported{color:#9dffc8}
    .city-imported.is-zero{opacity:.55;font-weight:600}
    #cityFilter button.active .city-imported.is-zero{opacity:.45}
    .city-pending-import{font-weight:800;color:#197549}
    #cityFilter button.active .city-pending-import{color:#9dffc8}
    .city-pending-import.is-zero{opacity:.55;font-weight:600}
    #cityFilter button.active .city-pending-import.is-zero{opacity:.45}
    .date-filters{margin:-2px 0 16px;overflow-x:auto;overflow-y:hidden;-webkit-overflow-scrolling:touch;padding-bottom:4px}
    .date-filters .seg{display:flex;width:max-content;min-width:100%}
    .date-filters .seg button{height:46px;min-width:74px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;line-height:1.1;white-space:nowrap}
    .date-filters .seg button[data-date="all"]{min-width:92px}
    .date-main{font-size:13px;font-weight:700}
    .date-sub{display:flex;flex-wrap:wrap;gap:6px;justify-content:center;font-size:11px;color:inherit;opacity:.88;line-height:1.2}
    #dateFilter button.active .date-sub{opacity:.92}
    #dateFilter .city-pending{font-weight:800;color:#9a7200}
    #dateFilter button.active .city-pending{color:#ffd84d}
    #dateFilter .city-pending.is-zero{opacity:.55;font-weight:600}
    #dateFilter button.active .city-pending.is-zero{opacity:.45}
    #dateFilter .city-imported{font-weight:800;color:#2f6d4d}
    #dateFilter button.active .city-imported{color:#9dffc8}
    #dateFilter .city-imported.is-zero{opacity:.55;font-weight:600}
    #dateFilter button.active .city-imported.is-zero{opacity:.45}
    #dateFilter .city-pending-import{font-weight:800;color:#197549}
    #dateFilter button.active .city-pending-import{color:#9dffc8}
    #dateFilter .city-pending-import.is-zero{opacity:.55;font-weight:600}
    #dateFilter button.active .city-pending-import.is-zero{opacity:.45}
    .seg{display:inline-flex;flex-wrap:wrap;border:1px solid var(--line);border-radius:8px;overflow:hidden;background:#fff}
    .seg button{
      min-height:44px;border:0;border-right:1px solid var(--line);background:transparent;padding:5px 10px;cursor:pointer;color:var(--muted);
      display:inline-flex;flex-direction:column;align-items:center;justify-content:center;gap:1px;line-height:1.15
    }
    .seg button:last-child{border-right:0}
    .seg button.active{background:#111;color:#fff}
    .seg button:disabled{opacity:.45;cursor:not-allowed}
    .seg-btn-label{font-size:13px}
    .seg-btn-count{font-size:11px;font-weight:700;opacity:.72}
    .seg button.active .seg-btn-count{opacity:.88}
    .search{height:36px;border:1px solid var(--line);border-radius:8px;background:#fff;padding:0 12px;min-width:260px}
    .grid{display:grid;grid-template-columns:1fr;gap:12px}
    .card{background:var(--panel);border:1px solid var(--line);border-radius:8px;overflow:hidden;display:grid;grid-template-columns:156px minmax(0,1fr)}
    .cover-wrap{position:relative;width:156px;min-height:218px;background:#eee6d8}
    .cover{display:block;width:156px;height:100%;min-height:218px;background:#eee6d8;object-fit:contain}
    .cover-fallback{position:absolute;inset:0;display:none;align-items:center;justify-content:center;padding:12px;text-align:center;color:#8a7c6b;font-size:12px;line-height:1.45;background:#eee6d8}
    .cover-wrap.broken .cover{display:none}
    .cover-wrap.broken .cover-fallback{display:flex}
    .body{padding:13px 14px;min-width:0}
    .row{display:flex;align-items:flex-start;justify-content:space-between;gap:10px}
    .title{margin:0;font-size:16px;line-height:1.35;font-weight:800}
    .score{flex:none;border-radius:999px;background:#efe8da;color:#5e5345;font-size:12px;font-weight:800;padding:4px 8px}
    .score.good{background:#e7f5ec;color:#197549}
    .score.bad{background:#fde8e4;color:#ad382c}
    .chips{display:flex;gap:6px;flex-wrap:wrap;margin:10px 0}
    .chip{font-size:12px;padding:4px 8px;border-radius:999px;background:#f0eadf;color:#6d6254}
    .chip.poi-doubt{background:#fff3c4;color:#806200}
    .poi-warn{margin-top:8px;padding:8px 10px;border-radius:8px;background:#fff8e6;border:1px solid #f0d98a;color:#7a5b00;font-size:12px;line-height:1.45}
    .poi-warn b{display:block;margin-bottom:4px}
    .info{display:grid;gap:5px;color:#494036;font-size:13px;line-height:1.45}
    .info div{white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .summary{margin-top:10px;color:#2f281f;font-size:13px;line-height:1.7;white-space:pre-wrap}
    .reason{margin-top:10px;color:var(--muted);font-size:12px;line-height:1.5}
    .card-actions{display:flex;gap:8px;margin-top:12px;align-items:center;flex-wrap:wrap}
    .mini{height:31px;border:1px solid var(--line);border-radius:8px;background:#fff;padding:0 10px;cursor:pointer;color:#302920}
    .mini.approve.active{background:var(--green);border-color:var(--green);color:#fff}
    .mini.reject.active{background:var(--red);border-color:var(--red);color:#fff}
    .mini.pending.active{background:var(--yellow);border-color:var(--yellow);color:#211b10}
    .mini.pending.incomplete,.mini.pending.incomplete.active{background:#ece8e0;border-color:#d8d2c6;color:#8a8278}
    .batch-review-bar{display:none;align-items:center;gap:10px;flex-wrap:wrap;margin:-4px 0 14px;padding:10px 12px;background:#fffdf6;border:1px solid #e6ded0;border-radius:8px}
    .batch-review-bar.visible{display:flex}
    .batch-review-hint{color:var(--muted);font-size:13px}
    .link{margin-left:auto;color:#6b5b00;text-decoration:none;font-size:13px}
    .empty{padding:44px;text-align:center;color:var(--muted);background:var(--panel);border:1px solid var(--line);border-radius:8px}
    .pager{display:flex;flex-wrap:wrap;gap:10px;align-items:center;justify-content:space-between;margin-top:16px;padding:12px 14px;background:var(--panel);border:1px solid var(--line);border-radius:8px}
    .pager-info{font-size:13px;color:var(--muted)}
    .pager-actions{display:flex;flex-wrap:wrap;gap:8px;align-items:center}
    .pager-actions .mini{min-width:36px}
    .pager-actions .mini.active{background:#111;border-color:#111;color:#fff}
    .pager-actions .mini:disabled{opacity:.45;cursor:not-allowed}
    .back-top{
      position:fixed;right:20px;bottom:20px;z-index:30;
      width:44px;height:44px;border:1px solid var(--line);border-radius:999px;
      background:#fff;color:var(--ink);cursor:pointer;box-shadow:0 4px 16px rgba(20,16,8,.12);
      opacity:0;visibility:hidden;transform:translateY(8px);transition:opacity .2s,transform .2s,visibility .2s
    }
    .back-top.visible{opacity:1;visibility:visible;transform:translateY(0)}
    .back-top:hover{border-color:#c8b89f}
    .import-block{margin-top:12px;padding:12px;border:1px solid var(--line);border-radius:8px;background:#f7f6f2}
    .import-block h3{margin:0 0 8px;font-size:13px;font-weight:800;color:#3a342c}
    .import-row{display:grid;gap:8px;font-size:13px}
    .import-meta{color:var(--muted);font-size:12px;line-height:1.45;word-break:break-all}
    .entity-id{font-size:11px;color:var(--muted);line-height:1.45;word-break:break-all}
    .entity-id strong{color:#3a342c;font-weight:700;font-family:ui-monospace,Menlo,Consolas,monospace}
    .import-field{display:grid;gap:4px}
    .import-field label{font-size:11px;font-weight:700;color:var(--muted)}
    .import-field select,.import-field input{height:32px;border:1px solid var(--line);border-radius:6px;padding:0 8px;background:#fff}
    .import-actions{display:flex;gap:8px;flex-wrap:wrap;margin-top:4px}
    .import-ready-tag{display:inline-block;font-size:11px;font-weight:800;padding:2px 8px;border-radius:999px;background:#e7f5ec;color:#197549}
    .import-ready-tag.no{background:#fde8e4;color:#ad382c}
    .chip.poi-hit{background:#e7f5ec;color:#197549}
    .chip.poi-miss{background:#fde8e4;color:#ad382c}
    .chip.classify-pending{background:#fff4df;color:#9a7200}
    .chip.classify-ok{background:#e7f5ec;color:#197549}
    .chip.classify-blocked{background:#fde8e4;color:#ad382c}
    .poi-hit-inline{color:#197549}
    .poi-missing-inline{color:#ad382c}
    .import-merchant-hit{color:#197549}
    .import-merchant-miss{color:#9a7200}
    .import-status{margin-top:6px;font-size:12px;line-height:1.45}
    .import-status.imported{color:#197549;font-weight:800}
    .import-status.failed{color:#ad382c}
    .import-status.pending{color:var(--muted)}
    .mini.import-now{border-color:#111}
    .mini.import-now:disabled{opacity:.45;cursor:not-allowed}
    .mini.import-now.done{background:#e7f5ec;border-color:#2a9d68;color:#197549}
    .mini.delete-buzz{border-color:#d95040;color:#ad382c}
    .mini.delete-buzz:hover{background:#fde8e4}
    .poi-hint{margin:6px 0 0;font-size:11px;line-height:1.45;color:var(--muted)}
    .poi-search-row{display:flex;gap:8px;flex-wrap:wrap;margin-top:8px}
    .poi-search-row input{flex:1 1 180px;height:32px;border:1px solid var(--line);border-radius:6px;padding:0 8px;background:#fff}
    .poi-cands-label{margin-top:10px;font-size:11px;font-weight:700;color:var(--muted)}
    .poi-cands{display:grid;gap:6px;margin-top:6px}
    .poi-cand{display:flex;gap:8px;align-items:flex-start;padding:8px;border:1px solid var(--line);border-radius:8px;background:#fff;cursor:pointer;text-align:left}
    .poi-cand:hover{border-color:#c8b89f}
    .poi-cand.active{border-color:#2a9d68;background:#f2fbf6}
    .poi-cand b{display:block;font-size:13px}
    .poi-cand span{display:block;font-size:11px;color:var(--muted);margin-top:2px}
    dialog{border:1px solid var(--line);border-radius:8px;padding:0;max-width:min(840px,92vw);width:840px;background:#fffdf8;color:var(--text)}
    dialog::backdrop{background:rgba(0,0,0,.28)}
    .import-modal{position:fixed;inset:0;z-index:100;display:grid;place-items:center;padding:20px}
    .import-modal[hidden]{display:none}
    .import-modal-backdrop{position:absolute;inset:0;background:rgba(16,24,20,.45)}
    .import-modal-panel{
      position:relative;width:min(440px,100%);background:#fff;border:1px solid var(--line);border-radius:12px;
      padding:20px 20px 16px;box-shadow:0 16px 48px rgba(20,32,24,.18)
    }
    .import-modal-panel h2{margin:0 0 6px;font-size:18px;font-weight:800}
    .import-modal-scope{margin:0 0 14px;color:var(--muted);font-size:13px;line-height:1.45}
    .import-progress-track{height:10px;border-radius:999px;background:#e8efe9;overflow:hidden;margin-bottom:12px}
    .import-progress-bar{height:100%;width:0;background:linear-gradient(90deg,#2a9d68,#3fbf7f);border-radius:999px;transition:width .35s ease}
    .import-progress-stats{display:grid;gap:6px;font-size:13px;color:#314036;line-height:1.45}
    .import-progress-stats b{font-weight:800}
    .import-progress-latest{margin-top:12px;padding:10px 12px;border-radius:8px;background:#f7faf8;border:1px solid var(--line);font-size:12px;color:var(--muted);line-height:1.45;min-height:44px}
    .import-progress-latest strong{display:block;color:#314036;font-size:13px;margin-bottom:2px}
    .import-progress-failures{margin-top:10px;padding:10px 12px;border-radius:8px;background:#fff5f3;border:1px solid #f0c9c3;font-size:12px;color:#5c2f28;line-height:1.5;max-height:200px;overflow:auto}
    .import-progress-failures[hidden]{display:none}
    .import-progress-failures > strong{display:block;color:#ad382c;font-size:13px;margin-bottom:6px}
    .import-progress-failures ul{margin:0;padding:0;list-style:none;display:grid;gap:8px}
    .import-progress-failures li{padding:6px 0;border-bottom:1px solid #f5ddd9}
    .import-progress-failures li:last-child{border-bottom:0;padding-bottom:0}
    .import-progress-failures b{color:#3a1f1a;font-size:12px}
    .import-progress-failures .fail-reason{margin-top:2px;color:#8a3f35;word-break:break-word}
    .import-modal-actions{display:flex;justify-content:flex-end;gap:8px;margin-top:16px}
    .import-modal-actions .btn{min-width:88px}
    .import-modal-actions .btn:disabled{opacity:.45;cursor:not-allowed}
    .import-modal-actions .btn.abort{border-color:#d95040;color:#ad382c}
    .modal-head{display:flex;align-items:center;justify-content:space-between;padding:14px 16px;border-bottom:1px solid var(--line)}
    .modal-head h2{font-size:18px;margin:0}
    textarea{display:block;width:100%;height:430px;border:0;padding:16px;background:#fffdf8;color:#211b10;font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;font-size:12px;line-height:1.5;resize:vertical}
    @media (max-width:820px){
      .top-inner{align-items:flex-start;flex-direction:column}
      .actions{justify-content:flex-start}
      .card{grid-template-columns:104px minmax(0,1fr)}
      .cover-wrap,.cover{width:104px}
      .cover-wrap,.cover{min-height:220px}
      .search{min-width:0;width:100%}
    }
  </style>
</head>
<body>
  <header class="top">
    <div class="top-inner">
      <div class="brand">
        <nav class="workspace-nav" aria-label="工作区">
          <a href="/" class="active">活动审核</a>
          <a href="/merchants.html">商户审核</a>
          <a href="/merchant-bubbles.html">商户气泡</a>
        </nav>
        <div class="buzz-env-bar" id="buzzEnvBar"></div>
        <h1>Zup 抓取活动审核台</h1>
        <div class="meta" id="sourceMeta">读取本地活动数据中...</div>
        <div class="save-state warn" id="saveState">正在连接本地数据库</div>
      </div>
      <div class="actions">
        <button class="btn" id="resetBtn">重置审核</button>
        <button class="btn" id="batchPrepBtn">批量补全推送字段</button>
        <button class="btn primary" id="batchImportBtn">批量推送 Zup（测试）</button>
        <button class="btn" id="exportBtn">导出 JSON</button>
      </div>
    </div>
  </header>

  <main class="wrap">
    <section class="filters source-filters">
      <p class="filter-label">活动来源</p>
      <div class="seg" id="sourceFilter"></div>
    </section>
    <section class="filters">
      <div class="seg" id="cityFilter">
        <button data-city="all" class="active">全部城市</button>
      </div>
      <div class="seg" id="statusFilter"></div>
      <div class="seg" id="categoryFilter"></div>
      <div class="seg" id="sortMode">
        <button data-sort="source" class="active">来源原始顺序</button>
        <button data-sort="time">活动时间</button>
      </div>
      <input class="search" id="searchInput" placeholder="搜索标题、地点、发起方">
    </section>
    <section class="date-filters">
      <div class="seg" id="dateFilter">
        <button data-date="all" class="active">全部日期</button>
      </div>
    </section>
    <section class="batch-review-bar" id="batchReviewBar">
      <button class="btn primary" id="batchApproveBtn" type="button">批量通过</button>
      <button class="btn" id="batchRejectBtn" type="button">批量拒绝</button>
      <span class="batch-review-hint" id="batchReviewHint"></span>
    </section>
    <section class="grid" id="list"></section>
    <nav class="pager" id="pager" hidden aria-label="分页"></nav>
  </main>

  <button class="back-top" id="backTopBtn" type="button" title="回到顶部" aria-label="回到顶部">↑</button>

  <dialog id="exportDialog">
    <div class="modal-head">
      <h2>推送 Zup JSON（now/sample 格式）</h2>
      <button class="btn" onclick="document.getElementById('exportDialog').close()">关闭</button>
    </div>
    <textarea id="exportText" readonly></textarea>
  </dialog>

  <div class="import-modal" id="importModal" hidden>
    <div class="import-modal-backdrop"></div>
    <div class="import-modal-panel" role="dialog" aria-modal="true" aria-labelledby="importModalTitle">
      <h2 id="importModalTitle">推送 Zup 中</h2>
      <p class="import-modal-scope" id="importModalScope"></p>
      <div class="import-progress-track" aria-hidden="true">
        <div class="import-progress-bar" id="importProgressBar"></div>
      </div>
      <div class="import-progress-stats" id="importProgressStats"></div>
      <div class="import-progress-latest" id="importProgressLatest">准备开始…</div>
      <div class="import-progress-failures" id="importProgressFailures" hidden></div>
      <div class="import-modal-actions">
        <button class="btn abort" id="importModalAbort" type="button">中止</button>
        <button class="btn primary" id="importModalClose" type="button" disabled>关闭</button>
      </div>
    </div>
  </div>

  <script src="/buzz-env-ui.js"></script>
  <script>
    let payload = { events: [], cities: [], cityMeta: {}, sourcePages: {}, dateWindow: [] };
    const stateKey = "zup-crawl-review-v1";
    let reviewState = JSON.parse(localStorage.getItem(stateKey) || "{}");
    let serverSaveEnabled = false;
    let cityFilter = "all";
    let statusFilter = "all";
    let sourceFilter = "all";
    let categoryFilter = "all";
    let dateFilter = "all";
    let sortMode = "source";
    let searchTerm = "";
    let page = 1;
    const PAGE_SIZE = 20;
    function defaultPublishUserId() {
      return BuzzEnvUi.defaultPublishUserId() || "579362104";
    }

    function publishUserIdFromEvent(event) {
      return String(event?.publish_user_id || defaultPublishUserId()).trim() || defaultPublishUserId();
    }
    const DEFAULT_NOW_TYPE = 3;
    let prepBusy = false;
    let importBusy = false;
    let importElapsedTimer = null;
    let importAbortController = null;
    let importAbortRequested = false;
    let importFailures = [];
    let reviewBusy = false;
    const BATCH_REVIEW_STATUS_FILTERS = new Set(["pending", "no_poi", "poi_doubtful", "rule-blocked"]);
    const BATCH_REVIEW_FILTER_LABELS = {
      pending: "待定",
      no_poi: "未匹配 POI",
      poi_doubtful: "POI 存疑",
      "rule-blocked": "挡下待处理",
    };
    const poiKeywords = {};
    const poiPreviews = {};
    let eventIndex = [];
    const eventUidToIndex = new Map();
    let filterMetrics = null;

    const STATUS_FILTER_KEYS = [
      "all", "imported", "suggested", "classification-pending", "rule-blocked",
      "approved", "rejected", "pending", "import_ready", "no_poi", "poi_doubtful", "expired",
    ];

    const sourceMeta = document.getElementById("sourceMeta");
    const listEl = document.getElementById("list");
    const pagerEl = document.getElementById("pager");
    const backTopBtn = document.getElementById("backTopBtn");
    const cityFilterEl = document.getElementById("cityFilter");
    const statusFilterEl = document.getElementById("statusFilter");
    const sourceFilterEl = document.getElementById("sourceFilter");
    const categoryFilterEl = document.getElementById("categoryFilter");
    const dateFilterEl = document.getElementById("dateFilter");
    const sortModeEl = document.getElementById("sortMode");
    const searchInput = document.getElementById("searchInput");
    const saveStateEl = document.getElementById("saveState");
    const importModalEl = document.getElementById("importModal");
    const importModalTitleEl = document.getElementById("importModalTitle");
    const importModalScopeEl = document.getElementById("importModalScope");
    const importProgressBarEl = document.getElementById("importProgressBar");
    const importProgressStatsEl = document.getElementById("importProgressStats");
    const importProgressLatestEl = document.getElementById("importProgressLatest");
    const importProgressFailuresEl = document.getElementById("importProgressFailures");
    const importModalCloseEl = document.getElementById("importModalClose");
    const importModalAbortEl = document.getElementById("importModalAbort");
    function getStatus(event) {
      const uid = event.eventUid || event.event_uid || event.id;
      return reviewState[uid] || event.review_status || "pending";
    }

    function isSuggested(event) {
      return event.suggested === true || event.suggested === 1;
    }

    function isAgentClassified(event) {
      return String(event.classification_source || "") === "agent";
    }

    function isClassificationPending(event) {
      if (isAgentClassified(event)) return false;
      return String(event.category || "") === "待分类"
        || String(event.classification_source || "pending") === "pending";
    }

    function isAgentBlocked(event) {
      return isAgentClassified(event) && !isSuggested(event);
    }

    function isRuleBlockedUnprocessed(event) {
      return isAgentBlocked(event) && getStatus(event) === "pending";
    }

    function renderClassificationChip(event) {
      if (isClassificationPending(event)) {
        return `<span class="chip classify-pending">待分类</span>`;
      }
      return isSuggested(event)
        ? `<span class="chip classify-ok">推荐</span>`
        : `<span class="chip classify-blocked">已挡下</span>`;
    }

    function setStatusFilter(next) {
      statusFilter = next;
      statusFilterEl.querySelectorAll("button").forEach((item) => {
        item.classList.toggle("active", item.dataset.status === next);
      });
      resetPage();
      render();
    }

    function effectivePublishUserId(event) {
      return publishUserIdFromEvent(event);
    }

    function parseStoredDateTime(value) {
      const raw = String(value || "").trim();
      if (!raw) return null;
      const full = raw.match(/^(\d{4})-(\d{2})-(\d{2})\s+(\d{2}):(\d{2}):(\d{2})$/);
      if (full) {
        return new Date(
          Number(full[1]),
          Number(full[2]) - 1,
          Number(full[3]),
          Number(full[4]),
          Number(full[5]),
          Number(full[6]),
        );
      }
      const dateOnly = raw.match(/^(\d{4})-(\d{2})-(\d{2})$/);
      if (dateOnly) {
        return new Date(Number(dateOnly[1]), Number(dateOnly[2]) - 1, Number(dateOnly[3]), 0, 0, 0);
      }
      const date = new Date(raw);
      return Number.isNaN(date.getTime()) ? null : date;
    }

    function hasEventStarted(event) {
      const raw = event.start_at || event.startDate || event.start_date || "";
      const start = parseStoredDateTime(raw);
      return !!start && start.getTime() <= Date.now();
    }

    function suggestNowType(event) {
      return hasEventStarted(event) ? 2 : 3;
    }

    /** 1 动态保留人工选择；2/3 随是否已开始实时变化（与推送逻辑一致） */
    function effectiveNowType(event) {
      const n = Number(event.now_type);
      if (n === 1) return 1;
      return suggestNowType(event);
    }

    function resolvePoiCoordinates(event) {
      const poiId = String(event.location_poi_id || "").trim();
      if (!poiId) return { latitude: null, longitude: null };
      if (event.poi_latitude != null && event.poi_longitude != null) {
        return { latitude: event.poi_latitude, longitude: event.poi_longitude };
      }
      const match = (event.poi_candidates || []).find((item) => item.poi_id === poiId);
      if (match && match.latitude != null && match.longitude != null) {
        return { latitude: match.latitude, longitude: match.longitude };
      }
      return { latitude: null, longitude: null };
    }

    function isImportReady(event) {
      if (!effectivePublishUserId(event)) return false;
      if (![1, 2, 3].includes(effectiveNowType(event))) return false;
      if (!String(event.title || "").trim()) return false;
      if (!String(event.location_poi_id || "").trim()) return false;
      const poiCoords = resolvePoiCoordinates(event);
      if (poiCoords.latitude == null || poiCoords.longitude == null) return false;
      if (!event.start_at) return false;
      if (!event.expired_at) return false;
      return true;
    }

    /** 审核台「待定」：字段齐全、可进入人工通过队列（不含未匹配 POI / 存疑 / 挡下） */
    function isReviewPendingReady(event) {
      if (getStatus(event) !== "pending") return false;
      if (!isImportReady(event)) return false;
      if (event.poi_doubtful) return false;
      if (isRuleBlockedUnprocessed(event)) return false;
      return true;
    }

    function reviewPendingButtonTitle(event) {
      if (isReviewPendingReady(event)) return "字段齐全，计入待定";
      if (getStatus(event) !== "pending") return "非待定状态";
      if (!isImportReady(event)) return "字段未齐或未匹配 POI，不计入待定";
      if (event.poi_doubtful) return "POI 存疑，不计入待定";
      if (isRuleBlockedUnprocessed(event)) return "挡下待处理，不计入待定";
      return "不计入待定";
    }

    function renderPendingButtonClass(event, status) {
      const counted = isReviewPendingReady(event);
      if (status === "pending") return counted ? "active" : "active incomplete";
      return counted ? "" : "incomplete";
    }

    function buildImportContent(event) {
      const timeText = String(event.timeText || event.time_text || "").trim();
      const body = String(event.body || "").trim();
      const parts = [];
      if (timeText) parts.push(timeText);
      if (body && (!timeText || !body.startsWith(timeText))) parts.push(body);
      return parts.join("\n\n").slice(0, 2000);
    }

    function buildImportRecord(event) {
      const images = event.image ? [event.image] : [];
      const loc = String(event.location || "").trim();
      const poiCoords = resolvePoiCoordinates(event);
      const record = {
        user_id: effectivePublishUserId(event),
        now_title: String(event.title || "").slice(0, 128),
        now_content: buildImportContent(event),
        now_type: effectiveNowType(event),
        images,
        group_id: "",
        location_poi_id: event.location_poi_id || "",
        location_name: event.poi_title || loc.split(/\s+/)[0] || "",
        location_address: event.poi_address || loc,
        location_latitude: poiCoords.latitude,
        location_longitude: poiCoords.longitude,
        start_at: event.start_at || "",
        expired_at: event.expired_at || "",
      };
      if (event.now_merchant_id) record.now_merchant_id = event.now_merchant_id;
      return record;
    }

    function renderMerchantInfo(event) {
      if (!event.location_poi_id) return "";
      if (event.now_merchant_id) {
        const name = event.now_merchant_name || "已认证商户";
        return `<div class="import-meta import-merchant-hit">关联商户：<strong>${escapeHtml(name)}</strong> · merchant_id ${escapeHtml(event.now_merchant_id)}</div>`;
      }
      return `<div class="import-meta import-merchant-miss">关联商户：该 POI 在后台暂无认证商户</div>`;
    }

    function renderImportStatus(event) {
      const env = importEnvLabel();
      if (event.import_status === "imported" && event.buzz_now_id) {
        const groupLine = event.buzz_group_id
          ? `<br>群聊 group_id <strong>${escapeHtml(event.buzz_group_id)}</strong>`
          : "";
        return `<div class="import-status imported">已推送 · ${escapeHtml(env)} · now_id <strong>${escapeHtml(event.buzz_now_id)}</strong>${groupLine}</div>`;
      }
      if (event.import_status === "failed") {
        return `<div class="import-status failed">推送失败：${escapeHtml(event.import_error || "未知错误")}</div>`;
      }
      return `<div class="import-status pending">尚未推送</div>`;
    }

    function isImportedEvent(event) {
      return event.import_status === "imported" && Boolean(String(event.buzz_now_id || "").trim());
    }

    /** 待推送：已通过 + 字段齐全 + 尚未写入 Buzz */
    function isPendingImportEvent(event) {
      if (getStatus(event) !== "approved") return false;
      return isImportReady(event) && !isImportedEvent(event);
    }

    function hasNoPoi(event) {
      return !String(event.location_poi_id || "").trim();
    }

    function renderPoiSummary(event) {
      const poiId = String(event.location_poi_id || "").trim();
      if (!poiId) {
        return `<div class="poi-missing-inline">POI：<strong>尚未匹配</strong></div>`;
      }
      const title = String(event.poi_title || "").trim() || "已绑定 POI";
      const address = String(event.poi_address || "").trim();
      const addressLine = address ? `<br><span style="color:var(--muted)">${escapeHtml(address)}</span>` : "";
      return `<div class="poi-hit-inline">POI：<strong>${escapeHtml(title)}</strong>${addressLine}</div>`;
    }

    function canImportEvent(event) {
      return isPendingImportEvent(event);
    }

    function importButtonLabel(event) {
      const env = importEnvLabel();
      if (event.import_status === "imported" && event.buzz_now_id) return `已推送（${env}）`;
      if (event.import_status === "failed") return `重试推送（${env}）`;
      return `推送 Zup（${env}）`;
    }

    function getApprovedEvents() {
      return getActiveEvents()
        .filter((event) => getStatus(event) === "approved")
        .map((event) => buildImportRecord(event));
    }

    function upsertEvent(updated) {
      const idx = payload.events.findIndex((item) => (item.eventUid || item.event_uid) === (updated.eventUid || updated.event_uid));
      if (idx >= 0) payload.events[idx] = { ...payload.events[idx], ...updated };
      rebuildEventIndex();
    }

    function suggestPoiKeyword(event) {
      if (event.poi_suggest_keyword) return event.poi_suggest_keyword;
      if (event.poi_agent_search_keyword) return event.poi_agent_search_keyword;
      return "";
    }

    function poiKeywordValue(event) {
      const uid = event.eventUid || event.event_uid;
      return poiKeywords[uid] !== undefined ? poiKeywords[uid] : suggestPoiKeyword(event);
    }

    async function saveImportPrep(uid, patch) {
      setSaveState("保存推送字段...", "warn");
      const response = await fetch(`/api/events/${encodeURIComponent(uid)}/import-prep`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(BuzzEnvUi.importBody(patch)),
      });
      const data = await response.json();
      if (!response.ok || !data.ok) {
        setSaveState(data.error || "保存失败", "error");
        return null;
      }
      upsertEvent(data.event);
      setSaveState("已保存", "ok");
      render();
      return data.event;
    }

    async function applyPoi(uid, body) {
      const isRefresh = Boolean(body.refresh || body.candidates_only);
      setSaveState(isRefresh ? "刷新候选 POI..." : "查询 POI...", "warn");
      const response = await fetch(`/api/events/${encodeURIComponent(uid)}/poi`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(body),
      });
      const data = await response.json();
      if (!response.ok || !data.ok) {
        setSaveState(data.error || "POI 失败", "error");
        return null;
      }
      upsertEvent(data.event);
      delete poiPreviews[uid];
      setSaveState(isRefresh ? `已刷新 ${(data.candidates || []).length} 条候选` : "POI 已更新", "ok");
      render();
      return data.event;
    }

    async function searchPoiCustom(uid, card) {
      const input = card.querySelector("[data-poi-keyword]");
      const keyword = String(input?.value || "").trim();
      const event = payload.events.find((item) => (item.eventUid || item.event_uid) === uid);
      if (!keyword) {
        setSaveState("请输入搜索关键词", "warn");
        return;
      }
      poiKeywords[uid] = keyword;
      setSaveState("自由搜索 POI...", "warn");
      const response = await fetch("/api/merchants/poi-search", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ keyword, city: event?.city || "全国" }),
      });
      const data = await response.json();
      if (!response.ok || !data.ok) {
        setSaveState(data.error || "搜索失败", "error");
        return;
      }
      poiPreviews[uid] = data.items || [];
      setSaveState(`找到 ${poiPreviews[uid].length} 条，点选后保存`, "ok");
      render();
    }

    async function deleteBuzzNow(uid, nowId) {
      const env = importEnvLabel();
      const message = `确定从 Buzz【${env}】后台删除此气泡？\n\nnow_id: ${nowId}\n\n审核台里的活动记录会保留，仅清除该环境的推送状态。`;
      if (!window.confirm(message)) return;
      if (!(await BuzzEnvUi.confirmProdAction("将删除正式环境上的真实气泡"))) return;
      setSaveState("正在删除后台气泡...", "warn");
      try {
        const response = await fetch(BuzzEnvUi.withBuzzEnv(`/api/events/${encodeURIComponent(uid)}/buzz-now`), {
          method: "DELETE",
        });
        const data = await response.json();
        if (data.event) upsertEvent(data.event);
        if (!response.ok || !data.ok) {
          setSaveState(data.error || "删除失败", "error");
          render();
          return;
        }
        setSaveState(`已删除后台气泡 ${data.now_id}`, "ok");
        render();
      } catch (error) {
        setSaveState(error.message || "删除失败", "error");
      }
    }

    function publishUserIdFromCard(uid) {
      const card = listEl.querySelector(`article.card[data-uid="${uid}"]`);
      const field = card?.querySelector("[data-import-field='publish_user_id']");
      return String(field?.value || "").trim() || defaultPublishUserId();
    }

    function importEnvLabel() {
      return BuzzEnvUi.envLabel();
    }

    function updateBatchImportButtonLabel() {
      const btn = document.getElementById("batchImportBtn");
      if (btn) btn.textContent = `批量推送 Zup（${importEnvLabel()}）`;
    }

    function formatDuration(ms) {
      const sec = Math.max(1, Math.round(ms / 1000));
      if (sec < 60) return `${sec} 秒`;
      const min = Math.floor(sec / 60);
      const remSec = sec % 60;
      if (min < 60) return remSec ? `${min} 分 ${remSec} 秒` : `${min} 分钟`;
      const hr = Math.floor(min / 60);
      const remMin = min % 60;
      return remMin ? `${hr} 小时 ${remMin} 分` : `${hr} 小时`;
    }

    function stopImportElapsedTimer() {
      if (importElapsedTimer) {
        clearInterval(importElapsedTimer);
        importElapsedTimer = null;
      }
    }

    function resetImportAbortState() {
      importAbortRequested = false;
      importAbortController = new AbortController();
    }

    function isImportAborted() {
      return importAbortRequested || importAbortController?.signal.aborted;
    }

    function requestImportAbort() {
      if (!importBusy) return;
      importAbortRequested = true;
      importAbortController?.abort();
      importModalAbortEl.disabled = true;
      importProgressLatestEl.innerHTML = "<strong>正在中止…</strong>当前这条处理完后停止，不会开始下一条";
    }

    function setImportModalControls({ running }) {
      importModalAbortEl.disabled = !running;
      importModalAbortEl.hidden = !running;
      importModalCloseEl.disabled = running;
    }

    function renderImportFailuresList(failures) {
      if (!failures.length) {
        importProgressFailuresEl.hidden = true;
        importProgressFailuresEl.innerHTML = "";
        return;
      }
      const items = failures.map((item) => (
        `<li><b>${escapeHtml(item.title || "活动")}</b>`
        + `<div class="fail-reason">${escapeHtml(item.error || "未知错误")}</div></li>`
      )).join("");
      importProgressFailuresEl.hidden = false;
      importProgressFailuresEl.innerHTML = `<strong>失败明细（${failures.length}）</strong><ul>${items}</ul>`;
    }

    function summarizeImportFailures(failures, max = 2) {
      if (!failures.length) return "";
      const lines = failures.slice(0, max).map((item) => `${item.title}：${item.error || "未知错误"}`);
      const suffix = failures.length > max ? ` 等共 ${failures.length} 条` : "";
      return ` · ${lines.join("；")}${suffix}`;
    }

    function resolveImportFailureMessage(result, uid, fallbackTitle = "") {
      const event = findEventByUid(uid);
      return String(
        result?.error
        || result?.data?.error
        || event?.import_error
        || "未知错误",
      ).trim() || "未知错误";
    }

    function recordImportFailure({ title, error }) {
      importFailures.push({
        title: String(title || "活动").trim() || "活动",
        error: String(error || "未知错误").trim() || "未知错误",
      });
      renderImportFailuresList(importFailures);
    }

    function openImportProgressModal({ title, scope, batchTotal }) {
      resetImportAbortState();
      importFailures = [];
      renderImportFailuresList(importFailures);
      importModalTitleEl.textContent = title || "推送 Zup 中";
      importModalScopeEl.textContent = scope || "";
      importProgressBarEl.style.width = "0%";
      importProgressStatsEl.innerHTML = [
        `<div>进度：<b>0 / ${batchTotal}</b></div>`,
        "<div>成功：<b>0</b> · 跳过：<b>0</b> · 失败：<b>0</b></div>",
        "<div>已用时间：<b>0 秒</b></div>",
      ].join("");
      importProgressLatestEl.innerHTML = "<strong>准备开始…</strong>正在连接后台";
      setImportModalControls({ running: true });
      importModalEl.hidden = false;
    }

    function finishImportProgressModal({
      batchTotal,
      processed = 0,
      ok = 0,
      skipped = 0,
      fail = 0,
      elapsed = "0 秒",
      latestText,
      failures,
      aborted = false,
      error = "",
    }) {
      stopImportElapsedTimer();
      setImportModalControls({ running: false });
      updateImportProgressModal({
        batchTotal,
        processed,
        ok,
        skipped,
        fail,
        elapsed,
        latestText,
        failures: failures ?? importFailures,
        done: true,
        aborted,
        error,
        phase: "done",
      });
    }

    function updateImportProgressModal({
      batchTotal,
      processed = 0,
      ok = 0,
      skipped = 0,
      fail = 0,
      elapsed = "0 秒",
      latestText,
      failures,
      done = false,
      aborted = false,
      error = "",
      phase = "running",
    }) {
      const pct = batchTotal > 0 ? Math.min(100, Math.round((processed / batchTotal) * 100)) : 0;
      importProgressBarEl.style.width = `${pct}%`;
      importProgressStatsEl.innerHTML = [
        `<div>进度：<b>${processed} / ${batchTotal}</b></div>`,
        `<div>成功：<b>${ok}</b> · 跳过：<b>${skipped}</b> · 失败：<b>${fail}</b></div>`,
        `<div>已用时间：<b>${elapsed}</b></div>`,
      ].join("");
      if (latestText) importProgressLatestEl.innerHTML = latestText;
      if (Array.isArray(failures)) {
        renderImportFailuresList(failures);
      }
      if (error) {
        importModalTitleEl.textContent = "推送失败";
        importProgressLatestEl.innerHTML = `<strong>出错了</strong>${escapeHtml(error)}`;
        setImportModalControls({ running: false });
        return;
      }
      if (done) {
        if (aborted) {
          importModalTitleEl.textContent = "已中止";
        } else {
          importModalTitleEl.textContent = fail > 0 ? "推送完成（有失败）" : "推送完成";
        }
        setImportModalControls({ running: false });
      }
    }

    function closeImportProgressModal() {
      if (importBusy) return;
      stopImportElapsedTimer();
      importModalEl.hidden = true;
    }

    function startImportElapsedTicker(startedAt, renderTick) {
      stopImportElapsedTimer();
      const tick = () => renderTick(formatDuration(Date.now() - startedAt));
      tick();
      importElapsedTimer = setInterval(tick, 500);
    }

    function findEventByUid(uid) {
      return payload.events.find((item) => (item.eventUid || item.event_uid || item.id) === uid) || null;
    }

    async function performEventImport(uid, signal) {
      if (isImportAborted()) return { ok: false, aborted: true };
      const publishUserId = publishUserIdFromCard(uid);
      const fetchOpts = (body) => ({
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(BuzzEnvUi.importBody(body)),
        signal,
      });
      if (publishUserId) {
        const prepResponse = await fetch(
          `/api/events/${encodeURIComponent(uid)}/import-prep`,
          fetchOpts({ publish_user_id: publishUserId }),
        );
        const prepData = await prepResponse.json();
        if (prepData.event) upsertEvent(prepData.event);
        if (!prepResponse.ok || !prepData.ok) {
          return { ok: false, error: prepData.error || "保存推送字段失败", data: prepData };
        }
      }
      if (isImportAborted()) return { ok: false, aborted: true };
      const response = await fetch(
        `/api/events/${encodeURIComponent(uid)}/import`,
        fetchOpts({ publish_user_id: publishUserId }),
      );
      const data = await response.json();
      if (data.event) upsertEvent(data.event);
      return {
        ok: response.ok && data.ok,
        skipped: Boolean(data.skipped),
        data,
        error: data.error || "",
        title: data.title || findEventByUid(uid)?.title || "",
      };
    }

    async function importSingleEvent(uid) {
      if (importBusy) return;
      if (!(await BuzzEnvUi.confirmProdAction("将把活动推送到正式环境"))) return;
      const event = findEventByUid(uid);
      const title = event?.title || "活动";
      importBusy = true;
      const startedAt = Date.now();
      openImportProgressModal({
        title: "活动推送 Zup 中",
        scope: title,
        batchTotal: 1,
      });
      startImportElapsedTicker(startedAt, (elapsed) => {
        updateImportProgressModal({
          batchTotal: 1,
          processed: 0,
          elapsed,
          latestText: `<strong>上传中</strong>${escapeHtml(title)}`,
          phase: "running",
        });
      });

      try {
        const result = await performEventImport(uid, importAbortController.signal);
        stopImportElapsedTimer();
        const elapsed = formatDuration(Date.now() - startedAt);
        if (result.aborted || isImportAborted()) {
          finishImportProgressModal({
            batchTotal: 1,
            processed: 0,
            elapsed,
            aborted: true,
            latestText: "<strong>已中止</strong>本条未完成上传",
          });
          setSaveState("推送已中止", "warn");
        } else if (!result.ok) {
          const errMsg = resolveImportFailureMessage(result, uid, title);
          recordImportFailure({ title, error: errMsg });
          finishImportProgressModal({
            batchTotal: 1,
            processed: 1,
            fail: 1,
            elapsed,
            failures: importFailures,
            latestText: `<strong>推送失败</strong>${escapeHtml(title)}<br>${escapeHtml(errMsg)}`,
          });
          setSaveState(`${title} 推送失败：${errMsg}`, "error");
        } else {
          const suffix = result.skipped ? "（后台已存在）" : "";
          const groupText = result.data.group_id ? ` · group_id=${result.data.group_id}` : "";
          finishImportProgressModal({
            batchTotal: 1,
            processed: 1,
            ok: result.skipped ? 0 : 1,
            skipped: result.skipped ? 1 : 0,
            elapsed,
            latestText: `<strong>推送成功</strong>now_id ${escapeHtml(String(result.data.now_id || ""))}${escapeHtml(groupText)}${escapeHtml(suffix)}`,
          });
          setSaveState(`推送成功 now_id=${result.data.now_id}${groupText}${suffix}`, "ok");
        }
        render();
      } catch (error) {
        stopImportElapsedTimer();
        if (error.name === "AbortError" || isImportAborted()) {
          finishImportProgressModal({
            batchTotal: 1,
            processed: 0,
            elapsed: formatDuration(Date.now() - startedAt),
            aborted: true,
            latestText: "<strong>已中止</strong>",
          });
          setSaveState("推送已中止", "warn");
        } else {
          const errMsg = error.message || "推送失败";
          recordImportFailure({ title, error: errMsg });
          finishImportProgressModal({
            batchTotal: 1,
            processed: 1,
            fail: 1,
            elapsed: formatDuration(Date.now() - startedAt),
            failures: importFailures,
            latestText: `<strong>推送失败</strong>${escapeHtml(title)}<br>${escapeHtml(errMsg)}`,
          });
          setSaveState(`${title} 推送失败：${errMsg}`, "error");
        }
      } finally {
        importBusy = false;
      }
    }

    function currentFilterSummary() {
      const cityLabel = cityFilter === "all" ? "全部城市" : cityFilter;
      const statusLabel = BATCH_REVIEW_FILTER_LABELS[statusFilter] || statusFilter;
      const sourceNames = { douban: "豆瓣", huodongxing: "活动行", xiaohongshu: "小红书", wechat: "公众号" };
      const sourceLabel = sourceFilter === "all" ? "全部来源" : (sourceNames[sourceFilter] || sourceFilter);
      const categoryLabel = categoryFilter === "all" ? "全部类型" : categoryFilter;
      const dateLabel = dateFilter === "all" ? "全部日期" : dateFilter;
      const searchLabel = searchTerm.trim() ? `搜索「${searchTerm.trim()}」` : "";
      return [cityLabel, statusLabel, sourceLabel, categoryLabel, dateLabel, searchLabel].filter(Boolean).join(" · ");
    }

    async function runBatchImport() {
      if (importBusy) return;
      const eligible = getFilteredEvents().filter(canImportEvent);
      if (!eligible.length) {
        setSaveState("当前筛选下没有可推送的活动（需已通过、字段齐全且尚未推送）", "warn");
        return;
      }
      if (!(await BuzzEnvUi.confirmProdAction(`将批量推送 ${eligible.length} 条活动到正式环境`))) return;
      const filterSummary = currentFilterSummary();
      const batchTotal = eligible.length;
      importBusy = true;
      document.getElementById("batchImportBtn").disabled = true;
      const startedAt = Date.now();
      openImportProgressModal({
        title: "批量推送 Zup 中",
        scope: `筛选：${filterSummary} · 共 ${batchTotal} 条`,
        batchTotal,
      });

      let ok = 0;
      let skipped = 0;
      let fail = 0;
      let processed = 0;

      startImportElapsedTicker(startedAt, (elapsed) => {
        updateImportProgressModal({
          batchTotal,
          processed,
          ok,
          skipped,
          fail,
          elapsed,
          phase: "running",
        });
      });

      try {
        for (const event of eligible) {
          if (isImportAborted()) break;
          const uid = event.eventUid || event.event_uid || event.id;
          updateImportProgressModal({
            batchTotal,
            processed,
            ok,
            skipped,
            fail,
            elapsed: formatDuration(Date.now() - startedAt),
            latestText: `<strong>正在推送 Zup (${processed + 1}/${batchTotal})</strong>${escapeHtml(event.title || uid)}`,
            phase: "running",
          });
          try {
            const result = await performEventImport(uid, importAbortController.signal);
            if (result.aborted) break;
            if (result.skipped) skipped += 1;
            else if (result.ok) ok += 1;
            else {
              fail += 1;
              const errMsg = resolveImportFailureMessage(result, uid, event.title || uid);
              recordImportFailure({ title: result.title || event.title || uid, error: errMsg });
              updateImportProgressModal({
                batchTotal,
                processed: processed + 1,
                ok,
                skipped,
                fail,
                failures: importFailures,
                elapsed: formatDuration(Date.now() - startedAt),
                latestText: `<strong>推送失败 (${processed + 1}/${batchTotal})</strong>${escapeHtml(result.title || event.title || uid)}<br>${escapeHtml(errMsg)}`,
                phase: "running",
              });
            }
            processed += 1;
          } catch (error) {
            if (error.name === "AbortError" || isImportAborted()) break;
            fail += 1;
            processed += 1;
            const errMsg = error.message || "请求异常";
            recordImportFailure({ title: event.title || uid, error: errMsg });
            updateImportProgressModal({
              batchTotal,
              processed,
              ok,
              skipped,
              fail,
              failures: importFailures,
              elapsed: formatDuration(Date.now() - startedAt),
              latestText: `<strong>推送失败 (${processed}/${batchTotal})</strong>${escapeHtml(event.title || uid)}<br>${escapeHtml(errMsg)}`,
              phase: "running",
            });
          }
        }

        const elapsed = formatDuration(Date.now() - startedAt);
        const aborted = isImportAborted();
        finishImportProgressModal({
          batchTotal,
          processed,
          ok,
          skipped,
          fail,
          elapsed,
          aborted,
          failures: importFailures,
          latestText: aborted
            ? `<strong>已中止</strong>已完成 ${processed} 条 · 成功 ${ok} · 跳过 ${skipped} · 失败 ${fail}`
            : (fail > 0
              ? `<strong>本批结束</strong>成功 ${ok} · 跳过 ${skipped} · 失败 ${fail} · 详见下方失败明细`
              : `<strong>本批结束</strong>全部处理完成`),
        });
        await loadEvents();
        const failSummary = summarizeImportFailures(importFailures);
        setSaveState(
          aborted
            ? `批量推送已中止：已完成 ${processed} 条 · 成功 ${ok} · 跳过 ${skipped} · 失败 ${fail} · ${elapsed}${failSummary}`
            : `批量推送完成：成功 ${ok} · 跳过 ${skipped} · 失败 ${fail} · ${elapsed}${failSummary}`,
          (aborted || fail) ? "warn" : "ok",
        );
        render();
      } catch (error) {
        finishImportProgressModal({
          batchTotal,
          processed,
          ok,
          skipped,
          fail,
          elapsed: formatDuration(Date.now() - startedAt),
          error: error.message || "批量推送失败",
        });
        setSaveState(error.message || "批量推送失败", "error");
      } finally {
        importBusy = false;
        document.getElementById("batchImportBtn").disabled = false;
      }
    }

    async function loadEvents() {
      const response = await fetch(BuzzEnvUi.withBuzzEnv("/api/events"), { cache: "no-store" });
      if (!response.ok) throw new Error("events unavailable");
      payload = await response.json();
      if (!payload || typeof payload !== "object") {

    function rebuildEventIndex() {
      eventUidToIndex.clear();
      eventIndex = (payload.events || []).map((event, index) => {
        const uid = event.eventUid || event.event_uid || event.id;
        eventUidToIndex.set(uid, index);

        };
      });

    function initReviewCounts() {
      return { pending: 0, imported: 0, pendingImport: 0 };
    }

    function bumpReviewCounts(target, event) {
      if (isReviewPendingReady(event)) target.pending += 1;
      if (isImportedEvent(event)) target.imported += 1;
      if (isPendingImportEvent(event)) target.pendingImport += 1;
    }

    function computeFilterMetrics() {
      const today = todayDateValue();
      const cityStatsMap = new Map([["all", initReviewCounts()]]);
      const cityScoped = [];
      const baseScoped = [];
      const expiredScoped = [];
      const globalSourceCounts = new Map();
      let globalTotal = 0;
      const statusCounts = Object.fromEntries(STATUS_FILTER_KEYS.map((key) => [key, 0]));
      const categoryCounts = new Map();

      for (const row of eventIndex) {
        const { event, expired, city, source } = row;
        if (!expired) {
          globalTotal += 1;
          globalSourceCounts.set(source, (globalSourceCounts.get(source) || 0) + 1);
          if (sourceFilter === "all" || source === sourceFilter) {
            bumpReviewCounts(cityStatsMap.get("all"), event);
            if (!cityStatsMap.has(city)) cityStatsMap.set(city, initReviewCounts());
            bumpReviewCounts(cityStatsMap.get(city), event);
          }
        }

        const sourceMatch = sourceFilter === "all" || source === sourceFilter;
        const cityMatch = cityFilter === "all" || city === cityFilter;
        if (!cityMatch) continue;

        if (expired) {
          if (sourceMatch) expiredScoped.push(event);
          continue;
        }

        if (!sourceMatch) continue;

        cityScoped.push(event);
        baseScoped.push(event);

        statusCounts.all += 1;
        for (const key of STATUS_FILTER_KEYS) {
          if (key === "expired" || key === "all") continue;
          if (matchesStatusFilter(event, key)) statusCounts[key] += 1;
        }

        const category = event.category;
        if (category) categoryCounts.set(category, (categoryCounts.get(category) || 0) + 1);
      }

      statusCounts.expired = expiredScoped.length;

      const filterDates = collectFilterDates(baseScoped, today);
      const dateCounts = new Map([["all", initReviewCounts()]]);
      for (const event of baseScoped) {
        bumpReviewCounts(dateCounts.get("all"), event);
        for (const date of filterDates) {
          if (!eventOccursOnDate(event, date)) continue;
          if (!dateCounts.has(date)) dateCounts.set(date, initReviewCounts());
          bumpReviewCounts(dateCounts.get(date), event);
        }
      }

      return {
        cityStatsMap,
        cityScoped,
        baseScoped,
        expiredScoped,
        globalSourceCounts,
        globalTotal,
        statusCounts,
        categoryCounts,
        dateCounts,
        filterDates,
      };
    }

    async function batchSetReviewStatus(nextStatus) {

      const events = getFilteredEvents();
      if (!events.length) {
        setSaveState("当前筛选下没有可操作的活动", "warn");

      const actionLabel = nextStatus === "approved" ? "通过" : "拒绝";
