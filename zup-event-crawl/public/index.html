    function escapeHtml(value) {
      return String(value || "").replace(/[&<>"']/g, (char) => ({
        "&": "&amp;",
        "<": "&lt;",
        ">": "&gt;",
        '"': "&quot;",
        "'": "&#39;"
      }[char]));
    }

    function imageSrc(image, version) {
      if (!image) return "";
      const params = new URLSearchParams({ src: image });
      if (version) params.set("v", String(version));
      return `/api/image?${params.toString()}`;
    }

    function todayDateValue() {
      const now = new Date();
      return `${now.getFullYear()}-${String(now.getMonth() + 1).padStart(2, "0")}-${String(now.getDate()).padStart(2, "0")}`;
    }

    function getStartDateValue(event) {
      const raw = event.startDate || "";
      const date = new Date(raw);
      if (Number.isNaN(date.getTime())) return "";
      return `${date.getFullYear()}-${String(date.getMonth() + 1).padStart(2, "0")}-${String(date.getDate()).padStart(2, "0")}`;
    }

    function getEndDateValue(event) {
      const raw = event.endDate || event.startDate || "";
      const date = new Date(raw);
      if (Number.isNaN(date.getTime())) return "";
      return `${date.getFullYear()}-${String(date.getMonth() + 1).padStart(2, "0")}-${String(date.getDate()).padStart(2, "0")}`;
    }

    function eventOccursOnDate(event, dateValue) {
      const start = getStartDateValue(event);
      const end = getEndDateValue(event) || start;
      if (start && end) return dateValue >= start && dateValue <= end;
      return (event.eventDates || []).includes(dateValue);
    }

    function collectFilterDates(events, todayValue) {
      const maxDays = 90;
      const dates = new Set();
      for (const event of events) {
        const start = getStartDateValue(event);
        const end = getEndDateValue(event) || start;
        if (!start || !end) {
          for (const date of event.eventDates || []) {
            if (date >= todayValue) dates.add(date);
          }
          continue;
        }
        const rangeStart = start > todayValue ? start : todayValue;
        if (end < rangeStart) continue;
        const cursor = new Date(`${rangeStart}T00:00:00`);
        const finalEnd = new Date(`${end}T00:00:00`);
        let count = 0;
        while (cursor <= finalEnd && count < maxDays) {
          dates.add(`${cursor.getFullYear()}-${String(cursor.getMonth() + 1).padStart(2, "0")}-${String(cursor.getDate()).padStart(2, "0")}`);
          cursor.setDate(cursor.getDate() + 1);
          count += 1;
        }
      }
      return [...dates].sort();
    }

    function isExpired(event) {
      const endDate = getEndDateValue(event);
      return endDate ? endDate < todayDateValue() : false;
    }

    function getCityKey(event) {
      return event.city || "未知城市";
    }

    function getCityScopedEvents() {
      return filterMetrics?.cityScoped || [];
    }

    /** 城市 + 来源，用于状态/类型/日期筛选项的计数与选项 */
    function getBaseScopedEvents() {
      return filterMetrics?.baseScoped || [];
    }

    function getActiveEvents() {
      return getCityScopedEvents();
    }

    function getExpiredEvents() {
      return filterMetrics?.expiredScoped || [];
    }

    function cityStats(cityKey) {
      return filterMetrics?.cityStatsMap?.get(cityKey) || initReviewCounts();
    }

    function renderReviewImportCounts({ pending, imported, pendingImport }) {
      const pendingClass = pending > 0 ? "" : " is-zero";
      const importedClass = imported > 0 ? "" : " is-zero";
      const pendingImportClass = pendingImport > 0 ? "" : " is-zero";
      return `
        <span class="city-pending${pendingClass}">待定 ${pending}</span>
        <span class="city-imported${importedClass}">已推送 ${imported}</span>
        <span class="city-pending-import${pendingImportClass}">待推送 ${pendingImport}</span>
      `;
    }

    function renderSegButton({ attr, value, label, count, active, disabled }) {
      return `
        <button
          type="button"
          data-${attr}="${escapeHtml(value)}"
          class="${active ? "active" : ""}"
          ${disabled ? "disabled" : ""}
        >
          <span class="seg-btn-label">${escapeHtml(label)}</span>
          <span class="seg-btn-count">${count}</span>
        </button>
      `;
    }

    function matchesStatusFilter(event, filter) {
      if (filter === "all") return true;
      const status = getStatus(event);
      if (filter === "imported") return isImportedEvent(event);
      if (filter === "import_ready") return isPendingImportEvent(event);
      if (filter === "suggested") return isSuggested(event) && !isClassificationPending(event);
      if (filter === "classification-pending") {
        return status === "pending" && isClassificationPending(event);
      }
      if (filter === "rule-blocked") return isRuleBlockedUnprocessed(event);
      if (filter === "poi_doubtful") {
        return status === "pending" && event.poi_doubtful;
      }
      if (filter === "no_poi") {
        return status === "pending" && hasNoPoi(event);
      }
      if (filter === "pending") return isReviewPendingReady(event);
      if (filter === "expired") return isExpired(event);
      if (["approved", "rejected"].includes(filter)) return status === filter;
        return true;
    }

    function resetPage() {
      page = 1;
    }

    function clampPage(totalItems) {
      const totalPages = Math.max(1, Math.ceil(totalItems / PAGE_SIZE));
      if (page > totalPages) page = totalPages;
      if (page < 1) page = 1;
      return totalPages;
    }

    function paginateEvents(events) {
      const totalPages = clampPage(events.length);
      const start = (page - 1) * PAGE_SIZE;
      return {
        list: events.slice(start, start + PAGE_SIZE),
        total: events.length,
        totalPages,
      };
    }

    function getSourcePosition(event, index) {
      return Number.isFinite(Number(event.sourcePosition)) ? Number(event.sourcePosition) : index + 1;
    }

    function getTimeValue(event) {
      const value = Date.parse(event.startDate || "");
      return Number.isNaN(value) ? Number.MAX_SAFE_INTEGER : value;
    }

    function getSourceKey(event) {
      return event.source || event.sourceName || "unknown";
    }

    function getSourceLabel(event) {
      const known = {
        douban: "豆瓣",
        huodongxing: "活动行",
        xiaohongshu: "小红书",
        wechat: "公众号",
        unknown: "未知来源"
      };
      return event.sourceName || known[getSourceKey(event)] || getSourceKey(event);
    }

    function getFilteredEvents() {
      const scoped = statusFilter === "expired"
        ? (filterMetrics?.expiredScoped || [])
        : (filterMetrics?.baseScoped || []);
      const needle = searchTerm.trim().toLowerCase();
      const filtered = [];

      for (const event of scoped) {
        if (statusFilter !== "expired" && isExpired(event)) continue;
        if (!matchesStatusFilter(event, statusFilter)) continue;
        if (categoryFilter !== "all" && event.category !== categoryFilter) continue;
        if (dateFilter !== "all" && !eventOccursOnDate(event, dateFilter)) continue;
        if (needle) {
        const searchText = `${event.title} ${event.location} ${event.owner} ${event.category}`.toLowerCase();
          if (!searchText.includes(needle)) continue;
        }
        const uid = event.eventUid || event.event_uid || event.id;
        filtered.push({ event, index: eventUidToIndex.get(uid) ?? 0 });
      }

      filtered.sort((a, b) => {
        if (sortMode === "time") return getTimeValue(a.event) - getTimeValue(b.event);
        return a.index - b.index;
      });
      return filtered.map(({ event }) => event);
    }

    function getExpiredScopedEvents() {
      return filterMetrics?.expiredScoped || [];
    }

    function cityReviewTotal(cityKey) {
      const counts = cityStats(cityKey);
      return counts.pending + counts.imported + counts.pendingImport;
    }

    function normalizeDependentFilters() {
      let changed = false;
      if (cityFilter !== "all" && cityReviewTotal(cityFilter) === 0) {
        cityFilter = "all";
        changed = true;
      }
      const scoped = getBaseScopedEvents();
      if (categoryFilter !== "all" && !scoped.some((event) => event.category === categoryFilter)) {
        categoryFilter = "all";
        changed = true;
      }
      if (dateFilter !== "all") {
        const dates = collectFilterDates(scoped, todayDateValue());
        if (!dates.includes(dateFilter)) {
          dateFilter = "all";
          changed = true;
        }
      }
      return changed;
    }

    function renderCityChip(cityKey, label) {
      const counts = cityStats(cityKey);
      const isActive = cityFilter === cityKey;
      return `
        <button
          type="button"
          data-city="${escapeHtml(cityKey)}"
          class="${isActive ? "active" : ""} ${counts.pending > 0 ? "has-pending" : ""}"
        >
          <span class="city-main">${escapeHtml(label)}</span>
          <span class="city-sub">${renderReviewImportCounts(counts)}</span>
        </button>
      `;
    }

    function renderStatusFilter() {
      const statusCounts = filterMetrics?.statusCounts || {};
      const filters = [
        { key: "all", label: "全部" },
        { key: "imported", label: "已推送" },
        { key: "suggested", label: "推荐" },
        { key: "classification-pending", label: "待分类" },
        { key: "rule-blocked", label: "挡下待处理" },
        { key: "approved", label: "已通过" },
        { key: "rejected", label: "已拒绝" },
        { key: "pending", label: "待定" },
        { key: "import_ready", label: "待推送" },
        { key: "no_poi", label: "未匹配 POI" },
        { key: "poi_doubtful", label: "POI 存疑" },
        { key: "expired", label: "已过期" },
      ];
      statusFilterEl.innerHTML = filters.map(({ key, label }) => renderSegButton({
        attr: "status",
        value: key,
        label,
        count: statusCounts[key] || 0,
        active: statusFilter === key,
      })).join("");
    }

    function renderCityFilter() {
      const cityStatsMap = filterMetrics?.cityStatsMap || new Map();
      const cities = [...cityStatsMap.keys()].filter((key) => key !== "all").sort((a, b) => {
        const pendingDiff = cityStats(b).pending - cityStats(a).pending;
        if (pendingDiff !== 0) return pendingDiff;
        return a.localeCompare(b, "zh-CN");
      });
      cityFilterEl.innerHTML = renderCityChip("all", "全部城市")
        + cities.map((city) => renderCityChip(city, city)).join("");
    }

    function renderCategoryFilter() {
      const scoped = getBaseScopedEvents();
      const categoryCounts = filterMetrics?.categoryCounts || new Map();
      const categories = [...categoryCounts.keys()].sort((a, b) => a.localeCompare(b, "zh-CN"));
      categoryFilterEl.innerHTML = renderSegButton({
        attr: "category",
        value: "all",
        label: "全部类型",
        count: scoped.length,
        active: categoryFilter === "all",
      }) + categories.map((category) => renderSegButton({
        attr: "category",
        value: category,
        label: category,
        count: categoryCounts.get(category) || 0,
        active: categoryFilter === category,
      })).join("");
    }

    function renderSourceFilter() {
      const baseSources = [
        ["douban", "豆瓣"],
        ["huodongxing", "活动行"],
        ["xiaohongshu", "小红书"],
        ["wechat", "公众号"],
      ];
      const globalSourceCounts = filterMetrics?.globalSourceCounts || new Map();
      const globalTotal = filterMetrics?.globalTotal || 0;
      const present = new Map();
      for (const row of eventIndex) {
        if (row.expired) continue;
        present.set(row.source, getSourceLabel(row.event));
      }
      const sources = baseSources.map(([key, label]) => [key, present.get(key) || label]);
      present.forEach((label, key) => {
        if (!sources.some(([sourceKey]) => sourceKey === key)) sources.push([key, label]);
      });
      sourceFilterEl.innerHTML = renderSegButton({
        attr: "source",
        value: "all",
        label: "全部来源",
        count: globalTotal,
        active: sourceFilter === "all",
      }) + sources.map(([key, label]) => {
        const count = globalSourceCounts.get(key) || 0;
        return renderSegButton({
          attr: "source",
          value: key,
          label,
          count,
          active: sourceFilter === key,
          disabled: !count,
        });
        }).join("");
    }

    function formatDateLabel(dateValue) {
      const date = new Date(`${dateValue}T00:00:00`);
      const weekdays = ["周日", "周一", "周二", "周三", "周四", "周五", "周六"];
      return `${date.getMonth() + 1}/${date.getDate()} ${weekdays[date.getDay()]}`;
    }

    function renderDateFilter() {
      const dateCounts = filterMetrics?.dateCounts || new Map();
      const dates = filterMetrics?.filterDates || [];
      if (dateFilter !== "all" && !dates.includes(dateFilter)) dateFilter = "all";

      const allCounts = dateCounts.get("all") || initReviewCounts();
      dateFilterEl.innerHTML = `<button data-date="all" class="${dateFilter === "all" ? "active" : ""}"><span class="date-main">全部</span><span class="date-sub">${renderReviewImportCounts(allCounts)}</span></button>` +
        dates.map((date) => {
          const dayCounts = dateCounts.get(date) || initReviewCounts();
          const hasEvents = dayCounts.pending + dayCounts.imported + dayCounts.pendingImport > 0;
          const disabled = hasEvents ? "" : "disabled";
          return `<button data-date="${escapeHtml(date)}" class="${dateFilter === date ? "active" : ""}" ${disabled}><span class="date-main">${escapeHtml(formatDateLabel(date))}</span><span class="date-sub">${renderReviewImportCounts(dayCounts)}</span></button>`;
        }).join("");
    }

    function renderPager(meta) {
      if (!meta.total) {
        pagerEl.hidden = true;
        pagerEl.innerHTML = "";
        return;
      }

      const { total, totalPages } = meta;
      const from = (page - 1) * PAGE_SIZE + 1;
      const to = Math.min(page * PAGE_SIZE, total);

      let pageButtons = "";
      const windowSize = 5;
      let startPage = Math.max(1, page - Math.floor(windowSize / 2));
      let endPage = Math.min(totalPages, startPage + windowSize - 1);
      startPage = Math.max(1, endPage - windowSize + 1);
      for (let p = startPage; p <= endPage; p += 1) {
        pageButtons += `<button type="button" class="mini ${p === page ? "active" : ""}" data-page="${p}">${p}</button>`;
      }

      pagerEl.hidden = false;
      pagerEl.innerHTML = `
        <div class="pager-info">第 ${from}–${to} 条，共 ${total} 条 · 第 ${page} / ${totalPages} 页</div>
        <div class="pager-actions">
          <button type="button" class="mini" data-page="prev" ${page <= 1 ? "disabled" : ""}>上一页</button>
          ${pageButtons}
          <button type="button" class="mini" data-page="next" ${page >= totalPages ? "disabled" : ""}>下一页</button>
        </div>
      `;
    }

    function scrollToListTop() {
      listEl.scrollIntoView({ behavior: "smooth", block: "start" });
    }

    function renderList() {
      const filtered = getFilteredEvents();
      const { list: events, total, totalPages } = paginateEvents(filtered);
      renderPager({ total, totalPages });

      if (!events.length) {
        const emptyHint = statusFilter === "rule-blocked"
          ? "规则挡下的待处理项已清空，或当前筛选下没有未处理的挡下活动"
          : "当前筛选下没有活动";
        listEl.innerHTML = `<div class="empty">${emptyHint}</div>`;
        return;
      }
      listEl.innerHTML = events.map((event) => {
        const status = getStatus(event);
        const uid = event.eventUid || event.event_uid || event.id;
        const scoreClass = event.score >= 70 ? "good" : event.score < 60 ? "bad" : "";
        const ready = isImportReady(event);
        const importable = canImportEvent(event);
        const imported = event.import_status === "imported" && event.buzz_now_id;
        return `
          <article class="card" data-uid="${escapeHtml(uid)}">
            <div class="cover-wrap">
              <img class="cover" src="${escapeHtml(imageSrc(event.image, event.updated_at || event.updatedAt))}" alt="${escapeHtml(event.title)}" loading="lazy" referrerpolicy="no-referrer" onerror="this.parentElement.classList.add('broken')">
              <div class="cover-fallback">图片加载失败<br>可点原始链接查看</div>
            </div>
            <div class="body">
              <div class="row">
                <h2 class="title">${escapeHtml(event.title)}</h2>
                <span class="score ${scoreClass}">${event.score}</span>
              </div>
              <div class="entity-id">活动 ID：<strong>${escapeHtml(uid)}</strong>${imported ? ` · 后台 now_id <strong>${escapeHtml(event.buzz_now_id)}</strong>` : ""}</div>
              <div class="chips">
                <span class="chip">${escapeHtml(event.category)}</span>
                <span class="chip">来源：${escapeHtml(getSourceLabel(event))}</span>
                <span class="chip">${escapeHtml(event.district || event.city)}</span>
                ${renderClassificationChip(event)}
                <span class="chip">来源#${escapeHtml(event.sourcePosition || "-")}</span>
                <span class="import-ready-tag ${ready ? "" : "no"}">${ready ? "可推送" : "未齐"}</span>
                ${event.location_poi_id
    ? `<span class="chip poi-hit">POI 已匹配</span>`
    : `<span class="chip poi-miss">未匹配 POI</span>`}
                ${event.poi_doubtful ? `<span class="chip poi-doubt">POI 存疑</span>` : ""}
              </div>
              <div class="info">
                <div>时间：${escapeHtml(event.timeText)}</div>
                <div>地点：${escapeHtml(event.location)}</div>
                ${renderPoiSummary(event)}
                <div>费用：${escapeHtml(event.fee || "待确认")}</div>
                <div>发起：${escapeHtml(event.owner || "未知")}</div>
              </div>
              <div class="summary">${escapeHtml(event.body || "")}</div>
              <div class="reason">${escapeHtml(event.reviewReason)}</div>
              <div class="import-block">
                <h3>推送 Zup 准备</h3>
                <div class="import-row">
                  <div class="import-field">
                    <label for="user-${escapeHtml(uid)}">发布者 user_id</label>
                    <input id="user-${escapeHtml(uid)}" type="text" data-import-field="publish_user_id" value="${escapeHtml(effectivePublishUserId(event))}" placeholder="579362104">
                  </div>
                  <div class="import-field">
                    <label for="type-${escapeHtml(uid)}">now_type（1 动态 / 2 即刻邀约 / 3 预约）</label>
                    <select id="type-${escapeHtml(uid)}" data-import-field="now_type">
                      <option value="1" ${effectiveNowType(event) === 1 ? "selected" : ""}>1 动态</option>
                      <option value="2" ${effectiveNowType(event) === 2 ? "selected" : ""}>2 即刻邀约</option>
                      <option value="3" ${effectiveNowType(event) === 3 ? "selected" : ""}>3 预约</option>
                    </select>
                  </div>
                  <div class="import-meta">
                    推送时间：<strong>start_at</strong> ${escapeHtml(event.start_at || "—")}<br>
                    <strong>expired_at</strong> ${escapeHtml(event.expired_at || "—")}
                  </div>
                  <div class="import-meta">
                    ${event.location_poi_id
    ? (() => {
      const c = resolvePoiCoordinates(event);
      const coordText = c.latitude != null && c.longitude != null
        ? `${c.longitude}, ${c.latitude}（腾讯 POI）`
        : "<span style=\"color:#ad382c\">POI 坐标缺失，请重新点选</span>";
      return `POI：<strong>${escapeHtml(event.poi_title || event.location)}</strong><br>地址：${escapeHtml(event.poi_address || event.location)}<br>ID：${escapeHtml(event.location_poi_id)}<br>坐标：${coordText}`;
    })()
    : "<span style=\"color:#ad382c\">尚未匹配 POI</span>"}
                  </div>
                  ${renderPoiDoubt(event)}
                  ${renderMerchantInfo(event)}
                  ${renderImportStatus(event)}
                  <div class="import-actions">
                    <button class="mini" type="button" data-poi-action="refresh">刷新候选</button>
                  </div>
                  <p class="poi-hint">POI 由 Cursor Agent 匹配后写入；此处仅供人工修正。填写关键词后点「自由搜索」，再在候选里点选保存。</p>
                  <div class="poi-search-row">
                    <input type="text" data-poi-keyword value="${escapeHtml(poiKeywordValue(event))}" placeholder="Agent 搜词或自填，如 锈罐头剧场">
                    <button class="mini" type="button" data-poi-action="custom-search">自由搜索</button>
                  </div>
                  ${renderPoiBlock(event)}
                </div>
              </div>
              <div class="card-actions">
                <button class="mini approve ${status === "approved" ? "active" : ""}" data-id="${escapeHtml(uid)}" data-next="approved">通过</button>
                <button class="mini pending ${renderPendingButtonClass(event, status)}" data-id="${escapeHtml(uid)}" data-next="pending" title="${escapeHtml(reviewPendingButtonTitle(event))}">待定</button>
                <button class="mini reject ${status === "rejected" ? "active" : ""}" data-id="${escapeHtml(uid)}" data-next="rejected">拒绝</button>
                <button class="mini import-now ${imported ? "done" : ""}" type="button" data-import-uid="${escapeHtml(uid)}" ${importable ? "" : "disabled"}>${escapeHtml(importButtonLabel(event))}</button>
                ${imported ? `<button class="mini delete-buzz" type="button" data-delete-buzz-uid="${escapeHtml(uid)}" data-delete-buzz-now-id="${escapeHtml(event.buzz_now_id)}">删后台</button>` : ""}
                <a class="link" href="${escapeHtml(event.originalLink)}" target="_blank" rel="noreferrer">原始链接</a>
              </div>
            </div>
          </article>
        `;
      }).join("");

    }

    function renderBatchReviewBar() {
      const bar = document.getElementById("batchReviewBar");
      const hint = document.getElementById("batchReviewHint");
      const batchApproveBtn = document.getElementById("batchApproveBtn");
      const batchRejectBtn = document.getElementById("batchRejectBtn");
      if (!bar || !hint) return;

      const show = BATCH_REVIEW_STATUS_FILTERS.has(statusFilter);
      bar.classList.toggle("visible", show);
      if (!show) return;

      const count = getFilteredEvents().length;
      const filterLabel = BATCH_REVIEW_FILTER_LABELS[statusFilter] || statusFilter;
      hint.textContent = count
        ? `当前「${filterLabel}」共 ${count} 条（含搜索/类型/日期筛选）`
        : `当前「${filterLabel}」筛选下没有活动`;
      if (batchApproveBtn) batchApproveBtn.disabled = reviewBusy || count === 0;
      if (batchRejectBtn) batchRejectBtn.disabled = reviewBusy || count === 0;
    }

    function render() {
      filterMetrics = computeFilterMetrics();
      if (normalizeDependentFilters()) {
        filterMetrics = computeFilterMetrics();
      }
      const activeEvents = getBaseScopedEvents();
      const cityLabel = cityFilter === "all" ? (payload.cities || []).join(" / ") || payload.city || "未知城市" : cityFilter;
      const sources = sourceFilter === "all"
        ? [...new Set(eventIndex.filter((row) => !row.expired).map((row) => getSourceLabel(row.event)))].join(" / ") || "暂无来源"
        : (() => {
          const sample = activeEvents[0] || eventIndex.find((row) => !row.expired && row.source === sourceFilter)?.event;
          return sample ? getSourceLabel(sample) : "暂无来源";
        })();
      const cityMeta = payload.cityMeta && cityFilter !== "all" ? payload.cityMeta[cityFilter] : null;
      const generatedAt = cityMeta?.generatedAt || payload.generatedAt || "未知时间";
      sourceMeta.textContent = `${cityLabel} · ${sources} · 生成于 ${generatedAt}`;
      renderSourceFilter();
      renderCityFilter();
      renderStatusFilter();
      renderCategoryFilter();
      renderDateFilter();
      renderBatchReviewBar();
      renderList();
    }

    cityFilterEl.addEventListener("click", (event) => {
      const button = event.target.closest("button[data-city]");
      if (!button) return;
      cityFilter = button.dataset.city;
      categoryFilter = "all";
      dateFilter = "all";
      resetPage();
      render();
    });

    statusFilterEl.addEventListener("click", (event) => {
      const button = event.target.closest("button[data-status]");
      if (!button) return;
      setStatusFilter(button.dataset.status);
    });

    sourceFilterEl.addEventListener("click", (event) => {
      const button = event.target.closest("button[data-source]");
      if (!button || button.disabled) return;
      sourceFilter = button.dataset.source;
      categoryFilter = "all";
      dateFilter = "all";
      resetPage();
      render();
    });

    categoryFilterEl.addEventListener("click", (event) => {
      const button = event.target.closest("button[data-category]");
      if (!button) return;
      categoryFilter = button.dataset.category;
      resetPage();
      render();
    });

    dateFilterEl.addEventListener("click", (event) => {
      const button = event.target.closest("button[data-date]");
      if (!button) return;
      dateFilter = button.dataset.date;
      resetPage();
      render();
    });

    sortModeEl.addEventListener("click", (event) => {
      const button = event.target.closest("button[data-sort]");
      if (!button) return;
      sortMode = button.dataset.sort;
      sortModeEl.querySelectorAll("button").forEach((item) => item.classList.toggle("active", item === button));
      resetPage();
      render();
    });

    pagerEl.addEventListener("click", (event) => {
      const button = event.target.closest("button[data-page]");
      if (!button || button.disabled) return;
      const filtered = getFilteredEvents();
      const { totalPages } = paginateEvents(filtered);
      const raw = button.dataset.page;
      if (raw === "prev") {
        page -= 1;
        render();
        scrollToListTop();
        return;
      }
      if (raw === "next") {
        page += 1;
        render();
        scrollToListTop();
        return;
      }
      const nextPage = Number(raw);
      if (!Number.isFinite(nextPage) || nextPage < 1 || nextPage > totalPages) return;
      page = nextPage;
      render();
      scrollToListTop();
    });

    backTopBtn.addEventListener("click", () => {
      window.scrollTo({ top: 0, behavior: "smooth" });
    });

    window.addEventListener("scroll", () => {
      backTopBtn.classList.toggle("visible", window.scrollY > 320);
    }, { passive: true });

    listEl.addEventListener("click", (event) => {
      const button = event.target.closest("button[data-next]");
      if (button) {
      setStatus(button.dataset.id, button.dataset.next);
        return;
      }

      const card = event.target.closest("article.card[data-uid]");
      if (!card) return;
      const uid = card.dataset.uid;

      const poiBtn = event.target.closest("button[data-poi-action]");
      if (poiBtn) {
        const action = poiBtn.dataset.poiAction;
        if (action === "refresh") {
          const event = payload.events.find((item) => (item.eventUid || item.event_uid) === uid);
          const keyword = String(card.querySelector("[data-poi-keyword]")?.value || "").trim()
            || suggestPoiKeyword(event || {});
          applyPoi(uid, { refresh: true, candidates_only: true, keyword });
        }
        else if (action === "custom-search") searchPoiCustom(uid, card);
        return;
      }

      const previewBtn = event.target.closest("button[data-poi-preview-index]");
      if (previewBtn) {
        const list = poiPreviews[uid] || [];
        const poi = list[Number(previewBtn.dataset.poiPreviewIndex)];
        if (!poi) return;
        applyPoi(uid, {
          poi_id: poi.poi_id,
          title: poi.title,
          address: poi.address,
          latitude: poi.latitude,
          longitude: poi.longitude,
          candidates: list,
        });
        return;
      }

      const candBtn = event.target.closest("button[data-poi-index]");
      if (candBtn) {
        applyPoi(uid, { candidate_index: Number(candBtn.dataset.poiIndex) });
        return;
      }

      const importBtn = event.target.closest("button[data-import-uid]");
      if (importBtn && !importBtn.disabled) {
        importSingleEvent(importBtn.dataset.importUid);
        return;
      }

      const deleteBtn = event.target.closest("button[data-delete-buzz-uid]");
      if (deleteBtn) {
        deleteBuzzNow(deleteBtn.dataset.deleteBuzzUid, deleteBtn.dataset.deleteBuzzNowId);
      }
    });

    listEl.addEventListener("change", (event) => {
      const field = event.target.closest("[data-import-field]");
      if (!field) return;
      const card = field.closest("article.card[data-uid]");
      if (!card) return;
      if (field.dataset.importField !== "now_type") return;
      saveImportPrep(card.dataset.uid, { now_type: Number(field.value) });
    });

    listEl.addEventListener("blur", (event) => {
      const field = event.target.closest("[data-import-field='publish_user_id']");
      if (!field) return;
      const card = field.closest("article.card[data-uid]");
      if (!card) return;
      saveImportPrep(card.dataset.uid, { publish_user_id: field.value.trim() });
    }, true);

    listEl.addEventListener("input", (event) => {
      const input = event.target.closest("[data-poi-keyword]");
      if (!input) return;
      const card = input.closest("article.card[data-uid]");
      if (card) poiKeywords[card.dataset.uid] = input.value;
    });

    searchInput.addEventListener("input", (event) => {
      searchTerm = event.target.value.trim();
      resetPage();
      render();
    });

    document.getElementById("resetBtn").addEventListener("click", () => {
      void clearReviewDecisions();
    });

    document.getElementById("batchPrepBtn").addEventListener("click", runBatchPrep);
    document.getElementById("batchImportBtn").addEventListener("click", runBatchImport);
    importModalAbortEl.addEventListener("click", requestImportAbort);
    importModalCloseEl.addEventListener("click", closeImportProgressModal);
    importModalEl.querySelector(".import-modal-backdrop").addEventListener("click", () => {
      if (!importModalCloseEl.disabled) closeImportProgressModal();
    });
    document.getElementById("batchApproveBtn").addEventListener("click", () => {
      void batchSetReviewStatus("approved");
    });
    document.getElementById("batchRejectBtn").addEventListener("click", () => {
      void batchSetReviewStatus("rejected");
    });

    document.getElementById("exportBtn").addEventListener("click", async () => {
      try {
        const response = await fetch("/api/export-import-nows?approved_only=1&ready_only=0", { cache: "no-store" });
        const data = await response.json();
        const records = data.nows || getApprovedEvents();
        document.getElementById("exportText").value = JSON.stringify(records, null, 2);
      } catch (error) {
      document.getElementById("exportText").value = JSON.stringify(getApprovedEvents(), null, 2);
      }
      document.getElementById("exportDialog").showModal();
    });

    Promise.all([BuzzEnvUi.initBuzzEnvUi("#buzzEnvBar"), loadServerState()])
      .then(() => {
        updateBatchImportButtonLabel();
        window.onBuzzEnvChanged = async () => {
          updateBatchImportButtonLabel();
          await loadEvents();
          render();
        };
        return loadEvents();
      })
      .then(render)
      .catch((error) => {
        sourceMeta.textContent = "读取活动数据失败，请确认本地审核服务正在运行";
        setSaveState("未连接数据库，仅临时保存在当前浏览器", "error");
        listEl.innerHTML = `<div class="empty">活动数据加载失败</div>`;
        console.error(error);
      });
  </script>
</body>
</html>
