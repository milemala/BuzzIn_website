<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Zup 抓取活动审核台</title>
  <link rel="stylesheet" href="/workspace-nav.css">
  <style>
    :root{
      --bg:#f7f4ed;
      --panel:#fffdf8;
      --text:#1f1b16;
      --muted:#82786a;
      --line:#e6ded0;
      --yellow:#ffd84d;
      --green:#2a9d68;
      --red:#d95040;
      --ink:#14110d;
    }
    *{box-sizing:border-box}
    body{margin:0;background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif}
    button,input,select,textarea{font:inherit}
    .top{position:sticky;top:0;z-index:20;background:rgba(247,244,237,.92);backdrop-filter:blur(14px);border-bottom:1px solid var(--line)}
    .top-inner{max-width:1180px;margin:0 auto;padding:18px 20px;display:flex;gap:16px;align-items:center;justify-content:space-between}
    .brand{min-width:0}
    h1{margin:0;font-size:22px;line-height:1.25;letter-spacing:0;font-weight:800}
    .meta{margin-top:5px;color:var(--muted);font-size:13px}
    .save-state{display:inline-flex;align-items:center;height:24px;border-radius:999px;margin-top:8px;padding:0 9px;background:#efe8da;color:#65594b;font-size:12px;font-weight:700}
    .save-state.ok{background:#e7f5ec;color:#197549}
    .save-state.warn{background:#fff3c4;color:#806200}
    .save-state.error{background:#fde8e4;color:#ad382c}
    .actions{display:flex;gap:10px;align-items:center;flex-wrap:wrap;justify-content:flex-end}
    .btn{height:36px;border:1px solid var(--line);background:#fff;border-radius:8px;padding:0 12px;cursor:pointer;color:var(--ink)}
    .btn.primary{border-color:#111;background:#111;color:#fff}
    .btn:hover{transform:translateY(-1px)}
    .wrap{max-width:1180px;margin:0 auto;padding:18px 20px 44px}
    .filters{display:flex;gap:10px;align-items:center;flex-wrap:wrap;margin-bottom:16px}
    #cityFilter{display:flex;flex-wrap:wrap;gap:8px;border:0;background:transparent;overflow:visible}
    #cityFilter button{
      height:auto;min-width:88px;padding:9px 12px;border:1px solid var(--line);border-radius:10px;
      background:#fff;color:var(--text);display:flex;flex-direction:column;align-items:flex-start;gap:4px;text-align:left
    }
    #cityFilter button.active{background:#111;border-color:#111;color:#fff}
    #cityFilter button.has-pending:not(.active){border-color:#e6cf66;background:#fffdf4}
    .city-main{font-size:14px;font-weight:800;line-height:1.1}
    .city-sub{display:flex;flex-wrap:wrap;gap:6px;font-size:11px;line-height:1.2;opacity:.78}
    #cityFilter button.active .city-sub{opacity:.85}
    .city-pending{font-weight:800;color:#9a7200}
    #cityFilter button.active .city-pending{color:#ffd84d}
    .city-pending.is-zero{opacity:.55;font-weight:600}
    #cityFilter button.active .city-pending.is-zero{opacity:.45}
    .city-imported{font-weight:800;color:#2f6d4d}
    #cityFilter button.active .city-imported{color:#9dffc8}
    .city-imported.is-zero{opacity:.55;font-weight:600}
    #cityFilter button.active .city-imported.is-zero{opacity:.45}
    .city-pending-import{font-weight:800;color:#197549}
    #cityFilter button.active .city-pending-import{color:#9dffc8}
    .city-pending-import.is-zero{opacity:.55;font-weight:600}
    #cityFilter button.active .city-pending-import.is-zero{opacity:.45}
    .date-filters{margin:-2px 0 16px;overflow-x:auto;overflow-y:hidden;-webkit-overflow-scrolling:touch;padding-bottom:4px}
    .date-filters .seg{display:flex;width:max-content;min-width:100%}
    .date-filters .seg button{height:46px;min-width:74px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;line-height:1.1;white-space:nowrap}
    .date-filters .seg button[data-date="all"]{min-width:92px}
    .date-main{font-size:13px;font-weight:700}
    .date-sub{display:flex;flex-wrap:wrap;gap:6px;justify-content:center;font-size:11px;color:inherit;opacity:.88;line-height:1.2}
    #dateFilter button.active .date-sub{opacity:.92}
    #dateFilter .city-pending{font-weight:800;color:#9a7200}
    #dateFilter button.active .city-pending{color:#ffd84d}
    #dateFilter .city-pending.is-zero{opacity:.55;font-weight:600}
    #dateFilter button.active .city-pending.is-zero{opacity:.45}
    #dateFilter .city-imported{font-weight:800;color:#2f6d4d}
    #dateFilter button.active .city-imported{color:#9dffc8}
    #dateFilter .city-imported.is-zero{opacity:.55;font-weight:600}
    #dateFilter button.active .city-imported.is-zero{opacity:.45}
    #dateFilter .city-pending-import{font-weight:800;color:#197549}
    #dateFilter button.active .city-pending-import{color:#9dffc8}
    #dateFilter .city-pending-import.is-zero{opacity:.55;font-weight:600}
    #dateFilter button.active .city-pending-import.is-zero{opacity:.45}
    .seg{display:inline-flex;flex-wrap:wrap;border:1px solid var(--line);border-radius:8px;overflow:hidden;background:#fff}
    .seg button{
      min-height:44px;border:0;border-right:1px solid var(--line);background:transparent;padding:5px 10px;cursor:pointer;color:var(--muted);
      display:inline-flex;flex-direction:column;align-items:center;justify-content:center;gap:1px;line-height:1.15
    }
    .seg button:last-child{border-right:0}
    .seg button.active{background:#111;color:#fff}
    .seg button:disabled{opacity:.45;cursor:not-allowed}
    .seg-btn-label{font-size:13px}
    .seg-btn-count{font-size:11px;font-weight:700;opacity:.72}
    .seg button.active .seg-btn-count{opacity:.88}
    .search{height:36px;border:1px solid var(--line);border-radius:8px;background:#fff;padding:0 12px;min-width:260px}
    .grid{display:grid;grid-template-columns:1fr;gap:12px}
    .card{background:var(--panel);border:1px solid var(--line);border-radius:8px;overflow:hidden;display:grid;grid-template-columns:156px minmax(0,1fr)}
    .cover-wrap{position:relative;width:156px;min-height:218px;background:#eee6d8}
    .cover{display:block;width:156px;height:100%;min-height:218px;background:#eee6d8;object-fit:contain}
    .cover-fallback{position:absolute;inset:0;display:none;align-items:center;justify-content:center;padding:12px;text-align:center;color:#8a7c6b;font-size:12px;line-height:1.45;background:#eee6d8}
    .cover-wrap.broken .cover{display:none}
    .cover-wrap.broken .cover-fallback{display:flex}
    .body{padding:13px 14px;min-width:0}
    .row{display:flex;align-items:flex-start;justify-content:space-between;gap:10px}
    .title{margin:0;font-size:16px;line-height:1.35;font-weight:800}
    .score{flex:none;border-radius:999px;background:#efe8da;color:#5e5345;font-size:12px;font-weight:800;padding:4px 8px}
    .score.good{background:#e7f5ec;color:#197549}
    .score.bad{background:#fde8e4;color:#ad382c}
    .chips{display:flex;gap:6px;flex-wrap:wrap;margin:10px 0}
    .chip{font-size:12px;padding:4px 8px;border-radius:999px;background:#f0eadf;color:#6d6254}
    .chip.poi-doubt{background:#fff3c4;color:#806200}
    .poi-warn{margin-top:8px;padding:8px 10px;border-radius:8px;background:#fff8e6;border:1px solid #f0d98a;color:#7a5b00;font-size:12px;line-height:1.45}
    .poi-warn b{display:block;margin-bottom:4px}
    .info{display:grid;gap:5px;color:#494036;font-size:13px;line-height:1.45}
    .info div{white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .summary{margin-top:10px;color:#2f281f;font-size:13px;line-height:1.7;white-space:pre-wrap}
    .reason{margin-top:10px;color:var(--muted);font-size:12px;line-height:1.5}
    .card-actions{display:flex;gap:8px;margin-top:12px;align-items:center;flex-wrap:wrap}
    .mini{height:31px;border:1px solid var(--line);border-radius:8px;background:#fff;padding:0 10px;cursor:pointer;color:#302920}
    .mini.approve.active{background:var(--green);border-color:var(--green);color:#fff}
    .mini.reject.active{background:var(--red);border-color:var(--red);color:#fff}
    .mini.pending.active{background:var(--yellow);border-color:var(--yellow);color:#211b10}
    .link{margin-left:auto;color:#6b5b00;text-decoration:none;font-size:13px}
    .empty{padding:44px;text-align:center;color:var(--muted);background:var(--panel);border:1px solid var(--line);border-radius:8px}
    .pager{display:flex;flex-wrap:wrap;gap:10px;align-items:center;justify-content:space-between;margin-top:16px;padding:12px 14px;background:var(--panel);border:1px solid var(--line);border-radius:8px}
    .pager-info{font-size:13px;color:var(--muted)}
    .pager-actions{display:flex;flex-wrap:wrap;gap:8px;align-items:center}
    .pager-actions .mini{min-width:36px}
    .pager-actions .mini.active{background:#111;border-color:#111;color:#fff}
    .pager-actions .mini:disabled{opacity:.45;cursor:not-allowed}
    .back-top{
      position:fixed;right:20px;bottom:20px;z-index:30;
      width:44px;height:44px;border:1px solid var(--line);border-radius:999px;
      background:#fff;color:var(--ink);cursor:pointer;box-shadow:0 4px 16px rgba(20,16,8,.12);
      opacity:0;visibility:hidden;transform:translateY(8px);transition:opacity .2s,transform .2s,visibility .2s
    }
    .back-top.visible{opacity:1;visibility:visible;transform:translateY(0)}
    .back-top:hover{border-color:#c8b89f}
    .import-block{margin-top:12px;padding:12px;border:1px solid var(--line);border-radius:8px;background:#f7f6f2}
    .import-block h3{margin:0 0 8px;font-size:13px;font-weight:800;color:#3a342c}
    .import-row{display:grid;gap:8px;font-size:13px}
    .import-meta{color:var(--muted);font-size:12px;line-height:1.45;word-break:break-all}
    .import-field{display:grid;gap:4px}
    .import-field label{font-size:11px;font-weight:700;color:var(--muted)}
    .import-field select,.import-field input{height:32px;border:1px solid var(--line);border-radius:6px;padding:0 8px;background:#fff}
    .import-actions{display:flex;gap:8px;flex-wrap:wrap;margin-top:4px}
    .import-ready-tag{display:inline-block;font-size:11px;font-weight:800;padding:2px 8px;border-radius:999px;background:#e7f5ec;color:#197549}
    .import-ready-tag.no{background:#fde8e4;color:#ad382c}
    .chip.poi-hit{background:#e7f5ec;color:#197549}
    .chip.poi-miss{background:#fde8e4;color:#ad382c}
    .chip.classify-pending{background:#fff4df;color:#9a7200}
    .chip.classify-ok{background:#e7f5ec;color:#197549}
    .chip.classify-blocked{background:#fde8e4;color:#ad382c}
    .poi-hit-inline{color:#197549}
    .poi-missing-inline{color:#ad382c}
    .import-merchant-hit{color:#197549}
    .import-merchant-miss{color:#9a7200}
    .import-status{margin-top:6px;font-size:12px;line-height:1.45}
    .import-status.imported{color:#197549;font-weight:800}
    .import-status.failed{color:#ad382c}
    .import-status.pending{color:var(--muted)}
    .mini.import-now{border-color:#111}
    .mini.import-now:disabled{opacity:.45;cursor:not-allowed}
    .mini.import-now.done{background:#e7f5ec;border-color:#2a9d68;color:#197549}
    .mini.delete-buzz{border-color:#d95040;color:#ad382c}
    .mini.delete-buzz:hover{background:#fde8e4}
    .poi-hint{margin:6px 0 0;font-size:11px;line-height:1.45;color:var(--muted)}
    .poi-search-row{display:flex;gap:8px;flex-wrap:wrap;margin-top:8px}
    .poi-search-row input{flex:1 1 180px;height:32px;border:1px solid var(--line);border-radius:6px;padding:0 8px;background:#fff}
    .poi-cands-label{margin-top:10px;font-size:11px;font-weight:700;color:var(--muted)}
    .poi-cands{display:grid;gap:6px;margin-top:6px}
    .poi-cand{display:flex;gap:8px;align-items:flex-start;padding:8px;border:1px solid var(--line);border-radius:8px;background:#fff;cursor:pointer;text-align:left}
    .poi-cand:hover{border-color:#c8b89f}
    .poi-cand.active{border-color:#2a9d68;background:#f2fbf6}
    .poi-cand b{display:block;font-size:13px}
    .poi-cand span{display:block;font-size:11px;color:var(--muted);margin-top:2px}
    dialog{border:1px solid var(--line);border-radius:8px;padding:0;max-width:min(840px,92vw);width:840px;background:#fffdf8;color:var(--text)}
    dialog::backdrop{background:rgba(0,0,0,.28)}
    .modal-head{display:flex;align-items:center;justify-content:space-between;padding:14px 16px;border-bottom:1px solid var(--line)}
    .modal-head h2{font-size:18px;margin:0}
    textarea{display:block;width:100%;height:430px;border:0;padding:16px;background:#fffdf8;color:#211b10;font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;font-size:12px;line-height:1.5;resize:vertical}
    @media (max-width:820px){
      .top-inner{align-items:flex-start;flex-direction:column}
      .actions{justify-content:flex-start}
      .card{grid-template-columns:104px minmax(0,1fr)}
      .cover-wrap,.cover{width:104px}
      .cover-wrap,.cover{min-height:220px}
      .search{min-width:0;width:100%}
    }
  </style>
</head>
<body>
  <header class="top">
    <div class="top-inner">
      <div class="brand">
        <nav class="workspace-nav" aria-label="工作区">
          <a href="/" class="active">活动审核</a>
          <a href="/merchants.html">商户审核</a>
          <a href="/merchant-bubbles.html">商户气泡</a>
        </nav>
        <h1>Zup 抓取活动审核台</h1>
        <div class="meta" id="sourceMeta">读取本地活动数据中...</div>
        <div class="save-state warn" id="saveState">正在连接本地数据库</div>
      </div>
      <div class="actions">
        <button class="btn" id="resetBtn">重置审核</button>
        <button class="btn" id="batchPrepBtn">批量补全入库</button>
        <button class="btn primary" id="batchImportBtn">批量入库</button>
        <button class="btn" id="exportBtn">导出 JSON</button>
      </div>
    </div>
  </header>

  <main class="wrap">
    <section class="filters">
      <div class="seg" id="cityFilter">
        <button data-city="all" class="active">全部城市</button>
      </div>
      <div class="seg" id="statusFilter"></div>
      <div class="seg" id="sourceFilter"></div>
      <div class="seg" id="categoryFilter"></div>
      <div class="seg" id="sortMode">
        <button data-sort="source" class="active">来源原始顺序</button>
        <button data-sort="time">活动时间</button>
      </div>
      <input class="search" id="searchInput" placeholder="搜索标题、地点、发起方">
    </section>
    <section class="date-filters">
      <div class="seg" id="dateFilter">
        <button data-date="all" class="active">全部日期</button>
      </div>
    </section>
    <section class="grid" id="list"></section>
    <nav class="pager" id="pager" hidden aria-label="分页"></nav>
  </main>

  <button class="back-top" id="backTopBtn" type="button" title="回到顶部" aria-label="回到顶部">↑</button>

  <dialog id="exportDialog">
    <div class="modal-head">
      <h2>入库 JSON（now/sample 格式）</h2>
      <button class="btn" onclick="document.getElementById('exportDialog').close()">关闭</button>
    </div>
    <textarea id="exportText" readonly></textarea>
  </dialog>

  <script>
    let payload = { events: [], cities: [], cityMeta: {}, sourcePages: {}, dateWindow: [] };
    const stateKey = "zup-crawl-review-v1";
    let reviewState = JSON.parse(localStorage.getItem(stateKey) || "{}");
    let serverSaveEnabled = false;
    let cityFilter = "all";
    let statusFilter = "all";
    let sourceFilter = "all";
    let categoryFilter = "all";
    let dateFilter = "all";
    let sortMode = "source";
    let searchTerm = "";
    let page = 1;
    const PAGE_SIZE = 20;
    const DEFAULT_PUBLISH_USER_ID = "579362104";
    const DEFAULT_NOW_TYPE = 3;
    let prepBusy = false;
    let importBusy = false;
    const poiKeywords = {};
    const poiPreviews = {};
    let eventIndex = [];
    const eventUidToIndex = new Map();
    let filterMetrics = null;

    const STATUS_FILTER_KEYS = [
      "all", "imported", "suggested", "classification-pending", "rule-blocked",
      "approved", "rejected", "pending", "import_ready", "no_poi", "poi_doubtful", "expired",
    ];

    const sourceMeta = document.getElementById("sourceMeta");
    const listEl = document.getElementById("list");
    const pagerEl = document.getElementById("pager");
    const backTopBtn = document.getElementById("backTopBtn");
    const cityFilterEl = document.getElementById("cityFilter");
    const statusFilterEl = document.getElementById("statusFilter");
    const sourceFilterEl = document.getElementById("sourceFilter");
    const categoryFilterEl = document.getElementById("categoryFilter");
    const dateFilterEl = document.getElementById("dateFilter");
    const sortModeEl = document.getElementById("sortMode");
    const searchInput = document.getElementById("searchInput");
    const saveStateEl = document.getElementById("saveState");
    function getStatus(event) {
      const uid = event.eventUid || event.event_uid || event.id;
      return reviewState[uid] || event.review_status || "pending";
    }

    function isSuggested(event) {
      return event.suggested === true || event.suggested === 1;
    }

    function isAgentClassified(event) {
      return String(event.classification_source || "") === "agent";
    }

    function isClassificationPending(event) {
      if (isAgentClassified(event)) return false;
      return String(event.category || "") === "待分类"
        || String(event.classification_source || "pending") === "pending";
    }

    function isAgentBlocked(event) {
      return isAgentClassified(event) && !isSuggested(event);
    }

    function isRuleBlockedUnprocessed(event) {
      return isAgentBlocked(event) && getStatus(event) === "pending";
    }

    function renderClassificationChip(event) {
      if (isClassificationPending(event)) {
        return `<span class="chip classify-pending">待分类</span>`;
      }
      return isSuggested(event)
        ? `<span class="chip classify-ok">推荐</span>`
        : `<span class="chip classify-blocked">已挡下</span>`;
    }

    function setStatusFilter(next) {
      statusFilter = next;
      statusFilterEl.querySelectorAll("button").forEach((item) => {
        item.classList.toggle("active", item.dataset.status === next);
      });
      resetPage();
      render();
    }

    function effectivePublishUserId(event) {
      return String(event.publish_user_id || DEFAULT_PUBLISH_USER_ID).trim() || DEFAULT_PUBLISH_USER_ID;
    }

    function hasEventStarted(event) {
      const raw = event.startDate || event.start_date || "";
      const start = new Date(raw);
      return !Number.isNaN(start.getTime()) && start.getTime() <= Date.now();
    }

    function suggestNowType(event) {
      return hasEventStarted(event) ? 2 : 3;
    }

    function effectiveNowType(event) {
      const n = Number(event.now_type);
      if (n === 1 || n === 2 || n === 3) return n;
      return suggestNowType(event);
    }

    function resolvePoiCoordinates(event) {
      const poiId = String(event.location_poi_id || "").trim();
      if (!poiId) return { latitude: null, longitude: null };
      if (event.poi_latitude != null && event.poi_longitude != null) {
        return { latitude: event.poi_latitude, longitude: event.poi_longitude };
      }
      const match = (event.poi_candidates || []).find((item) => item.poi_id === poiId);
      if (match && match.latitude != null && match.longitude != null) {
        return { latitude: match.latitude, longitude: match.longitude };
      }
      return { latitude: null, longitude: null };
    }

    function isImportReady(event) {
      if (!effectivePublishUserId(event)) return false;
      if (![1, 2, 3].includes(effectiveNowType(event))) return false;
      if (!String(event.title || "").trim()) return false;
      if (!String(event.location_poi_id || "").trim()) return false;
      const poiCoords = resolvePoiCoordinates(event);
      if (poiCoords.latitude == null || poiCoords.longitude == null) return false;
      if (!event.start_at) return false;
      if (!event.expired_at) return false;
      return true;
    }

    function buildImportContent(event) {
      const timeText = String(event.timeText || event.time_text || "").trim();
      const body = String(event.body || "").trim();
      const parts = [];
      if (timeText) parts.push(timeText);
      if (body && (!timeText || !body.startsWith(timeText))) parts.push(body);
      return parts.join("\n\n").slice(0, 2000);
    }

    function buildImportRecord(event) {
      const images = event.image ? [event.image] : [];
      const loc = String(event.location || "").trim();
      const poiCoords = resolvePoiCoordinates(event);
      const record = {
        user_id: effectivePublishUserId(event),
        now_title: String(event.title || "").slice(0, 128),
        now_content: buildImportContent(event),
        now_type: effectiveNowType(event),
        images,
        group_id: "",
        location_poi_id: event.location_poi_id || "",
        location_name: event.poi_title || loc.split(/\s+/)[0] || "",
        location_address: event.poi_address || loc,
        location_latitude: poiCoords.latitude,
        location_longitude: poiCoords.longitude,
        start_at: event.start_at || "",
        expired_at: event.expired_at || "",
      };
      if (event.now_merchant_id) record.now_merchant_id = event.now_merchant_id;
      return record;
    }

    function renderMerchantInfo(event) {
      if (!event.location_poi_id) return "";
      if (event.now_merchant_id) {
        const name = event.now_merchant_name || "已认证商户";
        return `<div class="import-meta import-merchant-hit">关联商户：<strong>${escapeHtml(name)}</strong> · merchant_id ${escapeHtml(event.now_merchant_id)}</div>`;
      }
      return `<div class="import-meta import-merchant-miss">关联商户：该 POI 在后台暂无认证商户</div>`;
    }

    function renderImportStatus(event) {
      if (event.import_status === "imported" && event.buzz_now_id) {
        const groupLine = event.buzz_group_id
          ? `<br>群聊 group_id <strong>${escapeHtml(event.buzz_group_id)}</strong>`
          : "";
        return `<div class="import-status imported">已入库 · now_id <strong>${escapeHtml(event.buzz_now_id)}</strong>${groupLine}</div>`;
      }
      if (event.import_status === "failed") {
        return `<div class="import-status failed">入库失败：${escapeHtml(event.import_error || "未知错误")}</div>`;
      }
      return `<div class="import-status pending">尚未入库</div>`;
    }

    function isImportedEvent(event) {
      return event.import_status === "imported" && Boolean(String(event.buzz_now_id || "").trim());
    }

    function isPendingImportEvent(event) {
      if (getStatus(event) === "rejected") return false;
      return isImportReady(event) && !isImportedEvent(event);
    }

    function hasNoPoi(event) {
      return !String(event.location_poi_id || "").trim();
    }

    function renderPoiSummary(event) {
      const poiId = String(event.location_poi_id || "").trim();
      if (!poiId) {
        return `<div class="poi-missing-inline">POI：<strong>尚未匹配</strong></div>`;
      }
      const title = String(event.poi_title || "").trim() || "已绑定 POI";
      const address = String(event.poi_address || "").trim();
      const addressLine = address ? `<br><span style="color:var(--muted)">${escapeHtml(address)}</span>` : "";
      return `<div class="poi-hit-inline">POI：<strong>${escapeHtml(title)}</strong>${addressLine}</div>`;
    }

    function canImportEvent(event) {
      return getStatus(event) === "approved"
        && isImportReady(event)
        && event.import_status !== "imported";
    }

    function importButtonLabel(event) {
      if (event.import_status === "imported" && event.buzz_now_id) return "已入库";
      if (event.import_status === "failed") return "重试入库";
      return "入库";
    }

    function getApprovedEvents() {
      return getActiveEvents()
        .filter((event) => getStatus(event) === "approved")
        .map((event) => buildImportRecord(event));
    }

    function upsertEvent(updated) {
      const idx = payload.events.findIndex((item) => (item.eventUid || item.event_uid) === (updated.eventUid || updated.event_uid));
      if (idx >= 0) payload.events[idx] = { ...payload.events[idx], ...updated };
      rebuildEventIndex();
    }

    function suggestPoiKeyword(event) {
      if (event.poi_suggest_keyword) return event.poi_suggest_keyword;
      if (event.poi_agent_search_keyword) return event.poi_agent_search_keyword;
      return "";
    }

    function poiKeywordValue(event) {
      const uid = event.eventUid || event.event_uid;
      return poiKeywords[uid] !== undefined ? poiKeywords[uid] : suggestPoiKeyword(event);
    }

    async function loadEvents() {
      const response = await fetch("/api/events", { cache: "no-store" });
      if (!response.ok) throw new Error("events unavailable");
      payload = await response.json();
      if (!payload || typeof payload !== "object") {
        payload = { events: [], cities: [], cityMeta: {}, sourcePages: {}, dateWindow: [] };
      }
      rebuildEventIndex();
    }

    function rebuildEventIndex() {
      eventUidToIndex.clear();
      eventIndex = (payload.events || []).map((event, index) => {
        const uid = event.eventUid || event.event_uid || event.id;
        eventUidToIndex.set(uid, index);
        return {
          event,
          index,
          expired: isExpired(event),
          city: getCityKey(event),
          source: getSourceKey(event),
        };
      });
    }

    function initReviewCounts() {
      return { pending: 0, imported: 0, pendingImport: 0 };
    }

    function bumpReviewCounts(target, event) {
      if (getStatus(event) === "pending") target.pending += 1;
      if (isImportedEvent(event)) target.imported += 1;
      if (isPendingImportEvent(event)) target.pendingImport += 1;
    }

    function computeFilterMetrics() {
      const today = todayDateValue();
      const cityStatsMap = new Map([["all", initReviewCounts()]]);
      const cityScoped = [];
      const baseScoped = [];
      const expiredScoped = [];
      const sourceCounts = new Map();
      const statusCounts = Object.fromEntries(STATUS_FILTER_KEYS.map((key) => [key, 0]));
      const categoryCounts = new Map();

      for (const row of eventIndex) {
        const { event, expired, city, source } = row;
        if (!expired) {
          bumpReviewCounts(cityStatsMap.get("all"), event);
          if (!cityStatsMap.has(city)) cityStatsMap.set(city, initReviewCounts());
          bumpReviewCounts(cityStatsMap.get(city), event);
        }

        const cityMatch = cityFilter === "all" || city === cityFilter;
        if (!cityMatch) continue;

        if (expired) {
          if (sourceFilter === "all" || source === sourceFilter) expiredScoped.push(event);
          continue;
        }

        cityScoped.push(event);
        sourceCounts.set(source, (sourceCounts.get(source) || 0) + 1);

        if (sourceFilter !== "all" && source !== sourceFilter) continue;
        baseScoped.push(event);

        statusCounts.all += 1;
        for (const key of STATUS_FILTER_KEYS) {
          if (key === "expired" || key === "all") continue;
          if (matchesStatusFilter(event, key)) statusCounts[key] += 1;
        }

        const category = event.category;
        if (category) categoryCounts.set(category, (categoryCounts.get(category) || 0) + 1);
      }

      statusCounts.expired = expiredScoped.length;

      const filterDates = collectFilterDates(baseScoped, today);
      const dateCounts = new Map([["all", initReviewCounts()]]);
      for (const event of baseScoped) {
        bumpReviewCounts(dateCounts.get("all"), event);
        for (const date of filterDates) {
          if (!eventOccursOnDate(event, date)) continue;
          if (!dateCounts.has(date)) dateCounts.set(date, initReviewCounts());
          bumpReviewCounts(dateCounts.get(date), event);
        }
      }

      return {
        cityStatsMap,
        cityScoped,
        baseScoped,
        expiredScoped,
        sourceCounts,
        statusCounts,
        categoryCounts,
        dateCounts,
        filterDates,
      };
    }

    function escapeHtml(value) {
      return String(value || "").replace(/[&<>"']/g, (char) => ({
        "&": "&amp;",
        "<": "&lt;",
        ">": "&gt;",
        '"': "&quot;",
        "'": "&#39;"
      }[char]));
    }

    function imageSrc(image, version) {
      if (!image) return "";
      const params = new URLSearchParams({ src: image });
      if (version) params.set("v", String(version));
      return `/api/image?${params.toString()}`;
    }

    function todayDateValue() {
      const now = new Date();
      return `${now.getFullYear()}-${String(now.getMonth() + 1).padStart(2, "0")}-${String(now.getDate()).padStart(2, "0")}`;
    }

    function getStartDateValue(event) {
      const raw = event.startDate || "";
      const date = new Date(raw);
      if (Number.isNaN(date.getTime())) return "";
      return `${date.getFullYear()}-${String(date.getMonth() + 1).padStart(2, "0")}-${String(date.getDate()).padStart(2, "0")}`;
    }

    function getEndDateValue(event) {
      const raw = event.endDate || event.startDate || "";
      const date = new Date(raw);
      if (Number.isNaN(date.getTime())) return "";
      return `${date.getFullYear()}-${String(date.getMonth() + 1).padStart(2, "0")}-${String(date.getDate()).padStart(2, "0")}`;
    }

    function eventOccursOnDate(event, dateValue) {
      const start = getStartDateValue(event);
      const end = getEndDateValue(event) || start;
      if (start && end) return dateValue >= start && dateValue <= end;
      return (event.eventDates || []).includes(dateValue);
    }

    function collectFilterDates(events, todayValue) {
      const maxDays = 90;
      const dates = new Set();
      for (const event of events) {
        const start = getStartDateValue(event);
        const end = getEndDateValue(event) || start;
        if (!start || !end) {
          for (const date of event.eventDates || []) {
            if (date >= todayValue) dates.add(date);
          }
          continue;
        }
        const rangeStart = start > todayValue ? start : todayValue;
        if (end < rangeStart) continue;
        const cursor = new Date(`${rangeStart}T00:00:00`);
        const finalEnd = new Date(`${end}T00:00:00`);
        let count = 0;
        while (cursor <= finalEnd && count < maxDays) {
          dates.add(`${cursor.getFullYear()}-${String(cursor.getMonth() + 1).padStart(2, "0")}-${String(cursor.getDate()).padStart(2, "0")}`);
          cursor.setDate(cursor.getDate() + 1);
          count += 1;
        }
      }
      return [...dates].sort();
    }

    function isExpired(event) {
      const endDate = getEndDateValue(event);
      return endDate ? endDate < todayDateValue() : false;
    }

    function getCityKey(event) {
      return event.city || "未知城市";
    }

    function getCityScopedEvents() {
      return filterMetrics?.cityScoped || [];
    }

    /** 城市 + 来源，用于状态/类型/日期筛选项的计数与选项 */
    function getBaseScopedEvents() {
      return filterMetrics?.baseScoped || [];
    }

    function getActiveEvents() {
      return getCityScopedEvents();
    }

    function getExpiredEvents() {
      return filterMetrics?.expiredScoped || [];
    }

    function cityStats(cityKey) {
      return filterMetrics?.cityStatsMap?.get(cityKey) || initReviewCounts();
    }

    function renderReviewImportCounts({ pending, imported, pendingImport }) {
      const pendingClass = pending > 0 ? "" : " is-zero";
      const importedClass = imported > 0 ? "" : " is-zero";
      const pendingImportClass = pendingImport > 0 ? "" : " is-zero";
      return `
        <span class="city-pending${pendingClass}">待定 ${pending}</span>
        <span class="city-imported${importedClass}">已入库 ${imported}</span>
        <span class="city-pending-import${pendingImportClass}">待入库 ${pendingImport}</span>
      `;
    }

    function renderSegButton({ attr, value, label, count, active, disabled }) {
      return `
        <button
          type="button"
          data-${attr}="${escapeHtml(value)}"
          class="${active ? "active" : ""}"
          ${disabled ? "disabled" : ""}
        >
          <span class="seg-btn-label">${escapeHtml(label)}</span>
          <span class="seg-btn-count">${count}</span>
        </button>
      `;
    }

    function matchesStatusFilter(event, filter) {
      if (filter === "all") return true;
      const status = getStatus(event);
      if (filter === "imported") return isImportedEvent(event);
      if (filter === "import_ready") return isPendingImportEvent(event);
      if (filter === "suggested") return isSuggested(event) && !isClassificationPending(event);
      if (filter === "classification-pending") {
        return status === "pending" && isClassificationPending(event);
      }
      if (filter === "rule-blocked") return isRuleBlockedUnprocessed(event);
      if (filter === "poi_doubtful") {
        return status === "pending" && event.poi_doubtful;
      }
      if (filter === "no_poi") {
        return status === "pending" && hasNoPoi(event);
      }
      if (filter === "expired") return isExpired(event);
      if (["approved", "rejected", "pending"].includes(filter)) return status === filter;
      return true;
    }

    function resetPage() {
      page = 1;
    }

    function clampPage(totalItems) {
      const totalPages = Math.max(1, Math.ceil(totalItems / PAGE_SIZE));
      if (page > totalPages) page = totalPages;
      if (page < 1) page = 1;
      return totalPages;
    }

    function paginateEvents(events) {
      const totalPages = clampPage(events.length);
      const start = (page - 1) * PAGE_SIZE;
      return {
        list: events.slice(start, start + PAGE_SIZE),
        total: events.length,
        totalPages,
      };
    }

    function getSourcePosition(event, index) {
      return Number.isFinite(Number(event.sourcePosition)) ? Number(event.sourcePosition) : index + 1;
    }

    function getTimeValue(event) {
      const value = Date.parse(event.startDate || "");
      return Number.isNaN(value) ? Number.MAX_SAFE_INTEGER : value;
    }

    function getSourceKey(event) {
      return event.source || event.sourceName || "unknown";
    }

    function getSourceLabel(event) {
      const known = {
        douban: "豆瓣",
        huodongxing: "活动行",
        xiaohongshu: "小红书",
        wechat: "公众号",
        unknown: "未知来源"
      };
      return event.sourceName || known[getSourceKey(event)] || getSourceKey(event);
    }

    function getFilteredEvents() {
      const scoped = statusFilter === "expired"
        ? (filterMetrics?.expiredScoped || [])
        : (filterMetrics?.baseScoped || []);
      const needle = searchTerm.trim().toLowerCase();
      const filtered = [];

      for (const event of scoped) {
        if (statusFilter !== "expired" && isExpired(event)) continue;
        if (!matchesStatusFilter(event, statusFilter)) continue;
        if (categoryFilter !== "all" && event.category !== categoryFilter) continue;
        if (dateFilter !== "all" && !eventOccursOnDate(event, dateFilter)) continue;
        if (needle) {
          const searchText = `${event.title} ${event.location} ${event.owner} ${event.category}`.toLowerCase();
          if (!searchText.includes(needle)) continue;
        }
        const uid = event.eventUid || event.event_uid || event.id;
        filtered.push({ event, index: eventUidToIndex.get(uid) ?? 0 });
      }

      filtered.sort((a, b) => {
        if (sortMode === "time") return getTimeValue(a.event) - getTimeValue(b.event);
        return a.index - b.index;
      });
      return filtered.map(({ event }) => event);
    }

    function getExpiredScopedEvents() {
      return filterMetrics?.expiredScoped || [];
    }

    function normalizeDependentFilters() {
      const scoped = getBaseScopedEvents();
      if (categoryFilter !== "all" && !scoped.some((event) => event.category === categoryFilter)) {
        categoryFilter = "all";
      }
      if (dateFilter !== "all") {
        const dates = collectFilterDates(scoped, todayDateValue());
        if (!dates.includes(dateFilter)) dateFilter = "all";
      }
    }

    function renderCityChip(cityKey, label) {
      const counts = cityStats(cityKey);
      const isActive = cityFilter === cityKey;
      return `
        <button
          type="button"
          data-city="${escapeHtml(cityKey)}"
          class="${isActive ? "active" : ""} ${counts.pending > 0 ? "has-pending" : ""}"
        >
          <span class="city-main">${escapeHtml(label)}</span>
          <span class="city-sub">${renderReviewImportCounts(counts)}</span>
        </button>
      `;
    }

    function renderStatusFilter() {
      const statusCounts = filterMetrics?.statusCounts || {};
      const filters = [
        { key: "all", label: "全部" },
        { key: "imported", label: "已入库" },
        { key: "suggested", label: "推荐" },
        { key: "classification-pending", label: "待分类" },
        { key: "rule-blocked", label: "挡下待处理" },
        { key: "approved", label: "已通过" },
        { key: "rejected", label: "已拒绝" },
        { key: "pending", label: "待定" },
        { key: "import_ready", label: "待入库" },
        { key: "no_poi", label: "未匹配 POI" },
        { key: "poi_doubtful", label: "POI 存疑" },
        { key: "expired", label: "已过期" },
      ];
      statusFilterEl.innerHTML = filters.map(({ key, label }) => renderSegButton({
        attr: "status",
        value: key,
        label,
        count: statusCounts[key] || 0,
        active: statusFilter === key,
      })).join("");
    }

    function renderCityFilter() {
      const cityStatsMap = filterMetrics?.cityStatsMap || new Map();
      const cities = [...cityStatsMap.keys()].filter((key) => key !== "all").sort((a, b) => {
        const pendingDiff = cityStats(b).pending - cityStats(a).pending;
        if (pendingDiff !== 0) return pendingDiff;
        return a.localeCompare(b, "zh-CN");
      });
      cityFilterEl.innerHTML = renderCityChip("all", "全部城市")
        + cities.map((city) => renderCityChip(city, city)).join("");
    }

    function renderCategoryFilter() {
      const scoped = getBaseScopedEvents();
      const categoryCounts = filterMetrics?.categoryCounts || new Map();
      const categories = [...categoryCounts.keys()].sort((a, b) => a.localeCompare(b, "zh-CN"));
      categoryFilterEl.innerHTML = renderSegButton({
        attr: "category",
        value: "all",
        label: "全部类型",
        count: scoped.length,
        active: categoryFilter === "all",
      }) + categories.map((category) => renderSegButton({
        attr: "category",
        value: category,
        label: category,
        count: categoryCounts.get(category) || 0,
        active: categoryFilter === category,
      })).join("");
    }

    function renderSourceFilter() {
      const baseSources = [
        ["douban", "豆瓣"],
        ["huodongxing", "活动行"],
        ["xiaohongshu", "小红书"],
        ["wechat", "公众号"],
      ];
      const scoped = getCityScopedEvents();
      const sourceCounts = filterMetrics?.sourceCounts || new Map();
      const present = new Map();
      for (const event of scoped) present.set(getSourceKey(event), getSourceLabel(event));
      const sources = baseSources.map(([key, label]) => [key, present.get(key) || label]);
      present.forEach((label, key) => {
        if (!sources.some(([sourceKey]) => sourceKey === key)) sources.push([key, label]);
      });
      sourceFilterEl.innerHTML = renderSegButton({
        attr: "source",
        value: "all",
        label: "全部来源",
        count: scoped.length,
        active: sourceFilter === "all",
      }) + sources.map(([key, label]) => {
        const count = sourceCounts.get(key) || 0;
        return renderSegButton({
          attr: "source",
          value: key,
          label,
          count,
          active: sourceFilter === key,
          disabled: !count,
        });
      }).join("");
    }

    function formatDateLabel(dateValue) {
      const date = new Date(`${dateValue}T00:00:00`);
      const weekdays = ["周日", "周一", "周二", "周三", "周四", "周五", "周六"];
      return `${date.getMonth() + 1}/${date.getDate()} ${weekdays[date.getDay()]}`;
    }

    function renderDateFilter() {
      const dateCounts = filterMetrics?.dateCounts || new Map();
      const dates = filterMetrics?.filterDates || [];
      if (dateFilter !== "all" && !dates.includes(dateFilter)) dateFilter = "all";

      const allCounts = dateCounts.get("all") || initReviewCounts();
      dateFilterEl.innerHTML = `<button data-date="all" class="${dateFilter === "all" ? "active" : ""}"><span class="date-main">全部</span><span class="date-sub">${renderReviewImportCounts(allCounts)}</span></button>` +
        dates.map((date) => {
          const dayCounts = dateCounts.get(date) || initReviewCounts();
          const hasEvents = dayCounts.pending + dayCounts.imported + dayCounts.pendingImport > 0;
          const disabled = hasEvents ? "" : "disabled";
          return `<button data-date="${escapeHtml(date)}" class="${dateFilter === date ? "active" : ""}" ${disabled}><span class="date-main">${escapeHtml(formatDateLabel(date))}</span><span class="date-sub">${renderReviewImportCounts(dayCounts)}</span></button>`;
        }).join("");
    }

    function renderPager(meta) {
      if (!meta.total) {
        pagerEl.hidden = true;
        pagerEl.innerHTML = "";
        return;
      }

      const { total, totalPages } = meta;
      const from = (page - 1) * PAGE_SIZE + 1;
      const to = Math.min(page * PAGE_SIZE, total);

      let pageButtons = "";
      const windowSize = 5;
      let startPage = Math.max(1, page - Math.floor(windowSize / 2));
      let endPage = Math.min(totalPages, startPage + windowSize - 1);
      startPage = Math.max(1, endPage - windowSize + 1);
      for (let p = startPage; p <= endPage; p += 1) {
        pageButtons += `<button type="button" class="mini ${p === page ? "active" : ""}" data-page="${p}">${p}</button>`;
      }

      pagerEl.hidden = false;
      pagerEl.innerHTML = `
        <div class="pager-info">第 ${from}–${to} 条，共 ${total} 条 · 第 ${page} / ${totalPages} 页</div>
        <div class="pager-actions">
          <button type="button" class="mini" data-page="prev" ${page <= 1 ? "disabled" : ""}>上一页</button>
          ${pageButtons}
          <button type="button" class="mini" data-page="next" ${page >= totalPages ? "disabled" : ""}>下一页</button>
        </div>
      `;
    }

    function scrollToListTop() {
      listEl.scrollIntoView({ behavior: "smooth", block: "start" });
    }

    function renderList() {
      const filtered = getFilteredEvents();
      const { list: events, total, totalPages } = paginateEvents(filtered);
      renderPager({ total, totalPages });

      if (!events.length) {
        const emptyHint = statusFilter === "rule-blocked"
          ? "规则挡下的待处理项已清空，或当前筛选下没有未处理的挡下活动"
          : "当前筛选下没有活动";
        listEl.innerHTML = `<div class="empty">${emptyHint}</div>`;
        return;
      }
      listEl.innerHTML = events.map((event) => {
        const status = getStatus(event);
        const uid = event.eventUid || event.event_uid || event.id;
        const scoreClass = event.score >= 70 ? "good" : event.score < 60 ? "bad" : "";
        const ready = isImportReady(event);
        const importable = canImportEvent(event);
        const imported = event.import_status === "imported" && event.buzz_now_id;
        return `
          <article class="card" data-uid="${escapeHtml(uid)}">
            <div class="cover-wrap">
              <img class="cover" src="${escapeHtml(imageSrc(event.image, event.updated_at || event.updatedAt))}" alt="${escapeHtml(event.title)}" loading="lazy" referrerpolicy="no-referrer" onerror="this.parentElement.classList.add('broken')">
              <div class="cover-fallback">图片加载失败<br>可点原始链接查看</div>
            </div>
            <div class="body">
              <div class="row">
                <h2 class="title">${escapeHtml(event.title)}</h2>
                <span class="score ${scoreClass}">${event.score}</span>
              </div>
              <div class="chips">
                <span class="chip">${escapeHtml(event.category)}</span>
                <span class="chip">来源：${escapeHtml(getSourceLabel(event))}</span>
                <span class="chip">${escapeHtml(event.district || event.city)}</span>
                ${renderClassificationChip(event)}
                <span class="chip">来源#${escapeHtml(event.sourcePosition || "-")}</span>
                <span class="import-ready-tag ${ready ? "" : "no"}">${ready ? "可入库" : "未齐"}</span>
                ${event.location_poi_id
    ? `<span class="chip poi-hit">POI 已匹配</span>`
    : `<span class="chip poi-miss">未匹配 POI</span>`}
                ${event.poi_doubtful ? `<span class="chip poi-doubt">POI 存疑</span>` : ""}
              </div>
              <div class="info">
                <div>时间：${escapeHtml(event.timeText)}</div>
                <div>地点：${escapeHtml(event.location)}</div>
                ${renderPoiSummary(event)}
                <div>费用：${escapeHtml(event.fee || "待确认")}</div>
                <div>发起：${escapeHtml(event.owner || "未知")}</div>
              </div>
              <div class="summary">${escapeHtml(event.body || "")}</div>
              <div class="reason">${escapeHtml(event.reviewReason)}</div>
              <div class="import-block">
                <h3>入库准备</h3>
                <div class="import-row">
                  <div class="import-field">
                    <label for="user-${escapeHtml(uid)}">发布者 user_id</label>
                    <input id="user-${escapeHtml(uid)}" type="text" data-import-field="publish_user_id" value="${escapeHtml(effectivePublishUserId(event))}" placeholder="579362104">
                  </div>
                  <div class="import-field">
                    <label for="type-${escapeHtml(uid)}">now_type（1 动态 / 2 即刻邀约 / 3 预约）</label>
                    <select id="type-${escapeHtml(uid)}" data-import-field="now_type">
                      <option value="1" ${effectiveNowType(event) === 1 ? "selected" : ""}>1 动态</option>
                      <option value="2" ${effectiveNowType(event) === 2 ? "selected" : ""}>2 即刻邀约</option>
                      <option value="3" ${effectiveNowType(event) === 3 ? "selected" : ""}>3 预约</option>
                    </select>
                  </div>
                  <div class="import-meta">
                    入库时间：<strong>start_at</strong> ${escapeHtml(event.start_at || "—")}<br>
                    <strong>expired_at</strong> ${escapeHtml(event.expired_at || "—")}
                  </div>
                  <div class="import-meta">
                    ${event.location_poi_id
    ? (() => {
      const c = resolvePoiCoordinates(event);
      const coordText = c.latitude != null && c.longitude != null
        ? `${c.longitude}, ${c.latitude}（腾讯 POI）`
        : "<span style=\"color:#ad382c\">POI 坐标缺失，请重新点选</span>";
      return `POI：<strong>${escapeHtml(event.poi_title || event.location)}</strong><br>地址：${escapeHtml(event.poi_address || event.location)}<br>ID：${escapeHtml(event.location_poi_id)}<br>坐标：${coordText}`;
    })()
    : "<span style=\"color:#ad382c\">尚未匹配 POI</span>"}
                  </div>
                  ${renderPoiDoubt(event)}
                  ${renderMerchantInfo(event)}
                  ${renderImportStatus(event)}
                  <div class="import-actions">
                    <button class="mini" type="button" data-poi-action="refresh">刷新候选</button>
                  </div>
                  <p class="poi-hint">POI 由 Cursor Agent 匹配后写入；此处仅供人工修正。填写关键词后点「自由搜索」，再在候选里点选保存。</p>
                  <div class="poi-search-row">
                    <input type="text" data-poi-keyword value="${escapeHtml(poiKeywordValue(event))}" placeholder="Agent 搜词或自填，如 锈罐头剧场">
                    <button class="mini" type="button" data-poi-action="custom-search">自由搜索</button>
                  </div>
                  ${renderPoiBlock(event)}
                </div>
              </div>
              <div class="card-actions">
                <button class="mini approve ${status === "approved" ? "active" : ""}" data-id="${escapeHtml(uid)}" data-next="approved">通过</button>
                <button class="mini pending ${status === "pending" ? "active" : ""}" data-id="${escapeHtml(uid)}" data-next="pending">待定</button>
                <button class="mini reject ${status === "rejected" ? "active" : ""}" data-id="${escapeHtml(uid)}" data-next="rejected">拒绝</button>
                <button class="mini import-now ${imported ? "done" : ""}" type="button" data-import-uid="${escapeHtml(uid)}" ${importable ? "" : "disabled"}>${escapeHtml(importButtonLabel(event))}</button>
                ${imported ? `<button class="mini delete-buzz" type="button" data-delete-buzz-uid="${escapeHtml(uid)}" data-delete-buzz-now-id="${escapeHtml(event.buzz_now_id)}">删后台</button>` : ""}
                <a class="link" href="${escapeHtml(event.originalLink)}" target="_blank" rel="noreferrer">原始链接</a>
              </div>
            </div>
          </article>
        `;
      }).join("");

    }

    function render() {
      filterMetrics = computeFilterMetrics();
      const activeEvents = getBaseScopedEvents();
      const cityLabel = cityFilter === "all" ? (payload.cities || []).join(" / ") || payload.city || "未知城市" : cityFilter;
      const sources = sourceFilter === "all"
        ? [...new Set(getCityScopedEvents().map((event) => getSourceLabel(event)))].join(" / ") || "暂无来源"
        : (() => {
          const sample = activeEvents[0];
          return sample ? getSourceLabel(sample) : "暂无来源";
        })();
      const cityMeta = payload.cityMeta && cityFilter !== "all" ? payload.cityMeta[cityFilter] : null;
      const generatedAt = cityMeta?.generatedAt || payload.generatedAt || "未知时间";
      sourceMeta.textContent = `${cityLabel} · ${sources} · 生成于 ${generatedAt}`;
      renderCityFilter();
      renderStatusFilter();
      renderSourceFilter();
      renderCategoryFilter();
      renderDateFilter();
      renderList();
    }

    cityFilterEl.addEventListener("click", (event) => {
      const button = event.target.closest("button[data-city]");
      if (!button) return;
      cityFilter = button.dataset.city;
      sourceFilter = "all";
      categoryFilter = "all";
      dateFilter = "all";
      resetPage();
      render();
    });

    statusFilterEl.addEventListener("click", (event) => {
      const button = event.target.closest("button[data-status]");
      if (!button) return;
      setStatusFilter(button.dataset.status);
    });

    sourceFilterEl.addEventListener("click", (event) => {
      const button = event.target.closest("button[data-source]");
      if (!button || button.disabled) return;
      sourceFilter = button.dataset.source;
      normalizeDependentFilters();
      resetPage();
      render();
    });

    categoryFilterEl.addEventListener("click", (event) => {
      const button = event.target.closest("button[data-category]");
      if (!button) return;
      categoryFilter = button.dataset.category;
      resetPage();
      render();
    });

    dateFilterEl.addEventListener("click", (event) => {
      const button = event.target.closest("button[data-date]");
      if (!button) return;
      dateFilter = button.dataset.date;
      resetPage();
      render();
    });

    sortModeEl.addEventListener("click", (event) => {
      const button = event.target.closest("button[data-sort]");
      if (!button) return;
      sortMode = button.dataset.sort;
      sortModeEl.querySelectorAll("button").forEach((item) => item.classList.toggle("active", item === button));
      resetPage();
      render();
    });

    pagerEl.addEventListener("click", (event) => {
      const button = event.target.closest("button[data-page]");
      if (!button || button.disabled) return;
      const filtered = getFilteredEvents();
      const { totalPages } = paginateEvents(filtered);
      const raw = button.dataset.page;
      if (raw === "prev") {
        page -= 1;
        render();
        scrollToListTop();
        return;
      }
      if (raw === "next") {
        page += 1;
        render();
        scrollToListTop();
        return;
      }
      const nextPage = Number(raw);
      if (!Number.isFinite(nextPage) || nextPage < 1 || nextPage > totalPages) return;
      page = nextPage;
      render();
      scrollToListTop();
    });

    backTopBtn.addEventListener("click", () => {
      window.scrollTo({ top: 0, behavior: "smooth" });
    });

    window.addEventListener("scroll", () => {
      backTopBtn.classList.toggle("visible", window.scrollY > 320);
    }, { passive: true });

    listEl.addEventListener("click", (event) => {
      const button = event.target.closest("button[data-next]");
      if (button) {
        setStatus(button.dataset.id, button.dataset.next);
        return;
      }

      const card = event.target.closest("article.card[data-uid]");
      if (!card) return;
      const uid = card.dataset.uid;

      const poiBtn = event.target.closest("button[data-poi-action]");
      if (poiBtn) {
        const action = poiBtn.dataset.poiAction;
        if (action === "refresh") {
          const event = payload.events.find((item) => (item.eventUid || item.event_uid) === uid);
          const keyword = String(card.querySelector("[data-poi-keyword]")?.value || "").trim()
            || suggestPoiKeyword(event || {});
          applyPoi(uid, { refresh: true, candidates_only: true, keyword });
        }
        else if (action === "custom-search") searchPoiCustom(uid, card);
        return;
      }

      const previewBtn = event.target.closest("button[data-poi-preview-index]");
      if (previewBtn) {
        const list = poiPreviews[uid] || [];
        const poi = list[Number(previewBtn.dataset.poiPreviewIndex)];
        if (!poi) return;
        applyPoi(uid, {
          poi_id: poi.poi_id,
          title: poi.title,
          address: poi.address,
          latitude: poi.latitude,
          longitude: poi.longitude,
          candidates: list,
        });
        return;
      }

      const candBtn = event.target.closest("button[data-poi-index]");
      if (candBtn) {
        applyPoi(uid, { candidate_index: Number(candBtn.dataset.poiIndex) });
        return;
      }

      const importBtn = event.target.closest("button[data-import-uid]");
      if (importBtn && !importBtn.disabled) {
        importSingleEvent(importBtn.dataset.importUid);
        return;
      }

      const deleteBtn = event.target.closest("button[data-delete-buzz-uid]");
      if (deleteBtn) {
        deleteBuzzNow(deleteBtn.dataset.deleteBuzzUid, deleteBtn.dataset.deleteBuzzNowId);
      }
    });

    listEl.addEventListener("change", (event) => {
      const field = event.target.closest("[data-import-field]");
      if (!field) return;
      const card = field.closest("article.card[data-uid]");
      if (!card) return;
      if (field.dataset.importField !== "now_type") return;
      saveImportPrep(card.dataset.uid, { now_type: Number(field.value) });
    });

    listEl.addEventListener("blur", (event) => {
      const field = event.target.closest("[data-import-field='publish_user_id']");
      if (!field) return;
      const card = field.closest("article.card[data-uid]");
      if (!card) return;
      saveImportPrep(card.dataset.uid, { publish_user_id: field.value.trim() });
    }, true);

    listEl.addEventListener("input", (event) => {
      const input = event.target.closest("[data-poi-keyword]");
      if (!input) return;
      const card = input.closest("article.card[data-uid]");
      if (card) poiKeywords[card.dataset.uid] = input.value;
    });

    searchInput.addEventListener("input", (event) => {
      searchTerm = event.target.value.trim();
      resetPage();
      render();
    });

    document.getElementById("resetBtn").addEventListener("click", () => {
      void clearReviewDecisions();
    });

    document.getElementById("batchPrepBtn").addEventListener("click", runBatchPrep);
    document.getElementById("batchImportBtn").addEventListener("click", runBatchImport);

    document.getElementById("exportBtn").addEventListener("click", async () => {
      try {
        const response = await fetch("/api/export-import-nows?approved_only=1&ready_only=0", { cache: "no-store" });
        const data = await response.json();
        const records = data.nows || getApprovedEvents();
        document.getElementById("exportText").value = JSON.stringify(records, null, 2);
      } catch (error) {
        document.getElementById("exportText").value = JSON.stringify(getApprovedEvents(), null, 2);
      }
      document.getElementById("exportDialog").showModal();
    });

    Promise.all([loadEvents(), loadServerState()])
      .then(render)
      .catch((error) => {
        sourceMeta.textContent = "读取活动数据失败，请确认本地审核服务正在运行";
        setSaveState("未连接数据库，仅临时保存在当前浏览器", "error");
        listEl.innerHTML = `<div class="empty">活动数据加载失败</div>`;
        console.error(error);
      });
  </script>
</body>
</html>
