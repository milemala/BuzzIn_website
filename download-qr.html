    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            min-height: 100vh;
            display: grid;
            place-items: center;
            background: #050806;
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Helvetica Neue", Arial, sans-serif;
            color: #fff;
        }
        .poster {
            width: min(100vmin, 1080px);
            aspect-ratio: 1 / 1;
            display: grid;
            grid-template-rows: auto auto;
            place-items: center;
            align-content: center;
            gap: 6%;
            padding: 7.5%;
            position: relative;
            overflow: hidden;
            background:

                radial-gradient(circle at 82% 78%, rgba(46, 232, 194, .32), transparent 28%),
                radial-gradient(circle at 50% 50%, rgba(255,255,255,.06), transparent 48%),
                linear-gradient(145deg, #121917 0%, #07110f 56%, #12231f 100%);
        }
        .poster::before {
            display: none;
        }
        .top {
            display: grid;
            grid-template-columns: 24% minmax(0, 1fr);
            align-items: center;
            gap: 4.5%;
            z-index: 1;
            width: 92%;
            max-width: 820px;
            padding: 3.8%;
            border-radius: 28px;
            background: rgba(255,255,255,.11);
            box-shadow: 0 18px 48px rgba(0,0,0,.22);
            backdrop-filter: blur(18px);
        }
        .app-icon {
            width: 100%;
            aspect-ratio: 1 / 1;
            object-fit: cover;
            border-radius: 23%;
            display: block;
            box-shadow:
                0 16px 34px rgba(0,0,0,.38),
                inset 0 1px 0 rgba(255,255,255,.35),
                0 0 0 1px rgba(255,255,255,.2);
        }
        .app-copy {
            min-width: 0;
            display: grid;
            gap: clamp(4px, .8vmin, 9px);
        }
        .app-name {
            font-size: clamp(21px, 4.05vmin, 46px);
            font-weight: 900;
            line-height: 1.08;
            letter-spacing: 0;
            text-shadow: 0 8px 26px rgba(0,0,0,.35);
        }
        .app-subtitle {
            font-size: clamp(16px, 2.75vmin, 30px);
            font-weight: 700;
            line-height: 1.3;
            color: rgba(255,255,255,.78);
            letter-spacing: 0;
        }
        .qr-wrap {
            width: 67%;
            max-width: 660px;
            padding: 2.4%;
            border-radius: 6%;
            background: linear-gradient(180deg, #fff, #f4fbf8);
            box-shadow:
                0 26px 72px rgba(0,0,0,.38),
                0 0 0 8px rgba(255,255,255,.06);
            z-index: 1;
        }
        .qr-code {
            width: 100%;
            display: block;
        }
