package constat

var Tpl_H5_CyperPunk = `<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="color-scheme" content="dark" />
  <title>{{TITLE}}</title>
  <style>
    :root{
      --bg0:#0C0D0E;
      --bg1:#050607;
      --fg:#e9f2ff;
      --muted:#9db0d0;
      --accent:#6cf6e7;
      --accent2:#c28bff;
      --card:rgba(12, 16, 28, .78);
      --line:rgba(255,255,255,.07);
      --lineAccent:rgba(108,246,231,.14);
      --shadow: 0 24px 60px rgba(0,0,0,.55);
    }

    *{box-sizing:border-box;}
    html{height:100%;}
    body{
      margin:0;
      min-height:100vh;
      color:var(--fg);
      background:
        linear-gradient(180deg, var(--bg0) 0%, var(--bg1) 100%),
        radial-gradient(900px 700px at 15% 0%, rgba(108,246,231,.06), transparent 62%),
        radial-gradient(900px 700px at 85% -10%, rgba(194,139,255,.07), transparent 62%),
        repeating-linear-gradient(90deg, rgba(255,255,255,.018) 0px, rgba(255,255,255,.018) 1px, transparent 1px, transparent 12px),
        repeating-linear-gradient(0deg, rgba(255,255,255,.012) 0px, rgba(255,255,255,.012) 1px, transparent 1px, transparent 16px);
      background-attachment: fixed;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, "PingFang SC", "Noto Sans CJK SC", "Microsoft YaHei", sans-serif;
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
      overflow-x:hidden;
    }

    .scanlines::before{
      content:"";
      position:fixed;
      inset:0;
      pointer-events:none;
      background: repeating-linear-gradient(
        to bottom,
        rgba(255,255,255,.045) 0px,
        rgba(255,255,255,.045) 1px,
        transparent 2px,
        transparent 5px
      );
      mix-blend-mode: overlay;
      opacity:.10;
    }
    .noise::after{
      content:"";
      position:fixed;
      inset:-20px;
      pointer-events:none;
      background-image:
        radial-gradient(rgba(255,255,255,.08) 1px, transparent 1px);
      background-size: 3px 3px;
      opacity:.025;
      filter: blur(.2px);
      transform: translateZ(0);
    }

    .wrap{
      min-height:100vh;
      display:flex;
      flex-direction:column;
      justify-content:flex-start;
      padding: 18px 14px calc(24px + env(safe-area-inset-bottom));
    }

    .card{
      width: 100%;
      border-radius: 0;
      border: none;
      background: var(--card);
      box-shadow: var(--shadow);
      overflow: hidden;
      flex: 1 1 auto;
      display: flex;
      flex-direction: column;
    }
    .card::before{
      display: none;
    }
    .content{
      padding: 18px 16px 22px;
      flex: 1 1 auto;
    }

    .content h1,.content h2,.content h3{
      margin: 14px 0 10px;
      line-height: 1.22;
      letter-spacing: .02em;
    }
    .content h1{font-size: 22px;}
    .content h2{font-size: 18px;}
    .content h3{font-size: 16px;}

    .content p,.content li{line-height: 1.75; color: rgba(233,242,255,.92); font-size: 14.5px;}
    .content p{margin: 10px 0; white-space: pre-wrap;}
    .content ul,.content ol{padding-left: 20px; margin: 10px 0;}

    .content a{color: rgba(108,246,231,.92); text-decoration: none; border-bottom: 1px dashed rgba(108,246,231,.28);}
    .content a:active{opacity:.8;}

    .content img, .content video{max-width: 100%; height: auto; border-radius: 14px; display:block; margin: 12px auto; box-shadow: 0 10px 30px rgba(0,0,0,.45);}
    .content blockquote{
      margin: 12px 0;
      padding: 12px 12px;
      border-left: 3px solid rgba(194,139,255,.55);
      border-radius: 10px;
      background: rgba(194,139,255,.05);
      color: rgba(233,242,255,.90);
    }
    .content hr{border:none; height:1px; background: rgba(255,255,255,.10); margin: 14px 0;}

    .content pre{
      overflow:auto;
      padding: 12px 12px;
      border-radius: 14px;
      background: rgba(0,0,0,.40);
      border: 1px solid rgba(255,255,255,.10);
      box-shadow: 0 0 0 1px rgba(108,246,231,.06) inset;
    }
    .content code{font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace; font-size: 12.5px; color: rgba(233,242,255,.92);}

    .content table{width:100%; border-collapse: collapse; overflow:auto; display:block;}
    .content th,.content td{border:1px solid rgba(255,255,255,.10); padding: 10px 10px;}
    .content th{background: rgba(108,246,231,.06); text-align:left;}

    .footer{
      width: 100%;
      margin: 12px 0 0;
      padding: 10px 4px 0;
      color: rgba(157,176,208,.78);
      font-size: 12px;
      text-align:center;
      flex: 0 0 auto;
    }

    @media (min-width: 520px){
      .wrap{padding: 22px 18px calc(26px + env(safe-area-inset-bottom));}
      .content{padding: 20px 20px 26px;}
      .content h1{font-size: 26px;}
      .content p,.content li{font-size: 15px;}
    }
  </style>
</head>
<body class="scanlines noise">
  <div class="wrap">
    <div class="card">
      <div class="content">{{CONTENT}}</div>
    </div>
  </div>
</body>
</html>`
