<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<title>聊天列表 + 城市大群推荐位</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{
    --bg:#05070c;--panel:#0d1119;--line:#1a2333;
    --text:#f5f7ff;--sub:#9ca8c2;--mute:#7281a1;
    --pri:#ffe14f;--pri2:#ffef9a;--safe:env(safe-area-inset-bottom,0px);--top:env(safe-area-inset-top,0px)
}
body{
    font-family:-apple-system,"SF Pro Display","PingFang SC","Noto Sans SC",sans-serif;
    background:linear-gradient(180deg,#092039 0,#07172b 120px,var(--bg) 250px);
    color:var(--text);min-height:100vh;overflow-x:hidden
}
.page{max-width:430px;margin:0 auto;min-height:100vh;padding-bottom:calc(16px + var(--safe))}

.topbar{
    height:84px;display:flex;align-items:flex-end;justify-content:space-between;
    padding:calc(6px + var(--top)) 14px 10px
}
.logo{font-size:42px;font-weight:900;color:#ffd43f;letter-spacing:-1.2px;transform:skew(-8deg)}
.actions{display:flex;gap:10px}
.round-btn{
    width:34px;height:34px;border-radius:50%;border:1px solid #394666;background:rgba(16,25,41,.7);
    color:#d7e3ff;font-size:16px;display:flex;align-items:center;justify-content:center
}

.panel{
    margin:0 10px;background:var(--panel);border:1px solid #182131;border-radius:24px;
    box-shadow:0 16px 34px rgba(0,0,0,.45);overflow:hidden
}
.tabs{
    margin:14px;display:flex;gap:6px;padding:5px;background:#131a27;border-radius:999px;border:1px solid #212c42;
    overflow-x:auto;scrollbar-width:none
}
.tabs::-webkit-scrollbar{display:none}
.tab{
    flex:0 0 auto;min-width:108px;height:34px;border-radius:999px;display:flex;align-items:center;justify-content:center;gap:6px;
    font-size:13px;font-weight:700;color:#8f9bb8;padding:0 10px;white-space:nowrap
}
.tab.active{background:#2a2f3b;color:#f7f8ff}
.badge{
    min-width:17px;height:17px;border-radius:999px;background:#ff3b5f;color:#fff;font-size:10px;font-weight:800;
    display:inline-flex;align-items:center;justify-content:center;padding:0 5px
}

.recommend-wrap{padding:0 14px 12px}
.recommend{
    border:1px solid #4b4012;border-radius:14px;padding:12px;
    background:linear-gradient(90deg,rgba(255,225,79,.2),rgba(255,225,79,.08) 55%,rgba(255,225,79,.03));
    box-shadow:0 10px 20px rgba(0,0,0,.25)
}
.recommend-top{display:flex;justify-content:space-between;align-items:center}
.rec-tag{
    font-size:11px;font-weight:800;color:#2f2200;background:linear-gradient(90deg,var(--pri),var(--pri2));
    border-radius:999px;padding:3px 9px
}
.rec-city{font-size:11px;color:#ffeeb0}
.rec-title{margin-top:8px;font-size:16px;font-weight:900;color:#fff8d0}
.rec-desc{margin-top:4px;font-size:12px;color:#d0d8ea;line-height:1.45}
.rec-stats{margin-top:9px;display:flex;gap:7px;flex-wrap:wrap}
.chip{
    border:1px solid rgba(255,225,79,.42);color:#ffeeb0;background:rgba(255,225,79,.1);
    font-size:11px;padding:3px 8px;border-radius:999px
}
.rec-actions{margin-top:10px;display:flex;gap:8px}
.btn{
    flex:1;height:38px;border-radius:10px;border:1px solid #3a475f;background:#171f2f;color:#d9e5ff;font-weight:800;font-size:13px
}
.btn.primary{
    border-color:#d4b836;background:linear-gradient(90deg,var(--pri),var(--pri2));color:#241900
}

.list{padding:0 14px 4px}
.item{
    display:flex;gap:10px;padding:12px 0;border-bottom:1px solid #1b2435
}
.avatar{
    width:44px;height:44px;border-radius:50%;background:linear-gradient(135deg,#6882ff,#4bc7ff);flex:0 0 auto;
    border:1px solid rgba(255,255,255,.18)
}
.avatar.a2{background:linear-gradient(135deg,#f4b46a,#e17255)}
.avatar.a3{background:linear-gradient(135deg,#61d59f,#4aa2ff)}
.main{min-width:0;flex:1}
.row{display:flex;justify-content:space-between;gap:8px}
.name{font-size:20px;font-weight:800;color:#f2f6ff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.time{font-size:13px;color:#7483a4;flex:0 0 auto}
.msg{
    margin-top:6px;font-size:17px;color:#c6d0e8;line-height:1.35;
    white-space:nowrap;overflow:hidden;text-overflow:ellipsis
}

.hint{
    padding:12px 14px 16px;font-size:11px;color:#8392b2;line-height:1.5
}

@media (max-width:360px){
    .logo{font-size:38px}
    .panel{margin:0 8px}
    .name{font-size:18px}
    .msg{font-size:16px}
    .rec-actions{flex-direction:column}
    .btn{height:36px}
}
</style>
</head>
<body>
<div class="page">
    <header class="topbar">
        <div class="logo">Zup!</div>
        <div class="actions">
            <div class="round-btn">🎧</div>
            <div class="round-btn">＋</div>
        </div>
    </header>

    <section class="panel">
        <div class="tabs">
            <div class="tab active">🔔 聊天 <span class="badge">99+</span></div>
            <div class="tab">💬 评论点赞 <span class="badge">3</span></div>
            <div class="tab">🔉 系统消息</div>
        </div>

        <!-- 推荐位设计：放在 Tabs 下、聊天列表上方，不打断消息阅读，但足够显眼 -->
        <div class="recommend-wrap">
            <div class="recommend">
                <div class="recommend-top">
                    <span class="rec-tag">同城推荐</span>
                    <span class="rec-city">北京 · 当前城市</span>
                </div>
                <div class="rec-title">北京大群（官方同城群）</div>
                <p class="rec-desc">实时同城聊天、活动组局、临时搭子都在这。加入后可直接看到附近正在发生的热聊。</p>
                <div class="rec-stats">
                    <span class="chip">2.3万人在线</span>
                    <span class="chip">今日新增 186 条组局</span>
                    <span class="chip">响应更快</span>
                </div>
                <div class="rec-actions">
                    <button class="btn">暂不加入</button>
                    <button class="btn primary">一键加入并置顶</button>
                </div>
            </div>
        </div>

        <div class="list">
            <div class="item">
                <div class="avatar"></div>
                <div class="main">
                    <div class="row">
                        <div class="name">一二三四五六七八九</div>
                        <div class="time">18:23</div>
                    </div>
                    <div class="msg">遥想公瑾当年，小乔初嫁了，雄姿英发。</div>
                </div>
            </div>

            <div class="item">
                <div class="avatar a2"></div>
                <div class="main">
                    <div class="row">
                        <div class="name">北京A群</div>
                        <div class="time">18:23</div>
                    </div>
                    <div class="msg">刘优秀：转朱阁，低绮户，照无眠。不应恨，何事长向别时圆？</div>
                </div>
            </div>

            <div class="item">
                <div class="avatar a3"></div>
                <div class="main">
                    <div class="row">
                        <div class="name">爱喝酒就每天都想儿</div>
                        <div class="time">17:51</div>
                    </div>
                    <div class="msg">小啤酒带都：遥想公瑾当年，小乔初嫁了，雄姿英发。</div>
                </div>
            </div>
        </div>
        <div class="hint">设计说明：推荐位作为“单卡入口”只出现一次。用户点“暂不加入”后可在 7 天内不再展示。</div>
    </section>
</div>
</body>
</html>
