<!DOCTYPE html>
<!-- 视频邀约详情 v2 · Cursor 维护；备份见 invite-detail-video-v2.html -->
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<title>视频邀约详情</title>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
    --accent:#f5c542;
    --accent-dim:rgba(245,197,66,.18);
    --mint:#3dd6c3;
    --mint-dim:rgba(61,214,195,.15);
    --pink:#f472b6;
    --pink-dim:rgba(244,114,182,.2);
    --verified:#34d399;
    --text:#fff;
    --sub:rgba(255,255,255,.62);
    --dim:rgba(255,255,255,.38);
    --glass:rgba(12,12,12,.52);
    --glass-border:rgba(255,255,255,.1);
    --safe-t:max(12px,env(safe-area-inset-top));
    --safe-b:max(10px,env(safe-area-inset-bottom));
}
html,body{height:100%;overflow:hidden;background:#000}
body{
    font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","SF Pro Display",sans-serif;
    color:var(--text);-webkit-font-smoothing:antialiased;
}

/* ═══ 全屏视频层 ═══ */
.stage{position:fixed;inset:0;background:#0a0a0a}
.video-bg{position:absolute;inset:0}
.video-bg svg{width:100%;height:100%;object-fit:cover;display:block}
.scrim-top{
    position:absolute;left:0;right:0;top:0;height:32%;
    background:linear-gradient(180deg,rgba(0,0,0,.55) 0%,transparent 100%);
    pointer-events:none;
}
.scrim-bottom{
    position:absolute;left:0;right:0;bottom:0;height:58%;
    background:linear-gradient(0deg,rgba(0,0,0,.88) 0%,rgba(0,0,0,.45) 45%,transparent 100%);
    pointer-events:none;
}

/* ═══ 顶栏 ═══ */
.top{
    position:absolute;left:0;right:0;top:0;z-index:10;
    padding:var(--safe-t) 12px 0;
    display:flex;align-items:center;justify-content:space-between;gap:8px;
}
.top-left{display:flex;align-items:center;gap:8px;min-width:0}
.top-av{
    width:38px;height:38px;border-radius:50%;
    border:2px solid rgba(255,255,255,.25);
    background:linear-gradient(135deg,#8b5a3c,#4a3020);flex-shrink:0;
}
.top-map-chip{
    display:none;
    align-items:center;gap:4px;padding:5px 9px;border-radius:999px;
    background:var(--glass);backdrop-filter:blur(12px);
    border:1px solid var(--glass-border);font-size:11px;color:var(--sub);
}
@media (min-height:700px){.top-map-chip{display:inline-flex}}
.top-right{display:flex;align-items:center;gap:6px;flex-shrink:0}
.icon-btn{
    width:36px;height:36px;border-radius:50%;border:none;
    background:var(--glass);backdrop-filter:blur(12px);
    border:1px solid var(--glass-border);color:#fff;
    display:grid;place-items:center;cursor:pointer;
}
.icon-btn svg{width:20px;height:20px}
.icon-btn.wide{width:auto;padding:0 12px;border-radius:999px;font:inherit;font-size:12px;font-weight:600;display:inline-flex;align-items:center;gap:5px}

/* 视频上：时间 / 导航 */
.float-chips{
    position:absolute;left:12px;right:72px;top:calc(var(--safe-t) + 52px);z-index:9;
    display:flex;flex-wrap:wrap;gap:6px;
}
.chip{
    display:inline-flex;align-items:center;gap:4px;
    padding:5px 10px;border-radius:999px;
    background:var(--glass);backdrop-filter:blur(14px);
    border:1px solid var(--glass-border);
    font-size:12px;font-weight:600;
}
.chip svg{width:14px;height:14px;flex-shrink:0}
.chip.time svg{color:var(--accent)}
.chip.price{
    flex-direction:column;align-items:flex-start;gap:2px;
    padding:8px 12px;border-color:rgba(245,197,66,.25);
    background:rgba(0,0,0,.55);
}
.chip-price{font-size:20px;font-weight:800;color:var(--accent);line-height:1;letter-spacing:-.3px}
.chip-price small{font-size:13px;font-weight:700}
.chip-promo{font-size:10px;font-weight:700;color:var(--pink);background:var(--pink-dim);padding:2px 6px;border-radius:999px}

/* ═══ 右侧互动轨 ═══ */
.rail{
    position:absolute;right:10px;bottom:calc(148px + var(--safe-b));z-index:12;
    display:flex;flex-direction:column;align-items:center;gap:18px;
}
.rail-item{
    display:flex;flex-direction:column;align-items:center;gap:4px;
    border:none;background:none;color:#fff;cursor:pointer;
    font:inherit;font-size:11px;font-weight:600;
}
.rail-icon{
    width:46px;height:46px;border-radius:50%;
    background:var(--glass);backdrop-filter:blur(12px);
    border:1px solid var(--glass-border);
    display:grid;place-items:center;
}
.rail-icon svg{width:24px;height:24px}
.rail-item.like .rail-icon svg{color:#f87171;fill:#f87171;stroke:none}

/* ═══ 左下信息区 ═══ */
.info{
    position:absolute;left:12px;right:68px;bottom:calc(54px + var(--safe-b));z-index:11;
    display:flex;flex-direction:column;gap:10px;
}
.info-author{display:flex;align-items:center;gap:9px}
.info-name{font-size:16px;font-weight:800;letter-spacing:-.2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:52vw}
.info-venue{
    display:inline-flex;align-items:center;gap:3px;margin-top:2px;
    font-size:12px;font-weight:600;color:var(--verified);
}
.info-venue svg{width:12px;height:12px}

/* 报名 / 签到 紧凑条 */
.action-strip{
    display:flex;gap:8px;align-items:stretch;
}
.action-pill{
    flex:1;min-width:0;padding:8px 10px;border-radius:12px;
    background:var(--glass);backdrop-filter:blur(14px);
    border:1px solid var(--glass-border);
}
.action-pill-head{display:flex;align-items:center;justify-content:space-between;gap:4px;margin-bottom:4px}
.action-pill-label{font-size:10px;font-weight:700;color:var(--sub);text-transform:uppercase;letter-spacing:.03em}
.action-pill-val{font-size:13px;font-weight:800}
.action-pill-sub{font-size:10px;color:var(--dim);margin-top:2px}
.action-pill-btn{
    margin-top:6px;width:100%;height:28px;border:none;border-radius:8px;
    font:inherit;font-size:12px;font-weight:800;cursor:pointer;
}
.action-pill-btn.primary{background:var(--accent);color:#111}
.action-pill-btn.mint{background:var(--mint-dim);color:var(--mint);border:1px solid rgba(61,214,195,.25)}
.action-pill-btn.ghost{background:rgba(255,255,255,.08);color:var(--dim)}

.loc-pill{
    display:flex;align-items:center;gap:8px;padding:9px 11px;
    border-radius:12px;background:var(--glass);backdrop-filter:blur(14px);
    border:1px solid var(--glass-border);cursor:pointer;
}
.loc-pill:active{opacity:.9}
.loc-pill svg.loc-pin{width:16px;height:16px;color:var(--accent);flex-shrink:0}
.loc-text{flex:1;min-width:0;font-size:13px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.loc-meta{font-size:11px;color:var(--sub);margin-top:2px;display:flex;align-items:center;gap:6px}
.loc-verified{width:14px;height:14px;border-radius:50%;background:var(--verified);display:inline-grid;place-items:center}
.loc-verified svg{width:8px;height:8px;color:#fff}
.loc-dist{font-size:12px;font-weight:700;color:var(--accent);flex-shrink:0}

.desc-block{font-size:14px;line-height:1.55;color:rgba(255,255,255,.9)}
.desc-block.collapsed{
    display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;
}
.desc-expand{
    align-self:flex-start;margin-top:-4px;
    border:none;background:none;font:inherit;
    font-size:12px;font-weight:700;color:var(--accent);cursor:pointer;padding:0;
}

.group-row{
    display:flex;align-items:center;gap:8px;padding:8px 10px;
    border-radius:12px;background:rgba(255,255,255,.08);
    border:1px solid var(--glass-border);cursor:pointer;
}
.group-row svg{width:16px;height:16px;color:var(--sub);flex-shrink:0}
.group-row span{font-size:13px;font-weight:600;flex:1}
.group-av{display:flex}
.group-av i{width:20px;height:20px;border-radius:50%;margin-left:-6px;border:1.5px solid rgba(0,0,0,.5);background:#555}
.group-av i:first-child{margin-left:0}

/* 播放进度 */
.progress{
    position:absolute;left:12px;right:12px;bottom:calc(46px + var(--safe-b));z-index:13;
    height:3px;border-radius:2px;background:rgba(255,255,255,.2);overflow:hidden;
}
.progress>span{display:block;height:100%;width:35%;border-radius:2px;background:#fff}

/* ═══ 底栏 ═══ */
.composer{
    position:absolute;left:0;right:0;bottom:0;z-index:14;
    padding:6px 12px var(--safe-b);
    display:flex;align-items:center;gap:8px;
}
.comp-av{width:32px;height:32px;border-radius:50%;background:linear-gradient(135deg,#666,#333);flex-shrink:0;border:1px solid rgba(255,255,255,.15)}
.comp-field{
    flex:1;height:36px;border-radius:18px;
    background:var(--glass);backdrop-filter:blur(12px);
    border:1px solid var(--glass-border);
    padding:0 14px;font-size:14px;color:var(--dim);
    display:flex;align-items:center;
}

/* ═══ 报名 Bottom Sheet（替代居中弹窗） ═══ */
.sheet-dim{
    position:absolute;inset:0;z-index:20;
    background:rgba(0,0,0,.4);
    opacity:0;pointer-events:none;transition:opacity .25s;
}
.sheet-dim.on{opacity:1;pointer-events:auto}

.signup-sheet{
    position:absolute;left:0;right:0;bottom:0;z-index:21;
    padding:0 16px calc(16px + var(--safe-b));
    transform:translateY(110%);transition:transform .32s cubic-bezier(.32,.72,0,1);
}
.signup-sheet.on{transform:translateY(0)}
.sheet-panel{
    background:#1a1a1a;border:1px solid var(--glass-border);
    border-radius:20px 20px 16px 16px;padding:18px 16px 14px;
    box-shadow:0 -8px 40px rgba(0,0,0,.5);
}
.sheet-handle{width:36px;height:4px;border-radius:2px;background:rgba(255,255,255,.2);margin:0 auto 14px}
.sheet-title{font-size:17px;font-weight:800;text-align:center;margin-bottom:14px}
.sheet-agree{
    display:flex;align-items:flex-start;gap:10px;
    font-size:13px;line-height:1.5;color:var(--sub);margin-bottom:16px;
}
.sheet-agree input{margin-top:3px;accent-color:var(--accent);width:16px;height:16px;flex-shrink:0}
.sheet-agree a{color:#7eb8ff;text-decoration:none}
.sheet-foot{display:flex;align-items:center;gap:12px}
.sheet-price{font-size:24px;font-weight:800;color:var(--accent);flex-shrink:0}
.sheet-price small{font-size:14px}
.sheet-cta{
    flex:1;height:48px;border:none;border-radius:14px;
    background:var(--accent);color:#111;
    font:inherit;font-size:16px;font-weight:800;cursor:pointer;
}
.sheet-cta:disabled{opacity:.45;cursor:not-allowed}

/* 演示：切换 sheet */
.demo-toggle{
    position:absolute;left:50%;transform:translateX(-50%);
    top:calc(var(--safe-t) + 8px);z-index:30;
    padding:4px 10px;border-radius:999px;border:1px solid var(--glass-border);
    background:rgba(0,0,0,.6);color:var(--sub);
    font:inherit;font-size:10px;cursor:pointer;
}
</style>
</head>
<body>

<div class="stage" id="stage">
    <!-- 视频背景 -->
    <div class="video-bg" aria-hidden="true">
        <svg viewBox="0 0 390 844" preserveAspectRatio="xMidYMid slice" xmlns="http://www.w3.org/2000/svg">
            <defs>
                <linearGradient id="vg" x1="0" y1="0" x2="0" y2="1">
                    <stop offset="0" stop-color="#3d2a1f"/>
                    <stop offset=".45" stop-color="#2a1810"/>
                    <stop offset="1" stop-color="#0f0a08"/>
                </linearGradient>
                <radialGradient id="warm" cx=".5" cy=".42" r=".5">
                    <stop offset="0" stop-color="rgba(255,160,80,.25)"/>
                    <stop offset="1" stop-color="transparent"/>
                </radialGradient>
            </defs>
            <rect width="390" height="844" fill="url(#vg)"/>
            <rect width="390" height="844" fill="url(#warm)"/>
            <!-- 餐桌场景暗示 -->
            <ellipse cx="195" cy="480" rx="140" ry="50" fill="rgba(0,0,0,.35)"/>
            <circle cx="120" cy="420" r="28" fill="rgba(255,200,120,.12)"/>
            <circle cx="270" cy="400" r="22" fill="rgba(255,200,120,.1)"/>
            <circle cx="195" cy="380" r="35" fill="rgba(255,200,120,.08)"/>
            <text x="195" y="560" text-anchor="middle" fill="rgba(255,255,255,.15)" font-size="13" font-family="sans-serif">视频内容区</text>
        </svg>
    </div>
    <div class="scrim-top"></div>
    <div class="scrim-bottom"></div>

    <!-- 演示：切换报名 sheet -->
    <button type="button" class="demo-toggle" id="toggleSheet" aria-pressed="false">演示：报名弹层</button>

    <!-- 顶栏 -->
    <header class="top">
        <div class="top-left">
            <div class="top-av" role="img" aria-label="发布者"></div>
            <span class="top-map-chip">
                <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0118 0z"/></svg>
                九龙商厦
            </span>
        </div>
        <div class="top-right">
            <button type="button" class="icon-btn wide" aria-label="更多">
                <svg viewBox="0 0 24 24" fill="currentColor"><circle cx="5" cy="12" r="2"/><circle cx="12" cy="12" r="2"/><circle cx="19" cy="12" r="2"/></svg>
            </button>
            <button type="button" class="icon-btn" aria-label="关闭">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M18 6L6 18M6 6l12 12"/></svg>
            </button>
        </div>
    </header>

    <!-- 时间 / 价格 / 导航 -->
    <div class="float-chips">
        <span class="chip time">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
            今天 18:32
        </span>
        <span class="chip price">
            <span class="chip-price"><small>¥</small>19.9</span>
            <span class="chip-promo">女士优惠 减 ¥10</span>
        </span>
        <span class="chip">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="3 11 22 2 13 21 11 13 3 11"/></svg>
            导航
        </span>
        <span class="chip">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0118 0z"/><circle cx="12" cy="10" r="3"/></svg>
            位置
        </span>
    </div>

    <!-- 右侧互动 -->
    <aside class="rail" aria-label="互动">
        <button type="button" class="rail-item like" aria-label="点赞 23">
            <span class="rail-icon"><svg viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="M20.84 4.61a5.5 5.5 0 00-7.78 0L12 5.67l-1.06-1.06A5.5 5.5 0 003.16 12.4L12 21.23l8.84-8.83a5.5 5.5 0 000-7.79z"/></svg></span>
            23
        </button>
        <button type="button" class="rail-item" aria-label="评论 23">
            <span class="rail-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 11.5a8.38 8.38 0 01-.9 3.8 8.5 8.5 0 01-7.6 4.7 8.38 8.38 0 01-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 01-.9-3.8 8.5 8.5 0 014.7-7.6 8.38 8.38 0 013.8-.9h.5a8.48 8.48 0 018 8v.5z"/></svg></span>
            23
        </button>
        <button type="button" class="rail-item" aria-label="分享">
            <span class="rail-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 12v8a2 2 0 002 2h12a2 2 0 002-2v-8"/><polyline points="16 6 12 2 8 6"/><line x1="12" y1="2" x2="12" y2="15"/></svg></span>
            分享
        </button>
    </aside>

    <!-- 左下信息 -->
    <div class="info">
        <div class="info-author">
            <div>
                <div class="info-name">一二三四五六七八九十</div>
                <span class="info-venue">
                    <svg viewBox="0 0 24 24" fill="currentColor"><rect x="2" y="2" width="20" height="20" rx="5"/><path d="M7 12l3 3 7-7" fill="none" stroke="#fff" stroke-width="2.2" stroke-linecap="round"/></svg>
                    跳海酒馆 · 三元桥店
                </span>
            </div>
        </div>

        <div class="action-strip">
            <div class="action-pill">
                <div class="action-pill-head">
                    <span class="action-pill-label">报名</span>
                    <span class="action-pill-val">22/99+</span>
                </div>
                <div class="action-pill-sub">♂22 · ♀22</div>
                <button type="button" class="action-pill-btn primary" id="openSheet">立即报名</button>
            </div>
            <div class="action-pill">
                <div class="action-pill-head">
                    <span class="action-pill-label">签到</span>
                    <span class="action-pill-val">0 人</span>
                </div>
                <div class="action-pill-sub">还没有人签到</div>
                <button type="button" class="action-pill-btn ghost" disabled>到店可签</button>
            </div>
        </div>

        <div class="loc-pill">
            <svg class="loc-pin" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0118 0z"/><circle cx="12" cy="10" r="3"/></svg>
            <div style="flex:1;min-width:0">
                <div class="loc-text">沁·叁拾壹书院（香山清琴店）</div>
                <div class="loc-meta">
                    <span class="loc-verified"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><polyline points="20 6 9 17 4 12"/></svg></span>
                    认证商户
                </div>
            </div>
            <span class="loc-dist">800m</span>
        </div>

        <p class="desc-block collapsed" id="desc">遥想公瑾当年，小乔初嫁了但是房山窦店沙发。羽扇纶巾谈笑间，樯橹灰飞烟灭。</p>
        <button type="button" class="desc-expand" id="expandDesc">展开</button>

        <div class="group-row">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 00-3-3.87M16 3.13a4 4 0 010 7.75"/></svg>
            <span>加入群聊（32）</span>
            <div class="group-av" aria-hidden="true"><i></i><i></i><i></i></div>
        </div>
    </div>

  <div class="progress" aria-hidden="true"><span></span></div>

    <footer class="composer">
        <div class="comp-av" role="img" aria-label="我的头像"></div>
        <div class="comp-field">说点什么…</div>
    </footer>

    <!-- 报名 Bottom Sheet -->
    <div class="sheet-dim" id="sheetDim" aria-hidden="true"></div>
    <div class="signup-sheet" id="signupSheet" role="dialog" aria-labelledby="sheetTitle" aria-modal="true" aria-hidden="true">
        <div class="sheet-panel">
            <div class="sheet-handle"></div>
            <h2 class="sheet-title" id="sheetTitle">确认报名此邀约？</h2>
            <label class="sheet-agree">
                <input type="checkbox" id="agreeCheck">
                <span>我已阅读并同意 <a href="#">《免责声明》</a></span>
            </label>
            <div class="sheet-foot">
                <div class="sheet-price"><small>¥</small>29.00</div>
                <button type="button" class="sheet-cta" id="sheetCta" disabled>报名</button>
            </div>
        </div>
    </div>
</div>

<script>
(function(){
    var sheetOn=false;
    var dim=document.getElementById('sheetDim');
    var sheet=document.getElementById('signupSheet');
    var toggle=document.getElementById('toggleSheet');
    var openBtn=document.getElementById('openSheet');
    var agree=document.getElementById('agreeCheck');
    var cta=document.getElementById('sheetCta');

    function setSheet(on){
        sheetOn=on;
        dim.classList.toggle('on',on);
        sheet.classList.toggle('on',on);
        sheet.setAttribute('aria-hidden',on?'false':'true');
        dim.setAttribute('aria-hidden',on?'false':'true');
        toggle.setAttribute('aria-pressed',on?'true':'false');
        toggle.textContent=on?'关闭报名弹层':'演示：报名弹层';
    }
    toggle.addEventListener('click',function(){setSheet(!sheetOn);});
    openBtn.addEventListener('click',function(){setSheet(true);});
    dim.addEventListener('click',function(){setSheet(false);});
    agree.addEventListener('change',function(){cta.disabled=!agree.checked;});

    var desc=document.getElementById('desc');
    var expand=document.getElementById('expandDesc');
    expand.addEventListener('click',function(){
        var collapsed=desc.classList.toggle('collapsed');
        expand.textContent=collapsed?'展开':'收起';
    });
})();
</script>
</body>
</html>
