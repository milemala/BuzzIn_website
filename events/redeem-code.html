<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>兑换码</title>
<style>
/* 配色与 publish-now.html 一致 */
*{margin:0;padding:0;box-sizing:border-box}
:root{
    --yellow:#f5c542;
    --yellow-bg:rgba(245,197,66,.12);
    --green:#07c160;
    --green-bg:rgba(7,193,96,.1);
    --red:#ef4444;
    --blue:#3b82f6;
    --bg:#111;
    --card:#1a1a1a;
    --card2:#222;
    --text:#fff;
    --sub:rgba(255,255,255,.45);
    --dim:rgba(255,255,255,.25);
    --border:rgba(255,255,255,.08);
    --r:14px;
}
body{font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","Helvetica Neue",sans-serif;background:var(--bg);color:var(--text);min-height:100vh;-webkit-font-smoothing:antialiased;padding-bottom:88px}

/* ═══ 导航（同 publish-now） ═══ */
.nav{position:sticky;top:0;z-index:50;display:flex;align-items:center;padding:12px 16px;padding-top:max(env(safe-area-inset-top),12px);background:rgba(17,17,17,.9);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px)}
.nav-back{width:36px;height:36px;border-radius:50%;border:none;background:rgba(255,255,255,.08);display:grid;place-items:center;cursor:pointer;color:#fff;flex-shrink:0}
.nav-back:active{background:rgba(255,255,255,.15)}
.nav-back svg{width:20px;height:20px}
.nav-title{flex:1;text-align:center;font-size:17px;font-weight:600;letter-spacing:.3px;margin-right:36px}

/* ═══ 商品信息 ═══ */
.product{margin:16px;padding:16px;background:var(--card);border:1px solid var(--border);border-radius:var(--r);display:flex;gap:14px;align-items:center}
.product-icon{width:48px;height:48px;border-radius:12px;background:linear-gradient(135deg,var(--yellow),#c9a227);display:grid;place-items:center;flex-shrink:0}
.product-icon svg{width:24px;height:24px;color:#111}
.product-info{flex:1;min-width:0}
.product-name{font-size:15px;font-weight:700;margin-bottom:3px}
.product-meta{font-size:12px;color:var(--sub)}

/* ═══ 进度 ═══ */
.progress{margin:0 16px 20px}
.progress-top{display:flex;align-items:baseline;justify-content:space-between;margin-bottom:10px}
.progress-label{font-size:14px;font-weight:600}
.progress-num{font-size:13px;font-weight:700}
.progress-num em{font-style:normal;color:var(--yellow);font-size:18px}
.progress-bar{height:8px;background:var(--card2);border-radius:4px;overflow:hidden}
.progress-fill{height:100%;border-radius:4px;transition:width .5s ease}
.progress-fill.partial{background:linear-gradient(90deg,var(--yellow),#e8c547)}
.progress-fill.done{background:linear-gradient(90deg,var(--green),#34d399)}

/* ═══ 当前二维码 ═══ */
.qr-area{margin:0 16px 24px;text-align:center}
.qr-card{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:28px 24px 22px}
.qr-remain{display:inline-block;font-size:12px;font-weight:600;padding:4px 14px;border-radius:20px;margin-bottom:16px;background:var(--yellow-bg);color:var(--yellow)}
.qr-wrap{width:200px;height:200px;margin:0 auto 16px;background:#fff;border-radius:14px;padding:12px;display:grid;place-items:center}
.qr-wrap canvas{width:100%;height:100%}
.qr-id-label{font-size:12px;color:var(--sub);margin-bottom:2px}
.qr-id{font-size:16px;font-weight:700;font-family:monospace;letter-spacing:1.5px;color:var(--yellow)}
.qr-tip{margin-top:14px;font-size:12px;color:var(--dim);line-height:1.6}

/* 全部完成 */
.qr-done{padding:36px 24px}
.qr-done-icon{width:72px;height:72px;border-radius:50%;background:var(--yellow-bg);margin:0 auto 14px;display:grid;place-items:center}
.qr-done-icon svg{width:36px;height:36px;color:var(--yellow)}
.qr-done h3{font-size:17px;font-weight:700;color:var(--yellow);margin-bottom:6px}
.qr-done p{font-size:13px;color:var(--sub);line-height:1.5}

/* ═══ 核销记录 ═══ */
.records{margin:0 16px 20px}
.records-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.records-title{font-size:14px;font-weight:600}
.records-count{font-size:11px;color:var(--sub);background:var(--card2);padding:3px 10px;border-radius:20px;border:1px solid var(--border)}
.record-empty{text-align:center;padding:28px 0;color:var(--dim);font-size:13px}

.record{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:14px 16px;margin-bottom:8px}
.record-top{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.record-idx{width:24px;height:24px;border-radius:7px;background:var(--green-bg);color:var(--green);font-size:11px;font-weight:800;display:grid;place-items:center;flex-shrink:0}
.record-venue{font-size:14px;font-weight:600;flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.record-tag{font-size:10px;font-weight:600;padding:2px 8px;border-radius:5px;background:var(--green-bg);color:var(--green)}
.record-rows{display:grid;grid-template-columns:1fr 1fr;gap:6px}
.record-row{display:flex;flex-direction:column;gap:1px;padding:6px 10px;background:var(--card2);border-radius:8px}
.record-row.full{grid-column:1/-1}
.record-k{font-size:11px;color:var(--dim)}
.record-v{font-size:12px;font-weight:600}

/* ═══ 有效期 ═══ */
.validity{margin:0 16px 20px;padding:12px 16px;background:var(--card);border:1px solid var(--border);border-radius:12px;display:flex;align-items:center;gap:10px}
.validity svg{width:16px;height:16px;color:var(--sub);flex-shrink:0}
.validity span{font-size:12px;color:var(--sub);line-height:1.4}

/* ═══ 演示栏（主强调黄 / 模拟操作用绿） ═══ */
.demo{position:fixed;bottom:0;left:0;right:0;display:flex;gap:8px;padding:12px 16px;padding-bottom:max(env(safe-area-inset-bottom),12px);z-index:30;background:linear-gradient(transparent,var(--bg) 30%)}
.demo button{flex:1;height:42px;border-radius:12px;border:1px solid var(--border);background:var(--card);color:var(--text);font-size:12px;font-weight:600;font-family:inherit;cursor:pointer;transition:all .15s}
.demo button:active{transform:scale(.97)}
.demo button.on{border-color:var(--yellow);background:var(--yellow);color:#111}
.demo button.sim{border-color:var(--green);background:var(--green);color:#fff;flex:none;padding:0 14px}
</style>
</head>
<body>

<div class="nav">
    <button class="nav-back" onclick="history.back()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
    </button>
    <span class="nav-title">兑换码</span>
</div>

<div class="product">
    <div class="product-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0118 0z"/><circle cx="12" cy="10" r="3"/></svg>
    </div>
    <div class="product-info">
        <div class="product-name">三里屯微醺之旅</div>
        <div class="product-meta">订单 BM20260314001 · 共 6 次核销权益</div>
    </div>
</div>

<div class="progress">
    <div class="progress-top">
        <span class="progress-label">核销进度</span>
        <span class="progress-num" id="pNum"></span>
    </div>
    <div class="progress-bar"><div class="progress-fill" id="pFill"></div></div>
</div>

<div class="qr-area" id="qrArea"></div>

<div class="records">
    <div class="records-head">
        <span class="records-title">核销记录</span>
        <span class="records-count" id="rCount"></span>
    </div>
    <div id="rList"></div>
</div>

<div class="validity">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
    <span>有效期：2026.03.01 — 2026.06.30，过期后未使用的权益不退不补</span>
</div>

<div class="demo">
    <button onclick="go(0)">0次</button>
    <button class="on" onclick="go(1)">2次</button>
    <button onclick="go(2)">5次</button>
    <button onclick="go(3)">6次(满)</button>
    <button class="sim" onclick="simulate()">模拟核销 ▶</button>
</div>

<script>
var TOTAL = 6;

var HISTORY = [
    { venue:"八荒·MIDBAR",      drink:"Old Fashioned",    time:"2026-03-14 20:15", code:"X7K9M2" },
    { venue:"蓝境酒馆",          drink:"蓝境之夜",         time:"2026-03-14 22:40", code:"P3F8W1" },
    { venue:"Hye! Bar",         drink:"柚子清酒特调",      time:"2026-03-15 19:30", code:"D5N2J6" },
    { venue:"八荒·Hutong Lab",   drink:"胡同日落",         time:"2026-03-15 21:05", code:"R8C4T9" },
    { venue:"奇点·宇宙客厅",     drink:"黑洞拿铁特调",     time:"2026-03-16 20:50", code:"Q1V7L3" },
    { venue:"微醺九号",          drink:"微醺特调",         time:"2026-03-16 23:10", code:"H6B0Y5" }
];

var CURRENT_CODES = ["A4G8N2","J2M5X7","T9R3K6","W1P8C4","E9H3U7","B5Q2F8","N6Y1V4"];

var SCENES = [0, 2, 5, 6];
var simCount = 2;

function drawQR(canvas, seed){
    var ctx=canvas.getContext("2d"), s=canvas.width, cs=Math.floor(s/25);
    ctx.fillStyle="#fff"; ctx.fillRect(0,0,s,s); ctx.fillStyle="#111";
    function fp(ox,oy){for(var r=0;r<7;r++)for(var c=0;c<7;c++)if(r===0||r===6||c===0||c===6||(r>=2&&r<=4&&c>=2&&c<=4))ctx.fillRect((ox+c)*cs,(oy+r)*cs,cs,cs);}
    fp(0,0);fp(s/cs-7,0);fp(0,s/cs-7);
    var sd=seed||42;
    function rng(){sd=(sd*1103515245+12345)&0x7fffffff;return sd/0x7fffffff;}
    var n=Math.floor(s/cs);
    for(var r=0;r<n;r++)for(var c=0;c<n;c++){if((r<9&&c<9)||(r<9&&c>n-9)||(r>n-9&&c<9))continue;if(rng()>.55)ctx.fillRect(c*cs,r*cs,cs,cs);}
}

function renderPage(used){
    var remain = TOTAL - used;
    var allDone = remain <= 0;

    document.getElementById("pNum").innerHTML = '<em>'+used+'</em> / '+TOTAL;
    var pf = document.getElementById("pFill");
    pf.className = "progress-fill "+(allDone?"done":"partial");
    pf.style.width = Math.round(used/TOTAL*100)+"%";

    var qa = document.getElementById("qrArea");
    if(allDone){
        qa.innerHTML =
            '<div class="qr-card qr-done">'+
                '<div class="qr-done-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M22 11.08V12a10 10 0 11-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg></div>'+
                '<h3>已全部核销</h3>'+
                '<p>6 次权益已全部使用完毕<br>感谢参与，期待下次再见</p>'+
            '</div>';
    } else {
        var curCode = CURRENT_CODES[used] || "A4G8N2";
        qa.innerHTML =
            '<div class="qr-card">'+
                '<div class="qr-remain">剩余 '+remain+' 次可用</div>'+
                '<div class="qr-wrap"><canvas id="qrCvs" width="400" height="400"></canvas></div>'+
                '<div class="qr-id-label">当前兑换码</div>'+
                '<div class="qr-id">'+curCode+'</div>'+
                '<div class="qr-tip">到任意参与酒馆，向店员出示此码兑换一杯<br>核销后此码失效，将自动生成新码</div>'+
            '</div>';
        drawQR(document.getElementById("qrCvs"), used*137+42);
    }

    document.getElementById("rCount").textContent = used ? used+" 条" : "暂无";
    var rl = document.getElementById("rList");
    if(!used){
        rl.innerHTML = '<div class="record-empty">还没有核销记录，快去探店吧</div>';
        return;
    }
    var html = "";
    for(var i=used-1; i>=0; i--){
        var r = HISTORY[i];
        html +=
            '<div class="record">'+
                '<div class="record-top">'+
                    '<div class="record-idx">'+(i+1)+'</div>'+
                    '<div class="record-venue">'+r.venue+'</div>'+
                    '<span class="record-tag">已核销</span>'+
                '</div>'+
                '<div class="record-rows">'+
                    '<div class="record-row"><span class="record-k">核销码</span><span class="record-v" style="font-family:monospace;letter-spacing:1px">'+r.code+'</span></div>'+
                    '<div class="record-row"><span class="record-k">核销时间</span><span class="record-v">'+r.time+'</span></div>'+
                '</div>'+
            '</div>';
    }
    rl.innerHTML = html;
}

function go(idx){
    document.querySelectorAll(".demo button:not(.sim)").forEach(function(b,i){b.classList.toggle("on",i===idx);});
    simCount = SCENES[idx];
    renderPage(simCount);
}

function simulate(){
    if(simCount >= TOTAL){ alert("已经全部核销完毕啦"); return; }
    simCount++;
    document.querySelectorAll(".demo button:not(.sim)").forEach(function(b){b.classList.remove("on");});
    renderPage(simCount);
}

go(1);
</script>
</body>
</html>
