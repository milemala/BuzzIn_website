<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<title>视频 NOW 详情页设计稿</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#050606;
  --text:#fffaf0;
  --muted:rgba(255,250,240,.68);
  --dim:rgba(255,250,240,.42);
  --glass:rgba(8,10,10,.46);
  --glass-strong:rgba(8,10,10,.66);
  --line:rgba(255,255,255,.12);
  --gold:#ffd94d;
  --gold-soft:rgba(255,217,77,.18);
  --mint:#32e6c6;
  --mint-soft:rgba(50,230,198,.18);
  --rose:#ff9aba;
}
html,body{height:100%;overflow:hidden;background:#111;color:var(--text)}
body{font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","SF Pro Display","Helvetica Neue",Arial,sans-serif;-webkit-font-smoothing:antialiased}
button{font:inherit;color:inherit}
.phone{position:relative;width:100%;max-width:430px;height:100%;margin:0 auto;background:var(--bg);overflow:hidden}

.video{position:absolute;inset:0;background:#15120f}
.video img{width:100%;height:100%;object-fit:cover;filter:saturate(.92) contrast(1.02) brightness(.72);transform:scale(1.04)}
.video::before{content:"";position:absolute;inset:0;background:
  linear-gradient(180deg,rgba(5,6,6,.62) 0%,rgba(5,6,6,.18) 24%,rgba(5,6,6,.08) 46%,rgba(5,6,6,.82) 84%,rgba(5,6,6,.98) 100%),
  radial-gradient(circle at 18% 38%,rgba(255,217,77,.14),transparent 30%)}
.video::after{content:"";position:absolute;inset:0;background:linear-gradient(90deg,rgba(0,0,0,.12),transparent 18%,transparent 82%,rgba(0,0,0,.18))}

.status{position:absolute;left:0;right:0;top:0;z-index:5;height:44px;padding:10px 22px 0;display:flex;justify-content:space-between;align-items:center;font-size:16px;font-weight:900;text-shadow:0 1px 12px rgba(0,0,0,.5)}
.sys-icons{display:flex;align-items:center;gap:7px}
.signal{display:flex;gap:3px;align-items:flex-end}.signal i{width:3px;border-radius:2px;background:#fff}.signal i:nth-child(1){height:6px}.signal i:nth-child(2){height:9px}.signal i:nth-child(3){height:12px}.signal i:nth-child(4){height:15px}
.wifi{width:18px;height:13px;border:3px solid #fff;border-color:#fff transparent transparent;border-radius:50%;transform:translateY(4px)}
.battery{width:25px;height:13px;border:2px solid #fff;border-radius:4px;position:relative}.battery::after{content:"";position:absolute;right:-5px;top:3px;width:3px;height:5px;border-radius:2px;background:#fff}.battery i{display:block;width:17px;height:100%;background:#fff;border-radius:2px}

.map-strip{position:absolute;left:0;right:0;top:0;height:176px;z-index:1;pointer-events:none;opacity:.9}
.map-strip svg{width:100%;height:100%;display:block}
.map-strip::after{content:"";position:absolute;inset:0;background:linear-gradient(180deg,rgba(18,27,39,.18),rgba(5,6,6,.72) 78%,rgba(5,6,6,0))}
.map-items{position:absolute;left:18px;right:18px;top:54px;z-index:6;display:flex;align-items:flex-start;justify-content:space-between;pointer-events:auto}
.pin{display:flex;align-items:flex-end}.pin-avatar{width:45px;height:45px;border-radius:50%;border:2px solid rgba(255,255,255,.75);background:url("../images/event/flower.png") center/cover;box-shadow:0 8px 26px rgba(0,0,0,.34)}.pin-x{width:29px;height:29px;margin-left:-8px;border-radius:50%;display:grid;place-items:center;background:rgba(126,172,207,.9);border:2px solid rgba(255,255,255,.55)}.pin-x svg{width:16px;height:16px}
.mini{height:39px;border-radius:999px;padding:0 13px;display:flex;align-items:center;gap:13px;background:rgba(255,255,255,.68);backdrop-filter:blur(14px);color:#0b0b0b;box-shadow:0 10px 26px rgba(0,0,0,.24)}
.mini-dots{display:flex;gap:5px}.mini-dots i{width:6px;height:6px;border-radius:50%;background:#111}.mini-line{width:1px;height:22px;background:rgba(0,0,0,.18)}.mini svg{width:20px;height:20px}

.top-chips{position:absolute;left:18px;right:18px;top:178px;z-index:8;display:grid;grid-template-columns:auto auto auto 40px;gap:8px;align-items:center}
.chip{height:40px;border:1px solid var(--line);border-radius:999px;background:rgba(6,8,8,.48);backdrop-filter:blur(16px);display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:0 12px;font-size:15px;font-weight:900;white-space:nowrap;box-shadow:0 10px 24px rgba(0,0,0,.14)}
.chip svg{width:18px;height:18px;flex-shrink:0}.chip.time svg{color:var(--gold)}.chip.loc svg{color:#fff}.more{width:40px;height:40px;padding:0;border:1px solid var(--line);border-radius:50%;background:rgba(6,8,8,.5);backdrop-filter:blur(16px);display:grid;place-items:center}.more svg{width:21px;height:21px}

.play-state{position:absolute;left:50%;top:45%;z-index:4;transform:translate(-50%,-50%);width:74px;height:74px;border-radius:50%;display:grid;place-items:center;background:rgba(0,0,0,.22);border:1px solid rgba(255,255,255,.18);backdrop-filter:blur(8px);opacity:.72}
.play-state svg{width:30px;height:30px;margin-left:4px}

.rail{position:absolute;right:14px;bottom:132px;z-index:8;display:flex;flex-direction:column;gap:18px;align-items:center}
.rail-btn{border:0;background:none;display:flex;flex-direction:column;align-items:center;gap:5px;font-size:13px;font-weight:850;text-shadow:0 1px 10px rgba(0,0,0,.55)}
.rail-icon{width:48px;height:48px;border-radius:50%;display:grid;place-items:center;background:rgba(6,8,8,.36);border:1px solid var(--line);backdrop-filter:blur(14px)}
.rail-icon svg{width:25px;height:25px}.rail-btn.like svg{stroke-width:1.8}

.info{position:absolute;left:18px;right:74px;bottom:118px;z-index:7;display:flex;flex-direction:column;gap:12px}
.author{display:flex;align-items:center;gap:10px;min-width:0}
.author-av{width:54px;height:54px;border-radius:50%;background:url("../images/event/视频封面.jpg") center 38%/cover;border:2px solid rgba(255,255,255,.88);box-shadow:0 10px 26px rgba(0,0,0,.38);flex-shrink:0}
.author-main{min-width:0;flex:1}.author-name{font-size:22px;font-weight:950;letter-spacing:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;text-shadow:0 1px 16px rgba(0,0,0,.7)}
.venue-line{margin-top:4px;display:inline-flex;align-items:center;gap:5px;max-width:100%;height:28px;border-radius:999px;padding:0 9px;background:rgba(6,8,8,.42);backdrop-filter:blur(14px);color:var(--mint);font-size:14px;font-weight:900}.venue-line svg{width:16px;height:16px;flex-shrink:0}.venue-line span{white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

.title{font-size:25px;line-height:1.24;font-weight:950;letter-spacing:0;text-shadow:0 2px 18px rgba(0,0,0,.75)}
.summary{display:flex;align-items:center;gap:8px;min-width:0}
.price-card{height:55px;min-width:118px;border-radius:17px;padding:7px 12px;background:linear-gradient(135deg,rgba(255,217,77,.22),rgba(0,0,0,.28));border:1px solid rgba(255,217,77,.32);backdrop-filter:blur(15px)}
.price{font-size:27px;line-height:1;font-weight:950;color:var(--gold)}.deal{margin-top:3px;font-size:12px;color:#ffe9a1;font-weight:850}
.joined{height:55px;flex:1;min-width:0;border-radius:17px;padding:8px 11px;background:rgba(8,10,10,.4);border:1px solid var(--line);backdrop-filter:blur(15px)}
.joined-top{font-size:13px;font-weight:900;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.gender{margin-top:5px;font-size:15px;font-weight:900}.male{color:#77adff}.female{color:#ff8db6}
.actions{display:grid;grid-template-columns:1fr 1fr;gap:9px}
.action{min-width:0;border-radius:18px;padding:11px;background:rgba(8,10,10,.44);border:1px solid var(--line);backdrop-filter:blur(16px)}
.action.signup{background:linear-gradient(135deg,rgba(255,217,77,.2),rgba(8,10,10,.42));border-color:rgba(255,217,77,.28)}.action.checkin{background:linear-gradient(135deg,rgba(50,230,198,.2),rgba(8,10,10,.42));border-color:rgba(50,230,198,.28)}
.action-head{display:flex;align-items:center;justify-content:space-between;gap:6px;color:var(--muted);font-size:14px;font-weight:900}.action-head svg{width:17px;height:17px}.signup .action-head svg{color:var(--gold)}.checkin .action-head svg{color:var(--mint)}
.action-main{margin-top:7px;font-size:16px;font-weight:950;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.action-sub{margin-top:3px;font-size:13px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.action button{width:100%;height:38px;margin-top:10px;border:0;border-radius:999px;font-size:16px;font-weight:950;color:#080a0a}.signup button{background:linear-gradient(180deg,#ffe76d,#ffd43d)}.checkin button{background:linear-gradient(180deg,#45f4d2,#24d7b9)}
.place{display:flex;align-items:center;gap:9px;min-height:48px;border-radius:16px;padding:9px 11px;background:rgba(255,217,77,.16);border:1px solid rgba(255,217,77,.24);backdrop-filter:blur(16px)}
.place svg{width:19px;height:19px;color:var(--gold);flex-shrink:0}.place-name{flex:1;min-width:0;font-size:15px;font-weight:950;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.cert{width:17px;height:17px;border-radius:50%;background:var(--gold);display:grid;place-items:center;flex-shrink:0}.cert svg{width:11px;height:11px;color:#111}.dist{font-size:13px;color:#ffe9a1;font-weight:850;white-space:nowrap}
.group{display:inline-flex;align-items:center;gap:10px;height:45px;max-width:255px;border-radius:999px;padding:0 10px 0 14px;background:rgba(8,10,10,.44);border:1px solid var(--line);backdrop-filter:blur(16px);font-size:15px;font-weight:950}.group svg{width:18px;height:18px;color:var(--gold)}.avatars{display:flex}.avatars i{width:27px;height:27px;border-radius:50%;margin-left:-7px;border:2px solid rgba(8,10,10,.8);background:#555 center/cover}.avatars i:first-child{margin-left:0}.avatars i:nth-child(1){background-image:url("../images/event/1.jpg")}.avatars i:nth-child(2){background-image:url("../images/event/2.jpg")}.avatars i:nth-child(3){background-image:url("../images/event/3.jpg")}

.progress{position:absolute;left:0;right:0;bottom:105px;z-index:9;height:3px;background:rgba(255,255,255,.24)}.progress span{display:block;height:100%;width:32%;background:#fff;position:relative}.progress span::after{content:"";position:absolute;right:-5px;top:50%;width:10px;height:10px;margin-top:-5px;border-radius:50%;background:#fff}
.composer{position:absolute;left:0;right:0;bottom:0;z-index:9;min-height:105px;padding:16px 18px max(14px,env(safe-area-inset-bottom));display:flex;align-items:flex-start;gap:13px;background:rgba(8,10,10,.88);backdrop-filter:blur(24px);border-top:1px solid rgba(255,255,255,.1)}
.me{width:42px;height:42px;border-radius:50%;background:url("../images/event/flower.png") center/cover;flex-shrink:0}.input{height:44px;flex:1;border-radius:999px;background:rgba(255,255,255,.08);display:flex;align-items:center;padding:0 17px;color:var(--dim);font-size:17px}.bottom-btn{height:44px;border:0;background:none;display:flex;align-items:center;gap:5px;font-size:17px;font-weight:900}.bottom-btn svg{width:31px;height:31px}.share svg{width:34px;height:34px}

@media (max-width:370px){
  .top-chips{left:14px;right:14px;gap:6px}.chip{font-size:13px;padding:0 10px}.info{left:14px;right:68px;bottom:116px}.title{font-size:22px}.action{padding:10px}.action-main{font-size:15px}.composer{padding-left:14px;padding-right:14px;gap:9px}.bottom-btn span{display:none}
}
</style>
</head>
<body>
<main class="phone">
  <div class="video">
    <img src="../images/event/1.jpg" alt="">
  </div>

  <div class="map-strip" aria-hidden="true">
    <svg viewBox="0 0 430 176" xmlns="http://www.w3.org/2000/svg">
      <rect width="430" height="176" fill="#202938"/>
      <g fill="none" stroke="#0e1621" stroke-width="5" opacity=".9">
        <path d="M0 98h122V10M148 0v70h78v106M268 0v64h135M16 35h78M28 132h166M282 108h150"/>
        <path d="M316 0v176M377 0v176M108 74h105M235 34h68"/>
      </g>
      <g fill="rgba(255,255,255,.12)" font-family="sans-serif" font-weight="700">
        <text x="250" y="65" font-size="18">九龙商厦</text>
        <text x="15" y="88" font-size="16">7号楼</text>
      </g>
      <circle cx="286" cy="90" r="5" fill="#ffd94d"/>
      <circle cx="100" cy="108" r="4" fill="#32e6c6"/>
    </svg>
  </div>

  <div class="status">
    <span>9:41</span>
    <div class="sys-icons">
      <span class="signal"><i></i><i></i><i></i><i></i></span>
      <span class="wifi"></span>
      <span class="battery"><i></i></span>
    </div>
  </div>

  <div class="map-items">
    <div class="pin">
      <div class="pin-avatar"></div>
      <div class="pin-x"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round"><path d="M6 6l12 12M18 6L6 18"/></svg></div>
    </div>
    <div class="mini">
      <span class="mini-dots"><i></i><i></i><i></i></span>
      <span class="mini-line"></span>
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4"><circle cx="12" cy="12" r="9"/><circle cx="12" cy="12" r="3"/></svg>
    </div>
  </div>

  <nav class="top-chips" aria-label="视频操作">
    <span class="chip time"><svg viewBox="0 0 24 24" fill="currentColor"><circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2" fill="none" stroke="#111" stroke-width="2.4" stroke-linecap="round"/></svg>今天18:32</span>
    <span class="chip"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M4 4l17 8-17 8 4-8-4-8z"/></svg>导航</span>
    <span class="chip loc"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M21 10c0 7-9 13-9 13S3 17 3 10a9 9 0 1118 0z"/><circle cx="12" cy="10" r="3"/></svg>位置</span>
    <button class="more" aria-label="更多"><svg viewBox="0 0 24 24" fill="currentColor"><circle cx="5" cy="12" r="2"/><circle cx="12" cy="12" r="2"/><circle cx="19" cy="12" r="2"/></svg></button>
  </nav>

  <div class="play-state" aria-hidden="true">
    <svg viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
  </div>

  <aside class="rail" aria-label="互动">
    <button class="rail-btn like"><span class="rail-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M20.84 4.61a5.5 5.5 0 00-7.78 0L12 5.67l-1.06-1.06A5.5 5.5 0 003.16 12.4L12 21.23l8.84-8.83a5.5 5.5 0 000-7.79z"/></svg></span><span>23</span></button>
    <button class="rail-btn"><span class="rail-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 11.5a8.5 8.5 0 01-8.5 8.5 8.4 8.4 0 01-3.8-.9L3 21l1.9-5.7A8.5 8.5 0 1112.5 20z"/></svg></span><span>23</span></button>
    <button class="rail-btn"><span class="rail-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 12v8a2 2 0 002 2h12a2 2 0 002-2v-8"/><path d="M16 6l-4-4-4 4"/><path d="M12 2v14"/></svg></span></button>
  </aside>

  <section class="info">
    <div class="author">
      <div class="author-av"></div>
      <div class="author-main">
        <div class="author-name">一二三四五六七八九十</div>
        <div class="venue-line">
          <svg viewBox="0 0 24 24" fill="currentColor"><rect x="3" y="3" width="18" height="18" rx="4"/><path d="M8 12l3 3 5-6" fill="none" stroke="#07110f" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round"/></svg>
          <span>跳海酒馆-三元桥店</span>
        </div>
      </div>
    </div>

    <h1 class="title">遥想公瑾当年，小乔初嫁了但是房山窑店沙发</h1>

    <div class="summary">
      <div class="price-card">
        <div class="price">¥19.9</div>
        <div class="deal">女士优惠 减 ¥10</div>
      </div>
      <div class="joined">
        <div class="joined-top">22/99+ 已报名</div>
        <div class="gender"><span class="male">男 22</span> · <span class="female">女 22</span></div>
      </div>
    </div>

    <div class="actions">
      <article class="action signup">
        <div class="action-head"><span><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M16 21v-2a4 4 0 00-4-4H6a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M19 8v6M16 11h6"/></svg> 报名</span><span>可加入</span></div>
        <div class="action-main">立即占位</div>
        <div class="action-sub">报名后进群</div>
        <button>立即报名</button>
      </article>
      <article class="action checkin">
        <div class="action-head"><span><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><circle cx="12" cy="12" r="10"/><path d="M7 12l3 3 7-7"/></svg> 签到</span><span>未开始</span></div>
        <div class="action-main">还没有人签到</div>
        <div class="action-sub">到店附近可签</div>
        <button>签到</button>
      </article>
    </div>

    <div class="place">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.3"><path d="M21 10c0 7-9 13-9 13S3 17 3 10a9 9 0 1118 0z"/><circle cx="12" cy="10" r="3"/></svg>
      <div class="place-name">沁·叁拾壹书院(香山清琴店)</div>
      <span class="cert"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><path d="M6 12l4 4 8-8"/></svg></span>
      <div class="dist">21.2km</div>
    </div>

    <div class="group">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 00-3-3.87"/><path d="M16 3.13a4 4 0 010 7.75"/></svg>
      加入群聊 (32)
      <span class="avatars"><i></i><i></i><i></i></span>
    </div>
  </section>

  <div class="progress"><span></span></div>

  <footer class="composer">
    <div class="me"></div>
    <div class="input">回复</div>
    <button class="bottom-btn" aria-label="喜欢"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M20.84 4.61a5.5 5.5 0 00-7.78 0L12 5.67l-1.06-1.06A5.5 5.5 0 003.16 12.4L12 21.23l8.84-8.83a5.5 5.5 0 000-7.79z"/></svg><span>23</span></button>
    <button class="bottom-btn share" aria-label="分享"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M4 12v8a2 2 0 002 2h12a2 2 0 002-2v-8"/><path d="M16 6l-4-4-4 4"/><path d="M12 2v14"/></svg></button>
  </footer>
</main>
</body>
</html>
