<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<title>快捷发布</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{
    --bg:#070912;--panel:#131a2a;--panel-2:#111827;--line:#2d3852;
    --text:#f6f8ff;--sub:#a6b4cf;--dim:#7c8ca8;
    --pri:#ffd84d;--pri-2:#ffeeb0;--ok:#66f1b6;--safe:env(safe-area-inset-bottom,0px)
}
body{
    font-family:-apple-system,"SF Pro Display","PingFang SC","Noto Sans SC",sans-serif;
    background:
      radial-gradient(100% 65% at 5% -10%,rgba(106,138,255,.28),transparent 52%),
      radial-gradient(100% 65% at 95% 2%,rgba(255,216,77,.24),transparent 50%),
      linear-gradient(180deg,#090d17 0%,#080a12 45%,#06080f 100%);
    color:var(--text);min-height:100vh;line-height:1.45
}
.page{max-width:430px;margin:0 auto;padding:18px 14px calc(118px + var(--safe))}

.hero{
    position:relative;overflow:hidden;border:1px solid #33435f;
    border-radius:22px;padding:18px 16px 16px;
    background:linear-gradient(160deg,rgba(255,255,255,.12),rgba(255,255,255,.02) 35%),#131d31;
    box-shadow:0 14px 42px rgba(0,0,0,.35)
}
.hero:before{
    content:"";position:absolute;right:-30px;top:-34px;width:150px;height:150px;border-radius:50%;
    background:radial-gradient(circle,rgba(255,216,77,.65) 0%,rgba(255,216,77,.1) 55%,transparent 70%)
}
.kicker{
    display:inline-flex;align-items:center;gap:7px;padding:6px 12px;border-radius:999px;
    font-size:11px;font-weight:800;letter-spacing:.6px;color:#1b1301;background:linear-gradient(90deg,var(--pri),var(--pri-2))
}
.kicker i{width:6px;height:6px;border-radius:50%;background:#1b1301}
.title{margin-top:11px;font-size:30px;line-height:1.15;font-weight:900;letter-spacing:-.4px}
.sub{margin-top:8px;font-size:13px;color:#d8e2ff}
.progress{
    margin-top:13px;display:flex;gap:8px
}
.dot{height:4px;flex:1;border-radius:99px;background:rgba(255,255,255,.2)}
.dot.active{background:linear-gradient(90deg,var(--pri),var(--pri-2))}

.panel{
    margin-top:13px;border:1px solid var(--line);border-radius:20px;
    background:linear-gradient(180deg,rgba(255,255,255,.04),rgba(255,255,255,0)),var(--panel);
    box-shadow:0 12px 30px rgba(0,0,0,.25)
}
.section{padding:14px}
.section+.section{border-top:1px solid #2a3550}

.section-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:9px}
.badge{
    font-size:11px;padding:3px 8px;border-radius:999px;color:#dbe6ff;background:#26324a;border:1px solid #394a6b
}
.label{font-size:13px;font-weight:800;color:#eef3ff}

.choice-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.choice-btn{
    position:relative;border:1px solid #3a4968;background:var(--panel-2);color:#d8e2fa;border-radius:14px;padding:12px;cursor:pointer;text-align:left
}
.choice-btn .t1{font-size:15px;font-weight:850}
.choice-btn .t2{font-size:11px;color:#9dafcf;margin-top:5px}
.choice-btn .tick{
    position:absolute;top:10px;right:10px;width:18px;height:18px;border-radius:50%;
    border:1px solid #55678d;background:#1a2235;color:transparent;display:flex;align-items:center;justify-content:center;font-size:11px
}
.choice-btn.active{
    border-color:rgba(255,216,77,.95);background:linear-gradient(180deg,rgba(255,216,77,.15),rgba(255,216,77,.06));
    color:#fff7d0;box-shadow:0 0 0 1px rgba(255,216,77,.12) inset
}
.choice-btn.active .t2{color:#ffe89f}
.choice-btn.active .tick{background:var(--pri);border-color:var(--pri);color:#1e1400;font-weight:900}

.field{margin-top:10px}
.field:first-child{margin-top:0}
.field-label{font-size:12px;color:#cbd8f7;margin-bottom:6px}
.input{
    width:100%;height:46px;border-radius:12px;border:1px solid #3a4b6a;background:#101827;
    color:var(--text);font-size:14px;padding:0 12px;outline:none;transition:.2s border-color,.2s box-shadow,.2s background
}
.input:focus{border-color:rgba(255,216,77,.85);box-shadow:0 0 0 3px rgba(255,216,77,.14);background:#111a2a}
.input::placeholder{color:var(--dim)}
.hint{font-size:11px;color:#8fa0c1;margin-top:6px}

.tip{
    margin-top:10px;border:1px solid #334764;border-radius:12px;padding:10px 11px;
    background:linear-gradient(180deg,rgba(100,147,255,.12),rgba(100,147,255,.02));
    font-size:12px;color:#d9e6ff
}
.tip strong{color:#ffffff}

.sticky{
    position:fixed;left:50%;transform:translateX(-50%);bottom:0;width:min(430px,100%);
    padding:10px 14px calc(12px + var(--safe));background:linear-gradient(180deg,rgba(8,10,16,0),#0a0f1c 24%,#0a0f1c 100%)
}
.bar{
    border:1px solid #314362;border-radius:18px;padding:10px;background:#111a2d;box-shadow:0 10px 28px rgba(0,0,0,.35)
}
.preview{font-size:12px;color:#d4def4;line-height:1.5}
.preview b{color:#fff}
.publish{
    margin-top:9px;width:100%;height:48px;border:none;border-radius:14px;cursor:pointer;
    font-size:16px;font-weight:900;color:#201500;background:linear-gradient(90deg,var(--pri),var(--pri-2));
    box-shadow:0 10px 24px rgba(255,216,77,.32)
}
.publish:disabled{opacity:.45;box-shadow:none;cursor:not-allowed}
</style>
</head>
<body>
<div class="page">
    <section class="hero">
        <div class="kicker"><i></i>QUICK POST</div>
        <h1 class="title">一页发布邀约</h1>
        <p class="sub">风格升级版：三步完成发布，默认新建群聊，也可以替换成已有群聊</p>
        <div class="progress">
            <i class="dot active"></i><i class="dot active"></i><i class="dot active"></i>
        </div>
    </section>

    <section class="panel">
        <div class="section">
            <div class="section-head">
                <div class="label">1. 你要发什么</div>
                <span class="badge">必选</span>
            </div>
            <div class="choice-grid" id="typeGrid">
                <button class="choice-btn active type-btn" data-type="group">
                    <span class="tick">✓</span>
                    <div class="t1">🎯 我组局</div>
                    <div class="t2">主动发起活动，约人参与</div>
                </button>
                <button class="choice-btn type-btn" data-type="free">
                    <span class="tick">✓</span>
                    <div class="t1">🙌 我有空</div>
                    <div class="t2">告诉附近的人我现在有空</div>
                </button>
            </div>
        </div>

        <div class="section">
            <div class="section-head">
                <div class="label">2. 群聊怎么处理</div>
                <span class="badge">默认新建</span>
            </div>
            <div class="choice-grid" id="chatMode">
                <button class="choice-btn chat-btn active" data-mode="new">
                    <span class="tick">✓</span>
                    <div class="t1">自动新建群聊</div>
                    <div class="t2">推荐：发布成功后自动开群</div>
                </button>
                <button class="choice-btn chat-btn" data-mode="existing">
                    <span class="tick">✓</span>
                    <div class="t1">使用已有群聊</div>
                    <div class="t2">把这次发布同步进指定群</div>
                </button>
            </div>
            <div class="field" id="existingChatField" style="display:none">
                <div class="field-label">选择已有群聊</div>
                <select class="input" id="existingChat">
                    <option value="">请选择一个已有群聊</option>
                    <option value="晚饭搭子群">晚饭搭子群（32人）</option>
                    <option value="周末徒步群">周末徒步群（87人）</option>
                    <option value="羽毛球约练群">羽毛球约练群（46人）</option>
                </select>
                <div class="hint">选中后不会再新建群聊，发布信息直接进入该群。</div>
            </div>
            <div class="tip" id="chatTip"><strong>默认逻辑：</strong>发布后自动创建新群聊，适合临时组局。</div>
        </div>

        <div class="section">
            <div class="section-head">
                <div class="label">3. 补充发布内容</div>
                <span class="badge">地点必填</span>
            </div>
            <div class="field">
                <div class="field-label">一句话标题（选填）</div>
                <input class="input" id="title" maxlength="24" placeholder="例如：有人一起吃晚饭吗">
            </div>
            <div class="field">
                <div class="field-label">地点（必填）</div>
                <input class="input" id="location" placeholder="例如：三里屯太古里">
                <div class="hint">用于附近展示和距离计算。</div>
            </div>
            <div class="field" id="timeField">
                <div class="field-label">开始时间（我组局必填）</div>
                <input class="input" id="time" type="datetime-local">
                <div class="hint">时间明确，别人更容易快速决定是否参加。</div>
            </div>
            <div class="tip" id="typeTip"><strong>当前是“我组局”：</strong>请填写地点 + 时间。</div>
        </div>
    </section>
</div>

<div class="sticky">
    <div class="bar">
        <div class="preview" id="preview">预览：<b>我组局</b> · 地点未填写 · 新建群聊</div>
        <button class="publish" id="publishBtn" disabled>发布邀约</button>
    </div>
</div>

<script>
var state={type:"group",title:"",location:"",time:""};
var typeGrid=document.getElementById("typeGrid");
var chatMode=document.getElementById("chatMode");
var chatTip=document.getElementById("chatTip");
var titleInput=document.getElementById("title");
var locationInput=document.getElementById("location");
var timeInput=document.getElementById("time");
var existingChatField=document.getElementById("existingChatField");
var existingChatInput=document.getElementById("existingChat");
var timeField=document.getElementById("timeField");
var typeTip=document.getElementById("typeTip");
var publishBtn=document.getElementById("publishBtn");
var preview=document.getElementById("preview");
state.chatMode="new";
state.existingChat="";

function switchChatMode(mode){
    state.chatMode=mode;
    document.querySelectorAll(".chat-btn").forEach(function(btn){
        btn.classList.toggle("active",btn.dataset.mode===mode);
    });
    if(mode==="existing"){
        existingChatField.style.display="";
        chatTip.innerHTML="<strong>已切换：</strong>请再选择一个已有群聊，发布后将直接同步到该群。";
    }else{
        existingChatField.style.display="none";
        state.existingChat="";
        existingChatInput.value="";
        chatTip.innerHTML="<strong>默认逻辑：</strong>发布后自动创建新群聊，适合临时组局。";
    }
    validate();
    renderPreview();
}

function switchType(type){
    state.type=type;
    document.querySelectorAll(".type-btn").forEach(function(btn){
        btn.classList.toggle("active",btn.dataset.type===type);
    });
    if(type==="group"){
        timeField.style.display="";
        typeTip.innerHTML="<strong>当前是“我组局”：</strong>请填写地点 + 时间。";
    }else{
        timeField.style.display="none";
        state.time="";
        timeInput.value="";
        typeTip.innerHTML="<strong>当前是“我有空”：</strong>只需要填写地点，时间可省略。";
    }
    validate();
    renderPreview();
}

function validate(){
    var hasLocation=state.location.trim().length>0;
    var hasTime=state.time.trim().length>0;
    var hasExistingChat=state.chatMode==="existing"?state.existingChat.trim().length>0:true;
    var ok=(state.type==="group"?(hasLocation&&hasTime):hasLocation)&&hasExistingChat;
    publishBtn.disabled=!ok;
}

function renderPreview(){
    var typeName=state.type==="group"?"我组局":"我有空";
    var title=state.title.trim()||"无标题";
    var location=state.location.trim()||"地点未填写";
    var timeText=state.type==="group"?(state.time?(" · 时间 "+state.time.replace("T"," ")):" · 时间未填写"):"";
    var chatText=state.chatMode==="new"?"新建群聊":(state.existingChat?("已有群："+state.existingChat):"已有群未选择");
    preview.innerHTML="预览：<b>"+typeName+"</b> · "+title+" · "+location+timeText+" · "+chatText;
}

typeGrid.addEventListener("click",function(e){
    var btn=e.target.closest(".type-btn");
    if(!btn)return;
    switchType(btn.dataset.type);
});
chatMode.addEventListener("click",function(e){
    var btn=e.target.closest(".chat-btn");
    if(!btn)return;
    switchChatMode(btn.dataset.mode);
});

titleInput.addEventListener("input",function(e){
    state.title=e.target.value;
    renderPreview();
});
locationInput.addEventListener("input",function(e){
    state.location=e.target.value;
    validate();
    renderPreview();
});
timeInput.addEventListener("change",function(e){
    state.time=e.target.value;
    validate();
    renderPreview();
});
existingChatInput.addEventListener("change",function(e){
    state.existingChat=e.target.value;
    validate();
    renderPreview();
});

publishBtn.addEventListener("click",function(){
    var typeName=state.type==="group"?"我组局":"我有空";
    var chatName=state.chatMode==="new"?"自动新建群聊":("使用已有群聊："+state.existingChat);
    alert("发布成功（演示）\n类型："+typeName+"\n地点："+state.location+(state.type==="group"?("\n时间："+state.time):"")+"\n群聊："+chatName);
});

switchType("group");
switchChatMode("new");
</script>
</body>
</html>
