<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>提现到微信</title>
<style>
/* 配色与 publish-now.html 对齐：深色底、卡片、黄强调、绿用于微信品牌 */
*{margin:0;padding:0;box-sizing:border-box}
:root{
    --yellow:#f5c542;
    --yellow-bg:rgba(245,197,66,.12);
    --green:#07c160;
    --green-bg:rgba(7,193,96,.1);
    --red:#ef4444;
    --blue:#3b82f6;
    --bg:#111;
    --card:#1a1a1a;
    --card2:#222;
    --text:#fff;
    --sub:rgba(255,255,255,.45);
    --dim:rgba(255,255,255,.25);
    --border:rgba(255,255,255,.08);
    --r:14px;
}
body{font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","Helvetica Neue",sans-serif;background:var(--bg);color:var(--text);min-height:100vh;-webkit-font-smoothing:antialiased;padding-bottom:32px}

/* ═══ 导航（同 publish-now） ═══ */
.nav{position:sticky;top:0;z-index:50;display:flex;align-items:center;padding:12px 16px;padding-top:max(env(safe-area-inset-top),12px);background:rgba(17,17,17,.9);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px)}
.nav-back{width:36px;height:36px;border-radius:50%;border:none;background:rgba(255,255,255,.08);display:grid;place-items:center;cursor:pointer;color:#fff;flex-shrink:0}
.nav-back:active{background:rgba(255,255,255,.15)}
.nav-back svg{width:20px;height:20px}
.nav-title{flex:1;text-align:center;font-size:17px;font-weight:600;margin-right:36px}

/* ═══ 微信账号 ═══ */
.wx-bind{margin:16px;padding:16px;background:var(--card);border-radius:var(--r);border:1px solid var(--border);display:flex;align-items:center;gap:14px}
.wx-icon{width:44px;height:44px;border-radius:12px;background:var(--green);display:grid;place-items:center;flex-shrink:0}
.wx-icon svg{width:24px;height:24px;color:#fff}
.wx-info{flex:1;min-width:0}
.wx-label{font-size:12px;color:var(--sub);margin-bottom:3px}
.wx-name{font-size:15px;font-weight:600;display:flex;align-items:center;gap:6px}
.wx-name .badge{font-size:10px;font-weight:600;padding:2px 8px;border-radius:6px;background:var(--green-bg);color:var(--green)}

/* ═══ 提现金额区 ═══ */
.amount-card{margin:0 16px 16px;padding:24px 20px;background:var(--card);border-radius:var(--r);border:1px solid var(--border)}
.amount-available{display:flex;align-items:baseline;justify-content:space-between;margin-bottom:20px}
.amount-available-label{font-size:13px;color:var(--sub)}
.amount-available-val{font-size:13px;font-weight:700;color:var(--text)}
.amount-available-val em{font-style:normal;font-size:20px;color:var(--yellow)}

.amount-input-wrap{position:relative;margin-bottom:16px}
.amount-prefix{position:absolute;left:0;top:50%;transform:translateY(-50%);font-size:28px;font-weight:700;color:var(--text);pointer-events:none}
.amount-input{width:100%;height:56px;border:none;border-bottom:2px solid var(--border);background:transparent;font-size:36px;font-weight:700;font-family:inherit;color:var(--text);padding-left:30px;outline:none;transition:border-color .2s}
.amount-input:focus{border-color:var(--yellow)}
.amount-input::placeholder{font-size:18px;font-weight:400;color:var(--dim)}

.amount-actions{display:flex;align-items:center;justify-content:space-between}
.amount-all{font-size:13px;font-weight:600;color:var(--yellow);cursor:pointer;border:none;background:none;padding:4px 0;font-family:inherit}
.amount-all:active{opacity:.7}
.amount-error{font-size:12px;color:var(--red);display:none}
.amount-error.show{display:block}

/* ═══ 提现按钮（主操作同发布页黄色按钮） ═══ */
.submit-wrap{margin:24px 16px 0}
.submit-btn{width:100%;height:52px;border-radius:26px;border:none;background:var(--yellow);color:#111;font-size:16px;font-weight:700;font-family:inherit;cursor:pointer;transition:all .15s;box-shadow:0 4px 16px rgba(245,197,66,.3)}
.submit-btn:active{transform:scale(.98)}
.submit-btn:disabled{background:rgba(255,255,255,.12);color:var(--dim);box-shadow:none;cursor:not-allowed}

/* ═══ 提现说明 ═══ */
.tips{margin:24px 16px;padding:16px;background:var(--card);border-radius:var(--r);border:1px solid var(--border)}
.tips-title{font-size:14px;font-weight:600;margin-bottom:10px;display:flex;align-items:center;gap:6px}
.tips-title svg{width:16px;height:16px;color:var(--sub)}
.tips-list{list-style:none;counter-reset:tip}
.tips-list li{position:relative;padding-left:20px;font-size:13px;color:var(--sub);line-height:1.8}
.tips-list li::before{counter-increment:tip;content:counter(tip);position:absolute;left:0;top:3px;width:16px;height:16px;border-radius:50%;background:var(--card2);color:var(--sub);font-size:10px;font-weight:700;display:grid;place-items:center}

/* ═══ 成功弹层 ═══ */
.result-mask{position:fixed;inset:0;z-index:200;background:rgba(0,0,0,.55);backdrop-filter:blur(4px);-webkit-backdrop-filter:blur(4px);display:none;align-items:center;justify-content:center;padding:24px}
.result-mask.show{display:flex}
.result-card{background:var(--card);border:1px solid var(--border);border-radius:20px;width:100%;max-width:320px;padding:36px 24px 28px;text-align:center;animation:pop .3s ease}
@keyframes pop{from{opacity:0;transform:scale(.9) translateY(10px)}to{opacity:1;transform:none}}
.result-icon{width:64px;height:64px;border-radius:50%;background:var(--yellow-bg);margin:0 auto 16px;display:grid;place-items:center}
.result-icon svg{width:32px;height:32px;color:var(--yellow)}
.result-title{font-size:18px;font-weight:700;margin-bottom:6px}
.result-desc{font-size:13px;color:var(--sub);line-height:1.5;margin-bottom:20px}
.result-amount{font-size:32px;font-weight:800;color:var(--yellow);margin-bottom:20px}
.result-close{width:100%;height:44px;border-radius:22px;border:none;background:var(--yellow);color:#111;font-size:15px;font-weight:700;font-family:inherit;cursor:pointer;transition:all .15s;box-shadow:0 4px 14px rgba(245,197,66,.25)}
.result-close:active{transform:scale(.97)}
</style>
</head>
<body>

<div class="nav">
    <button class="nav-back" onclick="history.back()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
    </button>
    <span class="nav-title">提现到微信</span>
</div>

<!-- 已绑定微信 -->
<div class="wx-bind">
    <div class="wx-icon">
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M8.69 3C4.96 3 2 5.56 2 8.73c0 1.79.97 3.39 2.49 4.44l-.64 1.9a.3.3 0 00.42.36l2.24-1.15c.69.19 1.42.29 2.18.29.26 0 .52-.01.77-.04a5.44 5.44 0 01-.21-1.5c0-3.17 2.97-5.73 6.63-5.73.22 0 .44.01.65.03C16.12 4.77 12.73 3 8.69 3zm-2.6 3.41a.96.96 0 110 1.92.96.96 0 010-1.92zm4.85 0a.96.96 0 110 1.92.96.96 0 010-1.92zM15.88 8.3c-3.27 0-5.92 2.22-5.92 4.97 0 2.74 2.65 4.97 5.92 4.97.62 0 1.22-.09 1.78-.24l1.83.94a.25.25 0 00.35-.3l-.52-1.56c1.32-.91 2.16-2.29 2.16-3.81 0-2.75-2.65-4.97-5.6-4.97zm-2.1 3.13a.78.78 0 110 1.57.78.78 0 010-1.57zm3.97 0a.78.78 0 110 1.57.78.78 0 010-1.57z"/></svg>
    </div>
    <div class="wx-info">
        <div class="wx-label">提现到微信账号</div>
        <div class="wx-name">微醺小王子 <span class="badge">已绑定</span></div>
    </div>
</div>

<!-- 提现金额 -->
<div class="amount-card">
    <div class="amount-available">
        <span class="amount-available-label">可提现金额</span>
        <span class="amount-available-val">¥ <em id="availableNum">326.50</em></span>
    </div>
    <div class="amount-input-wrap">
        <span class="amount-prefix">¥</span>
        <input class="amount-input" id="amountInput" type="number" inputmode="decimal" placeholder="输入提现金额" step="0.01">
    </div>
    <div class="amount-actions">
        <button class="amount-all" id="allBtn" onclick="fillAll()">全部提现</button>
        <span class="amount-error" id="amountErr"></span>
    </div>
</div>

<!-- 提现按钮 -->
<div class="submit-wrap">
    <button class="submit-btn" id="submitBtn" disabled onclick="submitWithdraw()">确认提现</button>
</div>

<!-- 提现说明 -->
<div class="tips">
    <div class="tips-title">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/></svg>
        提现说明
    </div>
    <ol class="tips-list">
        <li>单笔提现金额最高 500 元，最低 1 元</li>
        <li>提现金额需为可提现余额，冻结中的金额暂不可提现</li>
        <li>如遇到账延迟，请联系客服处理</li>
    </ol>
</div>

<!-- 成功弹层 -->
<div class="result-mask" id="resultMask">
    <div class="result-card">
        <div class="result-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M22 11.08V12a10 10 0 11-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>
        </div>
        <div class="result-title">提现申请已提交</div>
        <div class="result-desc">预计 1-3 个工作日到账微信零钱</div>
        <div class="result-amount" id="resultAmount">¥0.00</div>
        <button class="result-close" onclick="closeResult()">完成</button>
    </div>
</div>

<script>
var AVAILABLE = 326.50;
var MAX = 500;
var MIN = 1;

var input = document.getElementById("amountInput");
var err = document.getElementById("amountErr");
var btn = document.getElementById("submitBtn");

input.addEventListener("input", validate);

function validate(){
    var v = parseFloat(input.value);
    err.classList.remove("show");
    if(!input.value || isNaN(v) || v <= 0){
        btn.disabled = true;
        return;
    }
    if(v < MIN){
        err.textContent = "最低提现 "+MIN+" 元";
        err.classList.add("show");
        btn.disabled = true;
        return;
    }
    if(v > MAX){
        err.textContent = "单笔最多提现 "+MAX+" 元";
        err.classList.add("show");
        btn.disabled = true;
        return;
    }
    if(v > AVAILABLE){
        err.textContent = "超出可提现金额";
        err.classList.add("show");
        btn.disabled = true;
        return;
    }
    btn.disabled = false;
}

function fillAll(){
    var fill = Math.min(AVAILABLE, MAX);
    input.value = fill.toFixed(2);
    validate();
}

function submitWithdraw(){
    var v = parseFloat(input.value);
    if(isNaN(v) || v < MIN || v > MAX || v > AVAILABLE) return;
    document.getElementById("resultAmount").textContent = "¥" + v.toFixed(2);
    document.getElementById("resultMask").classList.add("show");
}

function closeResult(){
    document.getElementById("resultMask").classList.remove("show");
    input.value = "";
    btn.disabled = true;
}

document.getElementById("resultMask").addEventListener("click", function(e){
    if(e.target === this) closeResult();
});
</script>
</body>
</html>
